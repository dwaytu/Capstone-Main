apply plugin: 'com.android.application'

def envOrProp = { String key ->
    def propValue = project.findProperty(key)
    if (propValue != null && propValue.toString().trim()) {
        return propValue.toString().trim()
    }
    def envValue = System.getenv(key)
    if (envValue != null && envValue.toString().trim()) {
        return envValue.toString().trim()
    }
    return null
}

def releaseStoreFile = envOrProp('SENTINEL_UPLOAD_STORE_FILE')
def releaseStorePassword = envOrProp('SENTINEL_UPLOAD_STORE_PASSWORD')
def releaseKeyAlias = envOrProp('SENTINEL_UPLOAD_KEY_ALIAS')
def releaseKeyPassword = envOrProp('SENTINEL_UPLOAD_KEY_PASSWORD')
def hasReleaseSigning = releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword

def sanitizeVersionName = { String raw ->
    def fallback = '1.0.0'
    if (raw == null) {
        return fallback
    }

    def normalized = raw.trim().replaceFirst(/(?i)^v/, '')
    if (!normalized) {
        return fallback
    }

    if (!(normalized ==~ /^\d+\.\d+\.\d+([-.][0-9A-Za-z.]+)?$/)) {
        return fallback
    }

    return normalized
}

def deriveVersionCode = { String versionName ->
    def matcher = (versionName =~ /^(\d+)\.(\d+)\.(\d+)/)
    if (!matcher.matches()) {
        return 10000
    }

    def major = matcher.group(1).toInteger()
    def minor = matcher.group(2).toInteger()
    def patch = matcher.group(3).toInteger()
    return (major * 10000) + (minor * 100) + patch
}

def isPositiveInteger = { String value ->
    return value != null && (value ==~ /^\d+$/) && value.toInteger() > 0
}

def appVersionName = sanitizeVersionName(envOrProp('SENTINEL_APP_VERSION') ?: envOrProp('VITE_APP_VERSION'))
def appVersionCode = isPositiveInteger(envOrProp('SENTINEL_ANDROID_VERSION_CODE'))
    ? envOrProp('SENTINEL_ANDROID_VERSION_CODE').toInteger()
    : deriveVersionCode(appVersionName)

def requiresAppReleaseTask = { taskGraph ->
    taskGraph.allTasks.any { task ->
        task.path.startsWith(':app:') && task.path.toLowerCase().contains('release')
    }
}

gradle.taskGraph.whenReady { taskGraph ->
    if (!requiresAppReleaseTask(taskGraph)) {
        return
    }

    if (!hasReleaseSigning) {
        throw new RuntimeException('Release signing credentials are required for release builds. Set SENTINEL_UPLOAD_STORE_FILE, SENTINEL_UPLOAD_STORE_PASSWORD, SENTINEL_UPLOAD_KEY_ALIAS, and SENTINEL_UPLOAD_KEY_PASSWORD.')
    }

    if (!file(releaseStoreFile).exists()) {
        throw new RuntimeException("Release keystore file not found at: ${releaseStoreFile}")
    }
}

android {
    namespace "com.sentinel.app"
    compileSdk rootProject.ext.compileSdkVersion

    if (hasReleaseSigning) {
        signingConfigs {
            release {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    defaultConfig {
        applicationId "com.sentinel.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appVersionCode
        versionName appVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
