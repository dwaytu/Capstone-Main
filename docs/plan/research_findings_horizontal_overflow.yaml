- file: SuperadminDashboard.tsx
  path: DasiaAIO-Frontend/src/components/admin/SuperadminDashboard.tsx
  purpose: "Admin/superadmin dashboard with user management, approvals, schedules, missions, analytics"
  language: tsx
  lines: ~1900
  key_elements:

  - element: "Pending Approvals Table"
    type: pattern
    location: "SuperadminDashboard.tsx:1319-1383"
    description: |
      OUTER WRAPPER (line 1319):
        <div className="flex-1 p-4 md:p-8 overflow-y-auto w-full animate-fade-in">
      SECTION (line 1324):
        <section className="w-full table-glass rounded-2xl p-6 md:p-8">
      SCROLL WRAPPER (line 1326):
        <div className="overflow-auto">
      TABLE (line 1327):
        <table className="w-full border-collapse min-w-[820px]">
      TABLE HEADERS (lines 1330-1334):
        Guard Name | Requested Role | Submitted Date | Status | Actions
        All use: className="px-4 py-3 text-left font-semibold text-text-primary border-b-2 border-border text-sm uppercase tracking-wider"
      ACTION BUTTONS COLUMN (lines 1362-1373):
        <td className="px-4 py-3">
          <div className="flex flex-wrap gap-2">
            <button className="soc-btn soc-btn-neutral">Details</button>
            <button className="soc-btn soc-btn-success disabled:opacity-60">Approve</button>
            <button className="soc-btn soc-btn-danger disabled:opacity-60">Reject</button>
          </div>
        </td>
      OVERFLOW HANDLING:
        - Parent div has overflow-auto (horizontal scroll enabled)
        - Table has min-w-[820px] (forces minimum width, scrolls below 820px)
        - Action buttons use flex-wrap which will wrap on narrow cells
      POTENTIAL ISSUE:
        - The min-w-[820px] combined with p-6 md:p-8 padding means the effective minimum
          viewport for no-scroll is ~820px + 48px (p-6) = ~868px on mobile, ~884px on md+
        - The 3 action buttons (Details/Approve/Reject) in flex-wrap may clip if the Actions
          column gets squeezed — soc-btn classes may have min-width or padding that pushes out

  - element: "User Management Desktop Table"
    type: pattern
    location: "SuperadminDashboard.tsx:1079-1218"
    description: |
      SCROLL WRAPPER (line 1077):
        <div className="soc-scroll-area flex-1 min-h-0 overflow-auto">
      TABLE (line 1079):
        <table className="hidden w-full min-w-[980px] md:table">
      TABLE HEADERS (7 columns, lines 1081-1098):
        Select | User Details | Username | Role | Status | Last Login | Actions
        All use: className="px-5 py-3 text-left text-xs font-semibold uppercase tracking-wider text-text-tertiary"
        Actions header is text-right aligned
      ACTION BUTTONS COLUMN (lines 1146-1214):
        <td className="px-5 py-3.5">
          <div className="flex items-center justify-end gap-1">
            [Approve icon button] — conditional, only if pendingApproval
            [Edit icon button]
            [Reset Password icon button] — disabled/coming soon
            [Suspend icon button] — disabled/coming soon
            [Delete icon button] — conditional via Allowed component
          </div>
        </td>
        All icon buttons: className="min-h-11 min-w-11 rounded-lg p-2 ..."
      OVERFLOW HANDLING:
        - Table is hidden on mobile (hidden ... md:table)
        - min-w-[980px] forces scroll on viewports < 980px
        - soc-scroll-area provides overflow-auto
        - 5 icon buttons at 44px each = 220px + gaps, plus px-5 padding = ~230px minimum
          for action column alone
      POTENTIAL ISSUE:
        - With 7 columns and min-w-[980px], the action column with up to 5 icon buttons
          (Approve + Edit + Reset + Suspend + Delete = 220px+) can push total needed width
          beyond 980px, meaning horizontal scroll even at the declared min-width
        - No max-width or truncation on "User Details" column (name + email) — long names
          can expand this column and push action buttons off-screen

  - element: "User Management Mobile Card View"
    type: pattern
    location: "SuperadminDashboard.tsx:1219-1300"
    description: |
      CONTAINER (line 1219):
        <div className="space-y-3 p-4 md:hidden">
      Each user card:
        <article className="rounded-xl border border-border-subtle bg-background p-4">
      ACTION BUTTONS ROW (line 1256):
        <div className="mt-3 flex flex-wrap gap-2">
          Approve / Edit / Reset / Suspend / Delete buttons
          All use: className="min-h-11 rounded-md border ... px-2.5 py-1.5 text-xs font-semibold"
      OVERFLOW HANDLING:
        - flex-wrap handles button wrapping
        - Article has p-4 but no overflow-x control
      POTENTIAL ISSUE:
        - If 5 buttons total width exceeds container, flex-wrap handles it
        - Generally safe but buttons may wrap to 2 rows on narrow screens

