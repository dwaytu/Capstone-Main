        <section className="guard-sticky-inner">
          <nav> ... 4-column grid nav ... </nav>
        </section>
      </div>
      CSS (index.css:1220-1227):
        .guard-sticky-region { position: fixed; left:0; right:0; bottom:0; z-index:42; padding: ... }
      BOTTOM PADDING ACCOUNTING:
        - guard-sticky-main has padding-bottom: calc(8.5rem + safe-area) ✅
        - guard-main-reserved-height: 4.25rem used for header height deduction ✅
        - These values correctly prevent content from being hidden under the sticky region

