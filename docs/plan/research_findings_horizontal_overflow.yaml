plan_id: horizontal-overflow-audit
objective: "Find approvals table and guard support tab components causing horizontal overflow on admin and guard dashboards"
focus_area: "frontend/table-overflow"
created_at: "2026-04-05T00:00:00Z"
created_by: gem-researcher
status: completed

tldr: |
  - The approvals table lives in SuperadminDashboard.tsx (line 1325). It uses min-w-[820px] inside an overflow-auto wrapper — safe for scroll but the 3-button action column (Details/Approve/Reject) uses flex-wrap which can cause clipping at tight widths.
  - The user management table (same file, line 1079) uses min-w-[980px] with a desktop-only md:table strategy + mobile card fallback. Its action column has 5 icon buttons with no wrapping/overflow guard.
  - GuardSupportTab and GuardShiftSwapPanel use card-based layouts (no tables), and are unlikely to cause horizontal overflow themselves.
  - UserDashboard.tsx main content has guard-sticky-main class with padding-bottom: calc(var(--guard-sticky-region-height) + env(safe-area-inset-bottom)) — properly accounts for the guard sticky region.
  - The guard-sticky-region-height is 8.5rem; guard-main-reserved-height is 4.25rem.

