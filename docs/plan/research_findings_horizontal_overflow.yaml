- file: UserDashboard.tsx
  path: DasiaAIO-Frontend/src/components/guards/UserDashboard.tsx
  purpose: "Guard dashboard with mission, resources, support, and map tabs"
  language: tsx
  lines: ~1280
  key_elements:

  - element: "Main Content Area"
    type: pattern
    location: "UserDashboard.tsx:893-896"
    description: |
      <main
        id="maincontent"
        tabIndex={-1}
        className="guard-sticky-main mx-auto h-[calc(100dvh-var(--guard-main-reserved-height))] w-full max-w-5xl overflow-y-auto px-4 pt-4"
      >
      CSS (index.css:1214-1216):
        .guard-sticky-main {
          padding-bottom: calc(var(--guard-sticky-region-height) + env(safe-area-inset-bottom, 0px));
        }
      CSS VARIABLES (index.css:151-153):
        --guard-sticky-region-height: 8.5rem;
        --guard-main-reserved-height: 4.25rem;
      OVERFLOW HANDLING:
        - overflow-y-auto on main
        - No overflow-x control (could allow horizontal overflow from children)
        - h-[calc(100dvh-4.25rem)] constrains height
        - padding-bottom: calc(8.5rem + safe-area) correctly accounts for sticky region
      POTENTIAL ISSUE:
        - No overflow-x: hidden on main — if any child exceeds max-w-5xl or viewport,
          horizontal scroll will appear on the main element

  - element: "Support Tab Rendering"
    type: pattern
    location: "UserDashboard.tsx:1129-1147"
    description: |
      {!isInitialLoading && activeSection === 'support' ? (
        <GuardSupportTab
          userId={user.id}
          userRole={user.role}
          onInstructionsOpen={() => setInstructionsOpen(true)}
          scheduleForm={scheduleForm}
          setScheduleForm={setScheduleForm}
          scheduleSubmitting={scheduleSubmitting}
          scheduleStatus={scheduleStatus}
          onScheduleSubmit={handleScheduleSubmit}
          ticketForm={ticketForm}
          setTicketForm={setTicketForm}
          ticketSubmitting={ticketSubmitting}
          ticketStatus={ticketStatus}
          onTicketSubmit={handleTicketSubmit}
          ticketItems={ticketItems}
          shiftSwapOptions={shiftSwapOptions}
        />
      ) : null}
      OVERFLOW HANDLING:
        - GuardSupportTab is rendered inside <section className="guard-section-frame">
        - guard-section-frame is flexbox column — no overflow-x protection
        - Content is contained by max-w-5xl on the main but no clipping

  - element: "Guard Sticky Region"
