  - element: "guard-sticky-main class"
    type: pattern
    location: "index.css:1214-1216"
    description: |
      .guard-sticky-main {
        padding-bottom: calc(var(--guard-sticky-region-height) + env(safe-area-inset-bottom, 0px));
      }

  - element: "guard-sticky-region class"
    type: pattern
    location: "index.css:1220-1227"
    description: |
      .guard-sticky-region {
        position: fixed;
        left: 0; right: 0; bottom: 0;
        z-index: var(--z-guard-sticky-region);
        padding: 0 var(--space-2) calc(0.5rem + env(safe-area-inset-bottom, 0px));
      }

