open_questions:
  - question: "Have the GitHub Actions Android signing secrets (SENTINEL_ANDROID_KEYSTORE_BASE64 etc.) been configured in the repository?"
    context: "The CI workflow requires these 4 secrets for Android release builds. PRODUCTION_ROLLOUT.md references them but does not confirm they are provisioned."
    type: nice_to_know
    affects: ["android-release"]

  - question: "Is the Tauri updater actually used? The pubkey and endpoint are placeholder env var strings."
    context: "tauri.conf.json has '${TAURI_UPDATER_PUBLIC_KEY}' and '${TAURI_UPDATER_ENDPOINT}' which are not real values and are not set anywhere in CI."
    type: research
    affects: ["desktop-auto-update"]

  - question: "Does the backend have a sqlx-data.json or .sqlx/ directory for SQLX_OFFLINE=true compilation?"
    context: "The backend Dockerfile sets SQLX_OFFLINE=true which requires cached query metadata. If missing, the Docker build fails."
    type: research
    affects: ["backend-docker-build"]

gaps:
  - area: iOS build path
    description: "No iOS build workflow, Capacitor iOS plugin, or Xcode project exists. iOS is completely absent."
