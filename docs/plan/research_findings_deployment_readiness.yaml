patterns_found:
  - category: architecture
    pattern: Monorepo with delegated platform wrappers
    description: Root package.json delegates to DasiaAIO-Frontend scripts, which further delegate to apps/android-capacitor and apps/desktop-tauri
    examples:
      - file: package.json
        location: package.json:10-14
        snippet: '"build:android": "npm run build:android --prefix DasiaAIO-Frontend"'
      - file: DasiaAIO-Frontend/package.json
        location: DasiaAIO-Frontend/package.json:10
        snippet: '"build:android": "vite build --mode mobile && npm run sync --prefix ../apps/android-capacitor"'
    prevalence: common

  - category: architecture
    pattern: Pre-flight environment validation for release builds
    description: ensure-production-env.mjs validates required env vars and rejects private/localhost API URLs before any release build proceeds
    examples:
      - file: DasiaAIO-Frontend/scripts/ensure-production-env.mjs
        location: ensure-production-env.mjs:1-7
        snippet: "const REQUIRED_VARS = ['VITE_API_BASE_URL', 'VITE_APP_VERSION']"
    prevalence: common

  - category: architecture
    pattern: Docker multi-stage builds
    description: Both frontend (Node builder + serve) and backend (Rust builder + debian-slim runtime) use multi-stage Dockerfiles reducing image size
    examples:
      - file: DasiaAIO-Backend/Dockerfile
        location: Dockerfile:2
        snippet: "FROM rust:1.93.1-bookworm AS builder"
      - file: DasiaAIO-Frontend/Dockerfile
        location: Dockerfile:2
        snippet: "FROM node:20-alpine as builder"
    prevalence: common

  - category: naming
    pattern: Deterministic artifact naming
    description: rename-artifacts.js produces sentinel-web-v{ver}.tar.gz, sentinel-desktop-windows-v{ver}.msi/.exe, SENTINEL_v{ver}.apk/.aab
    examples:
      - file: scripts/rename-artifacts.js
        location: rename-artifacts.js:60-63
        snippet: "if (platform === 'web') return `sentinel-web-v${normalizedVersion}`"
    prevalence: common

  - category: structure
    pattern: Version synchronization across all targets
    description: sync-release-version.js updates 4 package.json files + tauri.conf.json + Tauri Cargo.toml + .env.example files from a single version input
    examples:
      - file: scripts/sync-release-version.js
        location: sync-release-version.js:82-93
        snippet: "updateJsonVersion('package.json', versionInfo.appVersion)"
    prevalence: common

  - category: architecture
    pattern: Android signed-only release enforcement
    description: build.gradle fails tasks containing 'release' if signing credentials are missing (unless SENTINEL_ALLOW_UNSIGNED_RELEASE is explicitly true)
    examples:
      - file: apps/android-capacitor/android/app/build.gradle
        location: build.gradle:70-73
        snippet: "throw new RuntimeException('Release signing credentials are required...')"
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: GitHub Actions Release Workflow
      responsibility: Orchestrates multi-platform builds, quality gate, and GitHub Release publishing
      location: .github/workflows/release.yml
      relationship_to_domain: primary deployment pipeline

    - component: Frontend Vite Build System
      responsibility: Produces app-dist/ web bundle in web, mobile, or desktop mode
      location: DasiaAIO-Frontend/vite.config.ts
      relationship_to_domain: core build target consumed by all platform wrappers

    - component: Capacitor Android Wrapper
      responsibility: Wraps web bundle into native Android app with Gradle build
      location: apps/android-capacitor/
      relationship_to_domain: Android release artifact production

    - component: Tauri Desktop Wrapper
      responsibility: Wraps web bundle into native desktop app (MSI/NSIS)
      location: apps/desktop-tauri/
      relationship_to_domain: Desktop release artifact production

    - component: Railway Deployment (Frontend + Backend)
      responsibility: Hosts web SPA and Rust API in production
      location: DasiaAIO-Frontend/railway.json, DasiaAIO-Backend/railway.json
      relationship_to_domain: Production web hosting

    - component: Release Tooling Scripts
      responsibility: Version normalization, sync, release notes generation, artifact renaming
      location: scripts/
      relationship_to_domain: Supports CI and local release workflows

  interfaces_used_by_domain:
    - interface: GitHub Actions Secrets
      location: .github/workflows/release.yml
      usage_pattern: "SENTINEL_ANDROID_KEYSTORE_BASE64, SENTINEL_UPLOAD_STORE_PASSWORD, SENTINEL_UPLOAD_KEY_ALIAS, SENTINEL_UPLOAD_KEY_PASSWORD"

    - interface: Railway Build System
      location: DasiaAIO-Frontend/railway.json, DasiaAIO-Backend/railway.json
      usage_pattern: "Dockerfile builder with health checks"

    - interface: VITE_* Environment Variables
      location: DasiaAIO-Frontend/scripts/ensure-production-env.mjs
      usage_pattern: "VITE_API_BASE_URL, VITE_APP_VERSION, VITE_WHATS_NEW injected at build time"

  data_flow_involving_domain: |
    1. Developer triggers release via git tag push (v*) or manual workflow_dispatch
    2. prepare job resolves version metadata and generates release notes from CHANGELOG.md
    3. quality-gate job runs Jest (frontend) + cargo test (backend) — build fails here if tests fail
    4. web/desktop/android jobs run in parallel, each:
       a. Installs dependencies
       b. Runs sync-release-version.js to align all manifests
       c. Builds platform artifact with production env vars
       d. Renames and uploads artifacts
    5. publish job aggregates all artifacts and creates GitHub Release (tag-triggered only)
    6. Railway deploys frontend/backend independently via Dockerfile on git push to main

  key_relationships_to_domain:
    - from: release.yml
      to: scripts/release-version.js
      relationship: calls
    - from: release.yml
      to: scripts/sync-release-version.js
      relationship: calls
    - from: release.yml
      to: scripts/generate-release-notes.js
      relationship: calls
    - from: release.yml
      to: scripts/rename-artifacts.js
      relationship: calls
    - from: DasiaAIO-Frontend/package.json
      to: apps/android-capacitor/package.json
      relationship: delegates build commands
    - from: DasiaAIO-Frontend/package.json
      to: apps/desktop-tauri/package.json
      relationship: delegates build commands

