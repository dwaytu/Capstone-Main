plan_id: guard-dashboard-uiux-20260403
objective: Research the current SENTINEL guard dashboard frontend implementation and document implementation-aware UI/UX improvement findings.
focus_area: guard-dashboard-frontend
created_at: 2026-04-03
created_by: GitHub Copilot
status: completed

tldr: |
  - The current guard dashboard is centered on one large component, [DasiaAIO-Frontend/src/components/UserDashboard.tsx](DasiaAIO-Frontend/src/components/UserDashboard.tsx), which mixes data loading, location state, action handling, modal flows, and all major guard screens in a single file.
  - The frontend already has stronger reusable structure than the guard view currently uses: [DasiaAIO-Frontend/src/components/layout/OperationalShell.tsx](DasiaAIO-Frontend/src/components/layout/OperationalShell.tsx), [DasiaAIO-Frontend/src/components/Header.tsx](DasiaAIO-Frontend/src/components/Header.tsx), [DasiaAIO-Frontend/src/components/Sidebar.tsx](DasiaAIO-Frontend/src/components/Sidebar.tsx), [DasiaAIO-Frontend/src/components/dashboard/ui/DashboardCard.tsx](DasiaAIO-Frontend/src/components/dashboard/ui/DashboardCard.tsx), and [DasiaAIO-Frontend/src/components/dashboard/ui/StatCard.tsx](DasiaAIO-Frontend/src/components/dashboard/ui/StatCard.tsx).
  - The design system is tokenized and relatively mature in [DasiaAIO-Frontend/src/index.css](DasiaAIO-Frontend/src/index.css) and [DasiaAIO-Frontend/tailwind.config.ts](DasiaAIO-Frontend/tailwind.config.ts), but the guard dashboard mostly uses ad hoc utility stacks instead of the shared cards, bento layout, and shell patterns.
  - The highest-leverage UX gains are concentrated in hierarchy and mobile ergonomics: reducing double-fixed chrome, clarifying navigation, and decomposing support and mission flows into clearer card groups.

requested_report:
  structural_weaknesses:
    - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
      location: DasiaAIO-Frontend/src/components/UserDashboard.tsx:1
      finding: The guard dashboard is a 1352-line component that owns fetching, online/offline handling, location consent/tracking, attendance, tickets, incident reporting, map state, modal state, and all major guard views.
    - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
      location: DasiaAIO-Frontend/src/components/UserDashboard.tsx:86
      finding: Internal information architecture is split between app-level view routing and local section routing. resolveSectionFromView only maps a few app views into guard sections, while the local nav defines its own inbox/mission/resources/support/map/profile model.
    - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
      location: DasiaAIO-Frontend/src/components/UserDashboard.tsx:790
      finding: The main scroll region uses large bottom padding to make room for a fixed action tray and a separate fixed bottom navigation, which reduces visible content height and increases scroll friction on mobile.
    - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
      location: DasiaAIO-Frontend/src/components/UserDashboard.tsx:1160
      finding: A persistent primary-action tray is fixed above a second persistent navigation bar, creating stacked chrome at the bottom of the viewport and compressing content for every guard section, including sections that do not need urgent actions.
    - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
      location: DasiaAIO-Frontend/src/components/UserDashboard.tsx:997
      finding: The support section currently combines protocol access, schedule-change request form, contact directory, support ticket form and ticket history, plus shift swaps in one long vertical stack, which weakens task separation and density control.
    - file: DasiaAIO-Frontend/src/components/dashboard/GuardShiftSwapPanel.tsx
      location: DasiaAIO-Frontend/src/components/dashboard/GuardShiftSwapPanel.tsx:129
      finding: Shift swap submission depends on raw Shift ID and Target Guard ID input instead of guided selection or contextual data from the current guard workload.
    - file: DasiaAIO-Frontend/src/components/dashboard/GuardResourcesTab.tsx
      location: DasiaAIO-Frontend/src/components/dashboard/GuardResourcesTab.tsx:21
      finding: Resources are presented as simple stacked lists without summary hierarchy, status emphasis, or quick-glance metadata grouping.
    - file: DasiaAIO-Frontend/src/components/dashboard/GuardMapTab.tsx
      location: DasiaAIO-Frontend/src/components/dashboard/GuardMapTab.tsx:15
      finding: The map experience is isolated behind a separate tab and an explicit expand/collapse step, which keeps it safe from interfering with mission controls but also makes live location awareness secondary.
  visual_constraints_and_reusable_patterns:
    - file: DasiaAIO-Frontend/src/index.css
      location: DasiaAIO-Frontend/src/index.css:521
      finding: The codebase already has a shared card primitive, soc-dashboard-card, for elevated dashboard surfaces.
    - file: DasiaAIO-Frontend/src/index.css
      location: DasiaAIO-Frontend/src/index.css:536
      finding: The codebase also exposes bento-card and bento-grid style patterns for denser dashboard composition with consistent padding and hover behavior.
    - file: DasiaAIO-Frontend/src/index.css
      location: DasiaAIO-Frontend/src/index.css:865
      finding: Guard-specific tonal treatment already exists through tone-guard-surface and related role chip tokens, so the guard experience can be differentiated without inventing a separate palette.
    - file: DasiaAIO-Frontend/src/index.css
      location: DasiaAIO-Frontend/src/index.css:1133
      finding: Shared warning banner styling already exists and is reused by inbox and global connectivity/location notices.
    - file: DasiaAIO-Frontend/src/index.css
      location: DasiaAIO-Frontend/src/index.css:1398
      finding: The stylesheet includes mobile-specific padding/radius adjustments and forced-colors/reduced-motion support, which provides a solid accessibility baseline for future guard UI refinements.
    - file: DasiaAIO-Frontend/tailwind.config.ts
      location: DasiaAIO-Frontend/tailwind.config.ts:1
      finding: Tailwind is extended with semantic color tokens, custom spacing, rounded corners, bento utilities, and subtle animation primitives rather than relying on raw default Tailwind values alone.
    - file: DasiaAIO-Frontend/src/components/layout/OperationalShell.tsx
      location: DasiaAIO-Frontend/src/components/layout/OperationalShell.tsx:23
      finding: A reusable shell already exists with skip link, fixed header integration, sidebar support, consistent scroll area padding, and error placement.
    - file: DasiaAIO-Frontend/src/components/dashboard/ui/DashboardCard.tsx
      location: DasiaAIO-Frontend/src/components/dashboard/ui/DashboardCard.tsx:12
      finding: DashboardCard provides a consistent title/action/content frame for sectioned panels.
    - file: DasiaAIO-Frontend/src/components/dashboard/ui/StatCard.tsx
      location: DasiaAIO-Frontend/src/components/dashboard/ui/StatCard.tsx:22
      finding: StatCard already supports tone-specific KPI surfaces, including a guard tone, and is used elsewhere for fast-scanning metric rows.
    - file: DasiaAIO-Frontend/src/components/inbox/ActionInbox.tsx
      location: DasiaAIO-Frontend/src/components/inbox/ActionInbox.tsx:98
      finding: The guard inbox already uses the shared dashboard card surface and presents a stronger list hierarchy than most of the mission/resources/support panels.
    - file: DasiaAIO-Frontend/src/components/inbox/WorkflowTimeline.tsx
      location: DasiaAIO-Frontend/src/components/inbox/WorkflowTimeline.tsx:79
      finding: The workflow timeline already shows a reusable, compact vertical event pattern that the rest of the guard experience does not currently echo.
  improvement_opportunities:
    - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
      location: DasiaAIO-Frontend/src/components/UserDashboard.tsx:847
      finding: The mission screen already has a clear duty-status banner; turning the rest of the mission content into a smaller set of card-based groups around that banner would make the page hierarchy more legible and reduce the current list-of-sections feel.
    - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
      location: DasiaAIO-Frontend/src/components/UserDashboard.tsx:790
      finding: Removing or consolidating one of the two fixed bottom layers would immediately improve visible content depth, reduce safe-area padding requirements, and lower thumb travel between content and actions.
    - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
      location: DasiaAIO-Frontend/src/components/UserDashboard.tsx:749
      finding: The current guard navigation is simple but flat. The existing screen structure suggests a clearer split between immediate work (Inbox, Mission) and secondary utilities (Resources, Support, Map, Profile).
    - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
      location: DasiaAIO-Frontend/src/components/UserDashboard.tsx:997
      finding: The support area is currently the densest screen in the guard dashboard; it would benefit most from being broken into smaller card groups or progressive disclosure because it mixes unrelated workflows in one vertical pass.
    - file: DasiaAIO-Frontend/src/components/dashboard/GuardResourcesTab.tsx
      location: DasiaAIO-Frontend/src/components/dashboard/GuardResourcesTab.tsx:21
      finding: Resources can adopt the existing StatCard and DashboardCard patterns to surface assignment count, permit status, and expiry emphasis before the detailed lists.
    - file: DasiaAIO-Frontend/src/components/dashboard/GuardMapTab.tsx
      location: DasiaAIO-Frontend/src/components/dashboard/GuardMapTab.tsx:15
      finding: The map tab already separates high-risk map interaction from mission controls; the missing layer is a lightweight mission-level location summary or preview so map awareness is not hidden behind a secondary tab.
    - file: DasiaAIO-Frontend/src/components/dashboard/GuardShiftSwapPanel.tsx
      location: DasiaAIO-Frontend/src/components/dashboard/GuardShiftSwapPanel.tsx:129
      finding: Replacing freeform IDs with contextual selectors or current-shift-derived options would reduce cognitive load and error potential more than cosmetic styling changes alone.
    - file: DasiaAIO-Frontend/src/components/layout/OperationalShell.tsx
      location: DasiaAIO-Frontend/src/components/layout/OperationalShell.tsx:23
      finding: Adopting the shared shell would align guard navigation, header behavior, and scroll mechanics with the stronger patterns already used by admin and superadmin experiences.
  highest_leverage_files:
    - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
      reason: This is the current orchestration point for guard IA, section hierarchy, bottom chrome, mission density, support sprawl, and modal placement.
    - file: DasiaAIO-Frontend/src/components/layout/OperationalShell.tsx
      reason: This is the strongest existing structure for consistent header/sidebar/scroll behavior and would determine whether the guard experience joins the shared operational shell.
    - file: DasiaAIO-Frontend/src/components/Header.tsx
      reason: If the guard dashboard adopts the shared shell, header behavior and the balance between title, actions, notifications, and account controls become central.
    - file: DasiaAIO-Frontend/src/components/Sidebar.tsx
      reason: This controls the existing sidebar navigation model and would shape any shift away from the current guard-only bottom-tab approach.
    - file: DasiaAIO-Frontend/src/components/dashboard/GuardResourcesTab.tsx
      reason: This is a small, low-risk surface where stronger hierarchy and density patterns can be introduced quickly.
    - file: DasiaAIO-Frontend/src/components/dashboard/GuardMapTab.tsx
      reason: This owns the current map affordance and determines whether map remains secondary, preview-based, or expanded.
    - file: DasiaAIO-Frontend/src/components/dashboard/GuardShiftSwapPanel.tsx
      reason: This is the most workflow-heavy support subpanel and currently exposes the highest-input-friction interaction.

