patterns_found:
  - category: architecture
    pattern: Large role-specific page components own both orchestration and rendering.
    description: The guard dashboard concentrates business logic, network calls, local view routing, and presentational layout in one component rather than composing a thinner shell plus smaller scene components.
    examples:
      - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
        location: DasiaAIO-Frontend/src/components/UserDashboard.tsx:1
        snippet: Guard dashboard state, fetch logic, modal control, fixed action tray, and bottom nav are all colocated.
    prevalence: common
  - category: structure
    pattern: Shared shell exists for operational dashboards, but guard does not use it.
    description: Admin and superadmin pages use OperationalShell while the guard dashboard defines its own sticky header and fixed bottom navigation model.
    examples:
      - file: DasiaAIO-Frontend/src/components/AdminDashboard.tsx
        location: DasiaAIO-Frontend/src/components/AdminDashboard.tsx:517
        snippet: AdminDashboard is wrapped in OperationalShell.
      - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
        location: DasiaAIO-Frontend/src/components/UserDashboard.tsx:760
        snippet: UserDashboard renders its own header, main container, action tray, and bottom nav.
    prevalence: occasional
  - category: design_system
    pattern: Semantic tokens and shared surfaces are already established.
    description: Cards, warning banners, tone surfaces, mobile overrides, and semantic colors are centralized in index.css and Tailwind config.
    examples:
      - file: DasiaAIO-Frontend/src/index.css
        location: DasiaAIO-Frontend/src/index.css:521
        snippet: soc-dashboard-card shared dashboard surface.
      - file: DasiaAIO-Frontend/src/index.css
        location: DasiaAIO-Frontend/src/index.css:865
        snippet: tone-guard-surface shared guard accent treatment.
    prevalence: common
  - category: design_system
    pattern: Guard inbox uses stronger reusable patterns than the rest of the guard dashboard.
    description: The inbox composes shared card surfaces and compact list/timeline patterns, while mission/resources/support rely more on manual section styling.
    examples:
      - file: DasiaAIO-Frontend/src/components/inbox/ActionInbox.tsx
        location: DasiaAIO-Frontend/src/components/inbox/ActionInbox.tsx:98
        snippet: Inbox list is rendered inside soc-dashboard-card.
      - file: DasiaAIO-Frontend/src/components/inbox/WorkflowTimeline.tsx
        location: DasiaAIO-Frontend/src/components/inbox/WorkflowTimeline.tsx:79
        snippet: Timeline uses the same shared card surface.
    prevalence: occasional
  - category: mobile
    pattern: Guard uses bottom-fixed interaction model instead of shared drawer navigation.
    description: The guard dashboard keeps the primary action tray and the primary nav permanently docked at the bottom, with compensating padding in the main scroll area.
    examples:
      - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
        location: DasiaAIO-Frontend/src/components/UserDashboard.tsx:790
        snippet: main uses large bottom padding for fixed controls.
      - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
        location: DasiaAIO-Frontend/src/components/UserDashboard.tsx:1160
        snippet: fixed action tray above fixed bottom navigation.
    prevalence: rare

