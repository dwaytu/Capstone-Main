  scope: Guard-specific frontend only, centered on UserDashboard, guard subpanels, shell/layout primitives, shared style tokens, and app-level routing relevant to the guard entry flow.
  confidence: high
  coverage: 91
  decision_blockers: 0
  research_blockers: 1

