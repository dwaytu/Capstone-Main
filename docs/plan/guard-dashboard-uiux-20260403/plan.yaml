plan_id: guard-dashboard-uiux-20260403
objective: Improve the SENTINEL guard dashboard UI/UX within the current frontend architecture by tightening first-screen hierarchy, reducing stacked bottom chrome, clarifying resources and support information architecture, and reusing shared dashboard patterns.
created_at: 2026-04-03
created_by: GitHub Copilot
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 6
  risk_score: medium

tldr: |
  Deliver a bounded guard-dashboard refresh without moving guards onto the full sidebar shell or changing backend contracts.
  Center the work in UserDashboard, GuardResourcesTab, GuardMapTab, GuardShiftSwapPanel, and a minimal shared CSS helper layer in src/index.css.
  Prioritize one visible bottom action/navigation treatment, stronger mission-first hierarchy, clearer support grouping, and better reuse of existing DashboardCard, StatCard, and SectionHeader patterns.

open_questions:
  - Confirm that the current guard experience should remain bottom-nav based in this tranche. This plan assumes yes and avoids a full migration to OperationalShell and Sidebar.
  - Confirm whether a guard directory endpoint already exists for target-guard lookup. This plan assumes no new endpoint and only replaces raw Shift ID entry with contextual shift selection.
  - Confirm the preferred guard test fixture for Playwright coverage. Existing smoke coverage appears admin-oriented.

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Consolidating bottom chrome hides or delays access to check-in and incident actions on small screens.
      likelihood: medium
      impact: high
      mitigation: Keep one sticky action region with explicit safe-area padding and verify reachability at 320px width and common Android viewport heights.
    - scenario: Support-section cleanup breaks existing form submission flows because UserDashboard currently owns all support state and handlers.
      likelihood: medium
      impact: high
      mitigation: Restructure support into presentation groups only, preserve existing handlers and payload shapes, and add guard-flow smoke coverage for instructions, ticket submission, and swap request entry.
    - scenario: Shift swap improvements overreach current data availability and implicitly require new backend endpoints.
      likelihood: medium
      impact: medium
      mitigation: Limit the tranche to current-shift-derived selection and stronger guidance, while preserving a manual target-guard fallback until a directory data source is confirmed.
  assumptions:
    - No backend or API contract changes are required for this tranche.
    - Existing shared primitives DashboardCard, StatCard, and SectionHeader are stable and reusable for the guard experience.
    - Mobile ergonomics are the primary optimization target, with desktop improvements following the same composition rules.
    - App.tsx, Header.tsx, Sidebar.tsx, and OperationalShell.tsx remain reference patterns only and are not migrated in this tranche.

implementation_specification:
  code_structure: >
    Keep the current guard dashboard architecture intact. Recompose the existing UserDashboard screen into clearer visual groups using imported shared primitives and a small guard-specific CSS helper layer in src/index.css. Limit structural changes to presentational hierarchy, sticky chrome behavior, and prop wiring into GuardResourcesTab, GuardMapTab, and GuardShiftSwapPanel.
  affected_areas:
    - DasiaAIO-Frontend/src/components/UserDashboard.tsx
    - DasiaAIO-Frontend/src/components/dashboard/GuardResourcesTab.tsx
    - DasiaAIO-Frontend/src/components/dashboard/GuardMapTab.tsx
    - DasiaAIO-Frontend/src/components/dashboard/GuardShiftSwapPanel.tsx
    - DasiaAIO-Frontend/src/index.css
    - DasiaAIO-Frontend/tests/guard-dashboard.spec.ts
  component_details:
    - component: guard dashboard mission frame
      responsibility: Present the top-of-screen duty status, active shift context, primary actions, and first supporting cards in a single high-signal viewport without stacked fixed bars.
      interfaces:
        - UserDashboard local state continues to own attendance, shifts, incident modal, instructions modal, and location summary.
        - Guard section navigation remains section-based and does not require route or API changes.
    - component: guard support workspace
      responsibility: Break support into smaller card groups for instructions, schedule change, support tickets, and shift swaps while preserving existing handlers and submit payloads.
      interfaces:
        - GuardShiftSwapPanel receives contextual shift option props from UserDashboard.
        - Existing ticket and schedule submit handlers remain unchanged.
    - component: guard resources workspace
      responsibility: Add summary-first hierarchy for firearms and permits using existing StatCard and DashboardCard primitives before detailed rows.
      interfaces:
        - GuardResourcesTab continues to receive firearmItems and permitItems arrays.
    - component: guard map workspace
      responsibility: Expose a stronger map summary and location-status hierarchy before expansion, while preserving expand and external-link behavior.
      interfaces:
        - GuardMapTab continues to receive mapExpanded, onToggleExpand, mapEmbedUrl, mapExternalUrl, and lastKnownLocation.
    - component: guard ui helper layer
      responsibility: Provide minimal reusable classes for guard quick actions, section framing, and safe-area-aware sticky spacing without introducing a new design system.
      interfaces:
        - UserDashboard, GuardResourcesTab, GuardMapTab, and GuardShiftSwapPanel may consume new helper classes defined in src/index.css.
  dependencies:
    - component: shared dashboard UI primitives
      relationship: UserDashboard and guard tabs should reuse DashboardCard, StatCard, and SectionHeader instead of ad hoc bordered sections.
    - component: existing guard data loaders
      relationship: Current fetch and form handlers remain source-of-truth; this plan changes presentation and prop composition only.
    - component: existing role and theme tokens
      relationship: Guard UI refinements must use existing semantic colors, tone-guard-surface, and safe-area patterns from src/index.css.
  integration_points:
    - UserDashboard mission section and bottom navigation and action region.
    - UserDashboard support section composition and modal triggers.
    - GuardResourcesTab list rendering.
    - GuardMapTab summary block and expansion affordance.
    - GuardShiftSwapPanel request form inputs.
    - Playwright guard-role smoke coverage.

