      2. Introduce a mission-first header block using existing shared primitives for duty status, current shift, elapsed time, and connectivity and location state.
      3. Reframe the mission view into fewer, clearer card groups so the first viewport surfaces what the guard needs now rather than a long vertical list.
      4. Preserve all current modal entry points, handlers, and guard-section names.
