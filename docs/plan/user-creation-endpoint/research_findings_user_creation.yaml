plan_id: user-creation-endpoint
objective: "Research the SENTINEL backend POST /api/users endpoint and compare with frontend Add User form"
focus_area: user-creation-endpoint
created_at: "2026-04-10"
created_by: gem-researcher
status: completed

tldr: |
  - Backend handler `create_user_by_actor` in handlers/users.rs uses `CreateManagedUserRequest` (10 fields, camelCase serde)
  - Frontend sends only 4 fields: { name, email, password, role } — missing 6 of 10 backend fields
  - Critical mismatch: frontend sends `name` but backend expects `fullName` + `username` — both are required non-optional String fields
  - Backend will reject the frontend request with 400 because `username`, `fullName`, and `phoneNumber` are missing required fields
  - Additionally, guards require `licenseNumber`, `licenseIssuedDate`, `licenseExpiryDate` — frontend has no UI for these

