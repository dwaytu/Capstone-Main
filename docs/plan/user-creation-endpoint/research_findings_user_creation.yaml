mismatches:
  - severity: critical
    field: name → fullName
    description: |
      Frontend sends `name` but backend expects `fullName` (camelCase of `full_name`).
      The backend struct has NO `name` field — serde with `deny_unknown_fields` would reject it,
      BUT the handler struct does NOT use `deny_unknown_fields` so `name` is silently ignored.
      Meanwhile `fullName` is missing, so the String default ("") triggers the handler's
      empty-string check → 400 "full name is required".

  - severity: critical
    field: username (missing)
    description: |
      Frontend does not send `username` at all. Backend requires it as a non-empty String.
      serde deserialization will fail with a missing-field error before the handler even runs.

  - severity: critical
    field: phoneNumber (missing)
    description: |
      Frontend does not send `phoneNumber`. Backend requires it as a non-empty String.
      serde deserialization will fail with a missing-field error.

  - severity: high
    field: licenseNumber / licenseIssuedDate / licenseExpiryDate (missing for guards)
    description: |
      Frontend has no UI fields for guard license info. If role=guard is selected,
      the handler will return 400 "Guard accounts require license number and license dates".
      Non-guard roles would succeed once the critical mismatches above are fixed.

  - severity: low
    field: address (missing)
    description: |
      Frontend does not send `address`, but this is Option<String> so it defaults to None.
      Not a breaking issue.

