      likelihood: medium
      impact: high
      mitigation: Require a drift matrix and synchronized updates to plan file plus documentation references with explicit "completed vs pending" mapping before Wave 4 execution starts.
    - scenario: Bulk replacement of cloudyrowdyyy touches historical evidence or non-operational records, causing audit-data corruption or misleading provenance.
      likelihood: medium
      impact: high
