tldr: |
  - Identity and access are implemented with JWT access/refresh flows, role/permission checks, legal-consent enforcement, and auth abuse controls.
  - Workforce, asset, mission, trip, incident, notification, and support workflows are actively wired in backend routes with protected access.
  - Tracking includes guarded heartbeat ingestion, map snapshots, geofences, proximity alerts, and authenticated websocket updates.
  - Analytics and AI support combine operational KPIs with persisted prediction/classification/summarization outputs.
  - Delivery supports web, Android, and desktop wrappers, with release CI quality gates and signed Android artifact requirements.

