  - id: "w1-t1-router-setup"
    title: "Install React Router and create route infrastructure"
    description: |
      Install react-router (v7, library mode) and create the routing infrastructure.

      1. Add react-router dependency to package.json.
      2. Create src/router/routes.ts with path constants mapping old activeView keys:
         - "/" → redirect to role-based home
         - "/login" → LoginPage
         - "/dashboard" → SuperadminDashboard/AdminDashboard (admin/superadmin)
         - "/overview" → UserDashboard (guard)
         - "/calendar" → CalendarDashboard
         - "/performance" → PerformanceDashboard
         - "/merit" → MeritScoreDashboard
         - "/firearms" → FirearmInventory
         - "/allocation" → FirearmAllocation
         - "/permits" → GuardFirearmPermits
         - "/maintenance" → FirearmMaintenance
         - "/armored-cars" → ArmoredCarDashboard
         - "/profile" → ProfileDashboard
         - "/settings" → SettingsView
         - "/analytics" → AnalyticsDashboard
         - "/audit" → AuditDashboard
         - "*" → 404 redirect to home
      3. Create src/router/guards.tsx with AuthGuard and RoleGuard components.
         - AuthGuard: redirects to /login if not authenticated
         - RoleGuard: checks user.role against allowed roles array, shows access denied if unauthorized
      4. Create src/router/index.tsx with createBrowserRouter configuration using lazy() for code splitting.
      5. Update src/main.tsx to wrap app with RouterProvider.
      6. Ensure Vite dev server has historyApiFallback (already default with Vite).

      Key constraint: Do NOT remove activeView from App.tsx yet — this task only ADDS
      the router infrastructure alongside existing navigation. Integration happens in w1-t3.
