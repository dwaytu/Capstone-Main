deferred_to_next_cycle:
  - finding: "HIGH-4: Migrations have no versioning/rollback"
    justification: |
      Migration versioning requires adopting a migration tool (e.g., sqlx-cli migrate)
      and retrofitting all existing .sql files. This is a process change that affects
      the entire backend workflow and should be planned as a dedicated task, not
      squeezed into a security-focused cycle.
  - finding: "HIGH-8: No structured logging / request ID tracing"
    justification: |
      Structured logging (tracing crate integration, request ID middleware, JSON log
      output) is a cross-cutting concern that touches every handler. Adding it alongside
      JWT separation and other security changes risks merge conflicts and dilutes review
      focus. Better as a standalone infrastructure task.
  - finding: "HIGH-9: Location heartbeat fire-and-forget / no offline queue"
    justification: |
      Offline queue for location heartbeats requires Capacitor/Tauri platform-specific
      storage, background task scheduling, and retry logic. This is a mobile-focused
      feature that requires dedicated testing on physical devices and emulators.

