  - id: "w3-t5-rate-limit-persistence"
    title: "Add persistent backing to rate limiter"
    description: |
      Backend fix: Replace ephemeral in-memory rate limiting with a persistent solution.

      Option A (preferred if Redis available on Railway):
        - Add Redis connection to rate_limit.rs
        - Use Redis INCR + EXPIRE for sliding window rate limiting
        - Add REDIS_URL env var support
        - Fall back to in-memory if Redis unavailable

      Option B (no Redis):
        - Use PostgreSQL advisory locks or a rate_limit_entries table
        - Periodic cleanup of expired entries
        - Simpler but adds DB load

      NOTE: If Redis is not available on Railway, implement Option B (PostgreSQL
      advisory locks with rate_limit_entries table). Steps:
      (1) Create migration for rate_limit_entries table with columns: key TEXT,
          counter INT, window_start TIMESTAMPTZ, expires_at TIMESTAMPTZ.
      (2) Update RateLimiter to query/upsert this table.
      (3) Add periodic cleanup of expired entries.
      Verification criteria remain the same regardless of backend chosen.

      Implementation (Option A):
      1. Add redis crate to Cargo.toml
      2. Update RateLimiter to support Redis backend:
         - RateLimiter::new(redis_url: Option<String>) — connects to Redis or falls back to in-memory
         - check_rate_limit uses INCR/EXPIRE in Redis
         - Graceful degradation: if Redis is down, fall back to in-memory
