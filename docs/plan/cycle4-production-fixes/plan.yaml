plan_id: cycle4-production-fixes
objective: |
  Fix 5 BLOCKING + 9 HIGH + 6 MEDIUM issues identified in SENTINEL Phase 1/2 audit.
  Primary focus: React Router integration, App.tsx decomposition, auth hardening,
  backend security fixes, and UX polish. Transform SENTINEL from prototype to
  production-grade across frontend and backend.
created_at: "2026-04-04T00:00:00Z"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 6
  total_dependencies: 29
  risk_score: high

tldr: |
  Four-wave plan addressing 17 of 20 audit findings (3 HIGH deferred to next cycle):
  - Wave 1 (6 tasks): React Router integration + App.tsx god-component decomposition.
    This is the largest architectural change — string-based activeView state replaced
    with React Router v7, role-based route guards, and URL-based navigation. App.tsx
    (~1300 lines, ~20 useState hooks) is split into composable modules.
  - Wave 2 (4 tasks): Auth hardening (XSS mitigations, cross-tab session sync, CSP
    meta tag, toast notification system replacing single globalError).
  - Wave 3 (6 tasks): Backend security (JWT secret separation, docker-compose secret
    externalization, Redis-backed rate limiting, WebSocket auth, health endpoint auth,
    structured logging).
  - Wave 4 (4 tasks): UX polish (password strength indicator, date input UX, bundle
    optimization, code review of all changes).
  Total: 20 tasks across 4 waves. Frontend-first strategy — Waves 1-2 are immediately
  testable. Wave 3 requires Rust changes + Railway redeployment. Wave 4 is polish.
  3 HIGH audit findings deferred: migration versioning/rollback, structured logging,
  location heartbeat offline queue.

open_questions:
  - "Backend cookie-based auth: Should we implement httpOnly cookie JWT in this cycle or defer to a future cycle? Current plan adds CSP + XSS mitigations as interim."
  - "React Router version: v7 (latest) or v6? v7 has framework mode but we only need library mode. Plan assumes react-router v7 in library mode."
  - "Rate limiting backend: Redis vs PostgreSQL-backed rate limiting? Plan assumes Redis since Railway supports Redis add-on."

pre_mortem:
  overall_risk_level: high
  critical_failure_modes:
    - scenario: "React Router migration breaks all navigation across 4 roles"
      likelihood: medium
      impact: critical
      mitigation: |
        Incremental migration: keep viewRegistry as fallback during transition.
        Each route is tested per-role before removing old activeView paths.
        Rollback strategy: git revert of Wave 1 commits if router integration
        fails verification. Each sub-task (t3a/t3b/t3c) is a separate commit
        for granular rollback.
    - scenario: "App.tsx decomposition introduces state synchronization bugs"
      likelihood: medium
      impact: high
      mitigation: |
        Extract state into context providers one at a time. Each extraction is
        a separate commit. Auth context first (most critical), then UI state.
        Existing behavior preserved via pass-through props during transition.
    - scenario: "Backend JWT secret separation breaks existing tokens"
      likelihood: high
      impact: high
      mitigation: |
        Dual-secret validation: new code tries REFRESH_JWT_SECRET first, falls
        back to JWT_SECRET for tokens issued before migration. Communicate token
        rotation window to users (re-login within 7 days).
    - scenario: "Railway redeployment fails or introduces downtime"
      likelihood: low
      impact: high
      mitigation: |
        Stage all backend changes locally with docker-compose first. Deploy to
        Railway staging environment if available. Keep previous deployment as
        rollback target.
    - scenario: "Bundle size increases from adding react-router"
      likelihood: low
      impact: medium
      mitigation: |
        react-router is ~14KB gzipped. Combined with code-splitting improvements
        in Wave 4, net bundle size should decrease. Monitor with vite build output.
  assumptions:
    - "React Router v7 will be used in library mode (not framework mode)"
    - "No backend API contract changes needed for frontend routing — all routes are client-side"
    - "Existing component props (user, onLogout, onViewChange, activeView) can be replaced with hooks/context"
    - "Railway deployment supports environment variable updates without downtime"
    - "Redis add-on is available on Railway for persistent rate limiting"
    - "All 4 roles (guard, supervisor, admin, superadmin) must work after each wave"

implementation_specification:
  code_structure: |
    Frontend restructure:
      src/
        router/
          index.tsx          — Route definitions, lazy loading
          guards.tsx         — RoleGuard, AuthGuard components
          routes.ts          — Route path constants
        context/
          AuthContext.tsx     — Auth state (user, login, logout, tokens)
          UIContext.tsx       — UI state (errors, notifications, modals)
          LocationContext.tsx — Location consent + geo state
        hooks/
          useAuth.ts         — Hook wrapping AuthContext
          useToast.ts        — Toast notification hook
          useSessionSync.ts  — Cross-tab session sync
        components/
          layout/
            AppShell.tsx     — Main layout (sidebar + header + outlet)
            MobileNav.tsx    — Mobile bottom navigation
          shared/
            ToastContainer.tsx — Toast notification stack
            PasswordStrength.tsx — Password strength indicator

    Backend changes (minimal, targeted):
      src/
        utils.rs             — Separate JWT secrets
        middleware/
          rate_limit.rs      — Redis-backed rate limiting
          ws_auth.rs         — WebSocket auth middleware
        handlers/
          health.rs          — Auth-gated system health
        config.rs            — Remove weak ADMIN_CODE default

  affected_areas:
    - "DasiaAIO-Frontend/src/App.tsx — complete decomposition"
    - "DasiaAIO-Frontend/src/router/ — new directory"
    - "DasiaAIO-Frontend/src/context/ — new/expanded context providers"
    - "DasiaAIO-Frontend/src/components/layout/ — AppShell extraction"
    - "DasiaAIO-Frontend/src/components/LoginPage.tsx — password strength"
    - "DasiaAIO-Frontend/src/utils/api.ts — CSP, sanitization"
    - "DasiaAIO-Frontend/src/main.tsx — wrap with RouterProvider"
    - "DasiaAIO-Frontend/package.json — add react-router dependency"
    - "DasiaAIO-Frontend/index.html — CSP meta tag"
    - "DasiaAIO-Backend/src/utils.rs — JWT secret separation"
    - "DasiaAIO-Backend/src/middleware/rate_limit.rs — Redis backing"
    - "DasiaAIO-Backend/src/handlers/health.rs — auth gate"
    - "DasiaAIO-Backend/src/routes.rs — WS auth middleware"
    - "DasiaAIO-Backend/docker-compose.yml — secret externalization"
    - "DasiaAIO-Backend/src/config.rs — ADMIN_CODE strength"

  component_details:
    - component: "Router (src/router/)"
      responsibility: |
        Define all application routes with role-based access control.
        Lazy-load dashboard components. Map old activeView keys to URL paths.
      interfaces:
        - "RouteDefinition[] — array of path, element, roles, lazy component"
        - "RoleGuard — wrapper component checking user.role against allowed roles"
        - "AuthGuard — wrapper component redirecting unauthenticated users to /login"
        - "ROUTES constant — centralized path strings"

    - component: "AuthContext (src/context/AuthContext.tsx)"
      responsibility: |
        Manage authentication state: user object, tokens, login/logout handlers,
        token refresh, legal consent status. Replace ~8 useState hooks from App.tsx.
      interfaces:
        - "useAuth() — { user, isLoggedIn, login, logout, isLoading }"
        - "AuthProvider — context provider wrapping app"

    - component: "UIContext (src/context/UIContext.tsx)"
      responsibility: |
        Manage UI-level state: toast notifications (replacing globalError),
        modal state, release prompts, what's-new prompts.
      interfaces:
        - "useUI() — { toasts, addToast, removeToast, releasePrompt, whatsNew }"
        - "UIProvider — context provider"

    - component: "AppShell (src/components/layout/AppShell.tsx)"
      responsibility: |
        Main authenticated layout: sidebar, header, mobile nav, content outlet.
        Extracted from App.tsx render tree.
      interfaces:
        - "AppShell — layout component with <Outlet /> for nested routes"
        - "Props: user, onLogout (from context, not props)"

    - component: "ToastContainer (src/components/shared/ToastContainer.tsx)"
      responsibility: |
        Render a stack of toast notifications. Auto-dismiss after timeout.
        Supports error, warning, success, info types. Replaces single globalError.
      interfaces:
        - "Toast type — { id, type, message, duration }"
        - "Renders from UIContext toast array"

    - component: "SessionSync (src/hooks/useSessionSync.ts)"
      responsibility: |
        Listen for storage events and BroadcastChannel messages to sync
        login/logout across browser tabs.
      interfaces:
        - "useSessionSync(onLogout) — hook that triggers logout in other tabs"

  dependencies:
    - component: "Router"
      relationship: "Depends on AuthContext for user/role info in route guards"
    - component: "AppShell"
      relationship: "Consumes AuthContext for user data, UIContext for toasts/modals"
    - component: "ToastContainer"
      relationship: "Reads from UIContext toast array"
    - component: "SessionSync"
      relationship: "Calls AuthContext logout when cross-tab event detected"

  integration_points:
    - "main.tsx wraps app with BrowserRouter + AuthProvider + UIProvider"
    - "All dashboard components receive user from useAuth() instead of props"
    - "Sidebar/Header use useNavigate() instead of onViewChange callback"
    - "LoginPage calls useAuth().login() and navigates via useNavigate()"
    - "Backend JWT changes require frontend token refresh to work with new secrets"

