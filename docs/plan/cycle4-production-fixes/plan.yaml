  - id: "w1-t2-auth-context"
    title: "Extract auth state into AuthContext provider"
    description: |
      Extract authentication state from App.tsx into a dedicated AuthContext.

      1. Create src/context/AuthContext.tsx:
         - Move these useState hooks from App.tsx:
           isLoggedIn, user, isLoading, hasAcceptedToa, toaChecked, toaError
         - Move these handlers: handleLogin, handleLogout, handleAcceptToa, handleDeclineToa
         - Move auth restoration useEffect (restoreAuth)
         - Move token-expired event listener useEffect
         - Export AuthProvider and useAuth hook
      2. AuthProvider wraps children and provides:
         - user: User | null
         - isLoggedIn: boolean
         - isLoading: boolean
         - hasAcceptedToa: boolean
         - login(userData: User): void
         - logout(): void
         - acceptToa(): Promise<void>
         - declineToa(): void
      3. Update main.tsx: wrap RouterProvider with AuthProvider.
      4. Do NOT yet remove the corresponding state from App.tsx — that happens in w1-t3.
         This task creates the context; w1-t3 wires it up.

      Design: AuthContext reads/writes localStorage and SecureStorage (Capacitor)
      for token management, delegating to existing api.ts functions.
