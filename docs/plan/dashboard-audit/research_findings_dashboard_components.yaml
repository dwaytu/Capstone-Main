domain_security_considerations:
  sensitive_areas:
    - area: "User management tables"
      location: "AdminDashboard.tsx, SuperadminDashboard.tsx"
      concern: "Display user emails, phone numbers, license numbers; role-based row visibility is enforced"
    - area: "Approval workflow"
      location: "AdminDashboard.tsx:~400-500, SuperadminDashboard.tsx:~400-550"
      concern: "approve/reject calls use getAuthHeaders() for auth; no CSRF token visible"
    - area: "Firearm allocation"
      location: "FirearmAllocation.tsx:130-160"
      concern: "Issues firearms to guards via POST; uses Content-Type + auth headers"
  authentication_patterns_in_domain: "All API calls use getAuthHeaders() which reads JWT from storage"
  authorization_patterns_in_domain: |
    AdminDashboard: canViewUserRow() restricts visible users by viewer role.
    CalendarDashboard: isAdmin check determines all-shifts vs my-shifts API.
    Resource pages: No explicit role checks in component — rely on backend RBAC.
  data_validation_in_domain: "Form inputs use required attribute; no client-side validation beyond that"

open_questions:
  - question: "Which Header.tsx is canonical — ./Header.tsx or ./shared/Header.tsx?"
    context: "OperationalShell imports from ../shared/Header, but 8 resource pages import from ./Header. These may be different components."
    type: research
    affects: ["shell-consolidation"]

  - question: "Are GuardSchedule and ReportsAnalytics stubs intentionally retained or should they be removed/replaced?"
    context: "Both are 7-line components with hardcoded gray text and no functionality. Calendar appears to have absorbed schedule functionality."
    type: nice_to_know
    affects: ["cleanup"]

  - question: "Should AnalyticsDashboard accept user/onLogout props or remain a shell-less FC?"
    context: "Currently defined as FC (no props). This works because it's embedded inside SuperadminDashboard's shell. If ever rendered standalone, it would need shell props."
    type: nice_to_know
    affects: ["shell-consolidation"]

gaps:
  - area: "AlertsCenter component not examined"
    description: "AlertsCenter.tsx exists but was not in the research scope. May contain dashboard-like patterns."
    impact: nice_to_know
    affects: []

  - area: "NotificationCenter/NotificationPanel not examined"
    description: "Notification components exist and are imported by SuperadminDashboard but not analyzed in this research."
    impact: nice_to_know
    affects: []

  - area: "Inbox panels not individually examined"
    description: "GuardInboxPanel, SupervisorInboxPanel, AdminInboxPanel, SuperadminInboxPanel exist and are rendered inside their respective dashboards. Individual structure not analyzed."
    impact: nice_to_know
    affects: []

