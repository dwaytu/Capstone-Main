plan_id: dashboard-audit
objective: "Deep-dive into all dashboard and page components to catalog structure, quality, patterns, and improvement opportunities"
focus_area: dashboard_components
created_at: "2026-04-05T00:00:00Z"
created_by: gem-researcher
status: completed

tldr: |
  - 22 page/dashboard components totaling ~8,500 lines; 3 mega-components (SuperadminDashboard 1780, AdminDashboard 1140, UserDashboard 1165) contain duplicated sub-components (UserAvatar, RoleBadge, StatusIndicator, utility functions).
  - Shell inconsistency: AdminDashboard and SuperadminDashboard use OperationalShell; 8 resource pages (Firearms, Permits, Maintenance, etc.) import Sidebar+Header directly with hardcoded navItems; AnalyticsDashboard/AuditDashboard/TripManagement are shell-less embedded content panels.
  - Loading/empty/error state quality varies wildly: CommandCenter and Analytics have exemplary DashboardLoadingState; resource pages use bare "Loading..." text with hardcoded indigo-600 color (off-token); 2 stub components (GuardSchedule, ReportsAnalytics) render a single div.
  - 5 resource pages (FirearmInventory, FirearmAllocation, FirearmMaintenance, GuardFirearmPermits, ArmoredCarDashboard) duplicate a hardcoded navItems array instead of using getSidebarNav() from config/navigation.
  - Mobile responsiveness: All major dashboards use responsive grid classes (grid-cols-1 md:grid-cols-3); CalendarDashboard is the most responsive with dedicated mobile filter toggles. Resource table pages have overflow-x-auto but no card-based mobile layout.

research_metadata:
  methodology: "Hybrid retrieval (file_search + grep_search + read_file); relationship discovery via import tracing; sequential analysis of 22 component files"
  scope: "All dashboard, page, and view components under DasiaAIO-Frontend/src/components/"
  confidence: high
  coverage: 95
  decision_blockers: 0
  research_blockers: 0

