patterns_found:
  - category: architecture
    pattern: "Shell duplication — two patterns coexist"
    description: |
      AdminDashboard and SuperadminDashboard use the OperationalShell wrapper (which includes Sidebar, Header, skip-link).
      8 standalone resource pages (FirearmInventory, FirearmAllocation, FirearmMaintenance, GuardFirearmPermits,
      ArmoredCarDashboard, PerformanceDashboard, MeritScoreDashboard, ProfileDashboard, CalendarDashboard)
      import Sidebar and Header directly, re-implementing the shell pattern each time.
      3 components (AnalyticsDashboard, AuditDashboard, TripManagement) are shell-less content panels
      rendered inside a parent shell.
    examples:
      - file: FirearmInventory.tsx
        location: "FirearmInventory.tsx:5-6"
        snippet: "import Sidebar from './Sidebar'\nimport Header from './Header'"
      - file: AdminDashboard.tsx
        location: "AdminDashboard.tsx:8"
        snippet: "import OperationalShell from './layout/OperationalShell'"
    prevalence: common

  - category: architecture
    pattern: "Hardcoded navItems arrays in resource pages"
    description: |
      FirearmInventory, FirearmAllocation, FirearmMaintenance, GuardFirearmPermits, and ArmoredCarDashboard
      each contain an identical hardcoded navItems array (~14 items). These do not use getSidebarNav() from
      config/navigation.ts. Any nav structure change must be updated in 6+ places.
    examples:
      - file: FirearmInventory.tsx
        location: "FirearmInventory.tsx:38-52"
        snippet: "const navItems = [\n  { view: 'dashboard', label: 'Dashboard', group: 'MAIN MENU' },\n  ..."
      - file: FirearmMaintenance.tsx
        location: "FirearmMaintenance.tsx:31-45"
        snippet: "const navItems = [ ... ] // identical array"
    prevalence: common

  - category: architecture
    pattern: "Duplicated utility functions and sub-components across AdminDashboard and SuperadminDashboard"
    description: |
      The following are copy-pasted between AdminDashboard.tsx and admin/SuperadminDashboard.tsx:
      - isUserOnline()
      - truncateText()
      - getRelativeLastLogin()
      - getPreciseLastSeen()
      - getUserDerivedStatus()
      - UserAvatar component
      - RoleBadge component
      - StatusIndicator component
      - PendingApprovalUser interface
      - User interface
      Total: ~120 lines duplicated verbatim.
    examples:
      - file: AdminDashboard.tsx
        location: "AdminDashboard.tsx:55-135"
        snippet: "const isUserOnline = ... const UserAvatar ... const RoleBadge ... const StatusIndicator ..."
      - file: admin/SuperadminDashboard.tsx
        location: "admin/SuperadminDashboard.tsx:50-175"
        snippet: "const isUserOnline = ... const UserAvatar ... const RoleBadge ... const StatusIndicator ... (identical)"
    prevalence: common

  - category: error_handling
    pattern: "Inconsistent loading/empty/error states across components"
    description: |
      Quality tiers observed:
      GOOD: CommandCenterDashboard (DashboardLoadingState skeleton), AnalyticsDashboard (skeleton + error + empty + retry),
            AuditDashboard (loading spinner + error display), TripManagement (error with retry button)
      ADEQUATE: CalendarDashboard (text loading + error display), UserDashboard (isInitialLoading + syncError)
      POOR: PerformanceDashboard, MeritScoreDashboard (text "Loading..." only, no error UI)
      MINIMAL: FirearmInventory/Allocation/Maintenance/Permits (bare text "Loading firearms/allocations/etc..."
               with hardcoded text-indigo-600 color; no error display on fetch failure — silently swallowed)
      MISSING: GuardSchedule (7-line stub, no data fetching at all), ReportsAnalytics (7-line stub)
    examples:
      - file: AnalyticsDashboard.tsx
        location: "AnalyticsDashboard.tsx:100-125"
        snippet: "DashboardLoadingState + error alert with retry + null/empty guard"
      - file: FirearmInventory.tsx
        location: "FirearmInventory.tsx:140-142"
        snippet: "text-indigo-600 text-lg font-medium — hardcoded color, no skeleton"
    prevalence: common

  - category: naming
    pattern: "Off-token color usage in older components"
    description: |
      Several components use raw Tailwind colors (text-indigo-600, bg-red-50, text-gray-800,
      bg-green-50, border-green-200) instead of semantic token classes (text-text-primary, bg-danger-bg,
      text-danger-text, etc.). This breaks theme consistency.
    examples:
      - file: FirearmInventory.tsx
        location: "FirearmInventory.tsx:140"
        snippet: "text-indigo-600 text-lg font-medium"
      - file: GuardSchedule.tsx
        location: "GuardSchedule.tsx:4"
        snippet: "text-gray-800"
      - file: FirearmInventory.tsx
        location: "FirearmInventory.tsx:148"
        snippet: "bg-red-50 border border-red-200 text-red-700"
    prevalence: occasional

  - category: architecture
    pattern: "N+1 API calls in ArmoredCarDashboard"
    description: |
      ArmoredCarDashboard fetches maintenance records in a for-loop per car, creating N+1 API calls.
      No batch endpoint is used.
    examples:
      - file: ArmoredCarDashboard.tsx
        location: "ArmoredCarDashboard.tsx:155-170"
        snippet: "for (const car of carsData) { fetch(`/api/car-maintenance/${car.id}`) }"
    prevalence: rare

  - category: structure
    pattern: "Mega-components with multiple concerns"
    description: |
      SuperadminDashboard (1780 lines) and AdminDashboard (1140 lines) contain:
      - User management table + search/filter/bulk ops
      - Approval workflow
      - Schedule management
      - Command center embedding
      - Sub-component definitions (avatars, badges, indicators)
      Each could be decomposed into focused modules.
    examples:
      - file: admin/SuperadminDashboard.tsx
        location: "admin/SuperadminDashboard.tsx:1-1780"
        snippet: "Single file containing user table, approvals, shifts, analytics, trips, audit, missions, inbox panels"
    prevalence: occasional

  - category: testing
    pattern: "useEffect without cleanup on some fetches"
    description: |
      Some fetch effects (PerformanceDashboard, MeritScoreDashboard, FirearmInventory) use bare useEffect
      without AbortController or isCancelled flag. CommandCenterDashboard and AuditDashboard correctly
      implement cancellation patterns.
    examples:
      - file: PerformanceDashboard.tsx
        location: "PerformanceDashboard.tsx:37-39"
        snippet: "useEffect(() => { fetchPerformance() }, [])"
      - file: AuditDashboard.tsx
        location: "AuditDashboard.tsx:55-75"
        snippet: "let disposed = false; ... return () => { disposed = true; ... }"
    prevalence: occasional

related_architecture:
  components_relevant_to_domain:
    - component: OperationalShell
      responsibility: "Shared page layout wrapper providing Sidebar + Header + skip-link + scroll area"
      location: "components/layout/OperationalShell.tsx"
      relationship_to_domain: "Should be used by all dashboard pages but only 3 use it"
    - component: DashboardLoadingState
      responsibility: "Skeleton loading UI for dashboard bootstrapping"
      location: "components/dashboard/ui/DashboardLoadingState.tsx"
      relationship_to_domain: "Used by CommandCenter and Analytics; should be used by all pages"
    - component: getSidebarNav
      responsibility: "Role-aware navigation item generator"
      location: "config/navigation.ts"
      relationship_to_domain: "Used by modern dashboards; 5 resource pages bypass it with hardcoded arrays"

  data_flow_involving_domain: |
    Most dashboards fetch directly from API_BASE_URL via fetch() or fetchJsonOrThrow().
    CommandCenterDashboard uses 9 specialized hooks (useOpsSummary, useOpsShifts, etc.)
    that encapsulate API calls and expose loading/error/refresh states.
    AnalyticsDashboard and AuditDashboard use dedicated hooks.
    Resource pages (Firearms, etc.) use raw fetch() without custom hooks.

  key_relationships_to_domain:
    - from: AdminDashboard
      to: CommandCenterDashboard
      relationship: "Embeds CommandCenterDashboard as its 'dashboard' view"
    - from: SuperadminDashboard
      to: CommandCenterDashboard
      relationship: "Embeds CommandCenterDashboard as its 'dashboard' view"
    - from: SuperadminDashboard
      to: AnalyticsDashboard
      relationship: "Embeds AnalyticsDashboard as 'analytics' view"
    - from: SuperadminDashboard
      to: AuditDashboard
      relationship: "Lazy-loads AuditDashboard as 'audit-log' view"
    - from: SuperadminDashboard
      to: TripManagement
      relationship: "Embeds TripManagement as 'trips' view"
    - from: UserDashboard
      to: GuardSupportTab
      relationship: "Renders GuardSupportTab as 'support' tab"
    - from: UserDashboard
      to: GuardResourcesTab
      relationship: "Renders GuardResourcesTab as 'resources' tab"
    - from: UserDashboard
      to: GuardMapTab
      relationship: "Renders GuardMapTab as 'map' tab"

related_conventions:
  naming_patterns_in_domain: |
    Dashboards: <Purpose>Dashboard.tsx (AdminDashboard, PerformanceDashboard, etc.)
    Tabs: Guard<Purpose>Tab.tsx (GuardSupportTab, GuardResourcesTab, GuardMapTab)
    Shell-less panels embedded inside parent dashboards have no naming suffix convention.
    Shim/compatibility re-exports use the original name (SuperadminDashboard.tsx, UserDashboard.tsx, GuardDashboard.tsx).
  structure_of_domain: |
    components/ — flat structure with some domain grouping:
      admin/ — SuperadminDashboard.tsx
      guards/ — UserDashboard.tsx, PanicButton.tsx, EmergencyContactsBar.tsx
      dashboard/ — CommandCenterDashboard + all SOC panels + ui/ kit
      layout/ — OperationalShell.tsx
      settings/ — SettingsDashboard, SettingsView, role-specific settings
      inbox/ — Role-specific inbox panels
      profile/ — ProfileModalContent
      shared/ — Header (note: two Headers exist — ./Header.tsx and ./shared/Header.tsx)
  error_handling_in_domain: |
    Best practice: fetchJsonOrThrow + try/catch + error state + retry UI (AnalyticsDashboard, TripManagement)
    Common: try/catch + logError + silently set empty array (Firearm pages)
    Custom hooks: useAuditLogs, useOpsSummary etc. encapsulate error state within the hook.
  documentation_in_domain: "Minimal; no JSDoc on components; some inline comments on complex logic"

