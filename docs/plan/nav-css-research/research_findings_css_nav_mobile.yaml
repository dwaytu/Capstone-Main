patterns_found:
  - category: navigation
    pattern: "Sidebar nav labels use full English names"
    description: "Navigation labels in ELEVATED_NAV and GUARD_NAV are spelled out (Dashboard, Approvals, Calendar, Analytics, etc.) but the sidebar renders 2-letter glyph codes (DG, AP, CL, AN) as visual icons next to the label."
    examples:
      - file: navigation.ts
        location: "navigation.ts:12"
        snippet: "{ view: 'dashboard', label: 'Dashboard', group: 'MAIN MENU' }"
      - file: Sidebar.tsx
        location: "Sidebar.tsx:22-23"
        snippet: "dashboard: 'DG', overview: 'DG', approvals: 'AP'"
    prevalence: common

  - category: navigation
    pattern: "Mobile nav hardcoded in AppShell, not driven by navigation.ts"
    description: "Mobile bottom nav items are defined inline in AppShell.tsx as plain {key, label} objects, completely separate from getSidebarNav(). No icons, no permission checks, no groups."
    examples:
      - file: AppShell.tsx
        location: "AppShell.tsx:94-108"
        snippet: "const mobileNavItems = normalizedRole === 'guard' ? [{key:'overview',label:'Overview'}, ...] : [{key:'dashboard',label:'Dashboard'}, ...]"
    prevalence: common

  - category: navigation
    pattern: "Guard workspace hides mobile bottom nav"
    description: "When isGuardWorkspaceView is true, the mobile bottom nav is not rendered — the guard-sticky-region (emergency contacts bar + nav) replaces it."
    examples:
      - file: AppShell.tsx
        location: "AppShell.tsx:475"
        snippet: "{!isGuardWorkspaceView ? (<nav aria-label='Mobile quick navigation' ...>) : null}"
    prevalence: common

  - category: loading
    pattern: "DashboardLoadingState shared component exists but underused"
    description: "Only 3 pages use the shared loading skeleton: CommandCenterDashboard, AnalyticsDashboard, AdminDashboard (TableLoadingState), SuperadminDashboard (TableLoadingState). Other pages (ArmoredCarDashboard, PerformanceDashboard, MeritScoreDashboard, CalendarDashboard, Profile, etc.) use inline loading booleans with button-level 'Sending...' text or no skeleton."
    examples:
      - file: CommandCenterDashboard.tsx
        location: "CommandCenterDashboard.tsx:237"
        snippet: "<DashboardLoadingState title='COMMAND CENTER' subtitle='Loading...' />"
      - file: ArmoredCarDashboard.tsx
        location: "ArmoredCarDashboard.tsx:508"
        snippet: "{loading ? 'Adding...' : 'Add Vehicle'}"
    prevalence: occasional

  - category: empty_state
    pattern: "No shared EmptyState React component; each page inlines empty messages"
    description: "The CSS class .soc-empty-state exists and is used in 7 places, but most pages use ad-hoc inline text like 'No vehicles found' without the shared class. No standard EmptyState component with icon + title + description + action button exists."
    examples:
      - file: CalendarDashboard.tsx
        location: "CalendarDashboard.tsx:682"
        snippet: '<p className="soc-empty-state">No upcoming events.</p>'
      - file: ArmoredCarDashboard.tsx
        location: "ArmoredCarDashboard.tsx:513"
        snippet: '<div className="text-center py-8 text-text-secondary text-sm">No vehicles found</div>'
    prevalence: common

  - category: error_handling
    pattern: "Single global ErrorBoundary at app root; OperationalShell error prop for inline errors"
    description: "ErrorBoundary wraps the entire app in App.tsx. OperationalShell accepts an optional error string prop shown as a danger banner above content. No component-level error boundaries wrap individual pages."
    examples:
      - file: App.tsx
        location: "App.tsx:10"
        snippet: '<ErrorBoundary sectionLabel="application" onRetry={() => window.location.reload()}>'
      - file: OperationalShell.tsx
        location: "OperationalShell.tsx:79-81"
        snippet: "{error && (<div className='mb-4 rounded-lg border border-danger-border ...'>{error}</div>)}"
    prevalence: common

  - category: architecture
    pattern: "Touch targets meet WCAG 2.5.8 minimum"
    description: "Mobile nav buttons use min-h-11 (44px). Sidebar mobile close button uses min-h-11 min-w-11. Guard sticky nav items also meet minimum."
    examples:
      - file: AppShell.tsx
        location: "AppShell.tsx:484"
        snippet: 'className="min-h-11 w-full rounded-md px-2 py-2 text-xs font-semibold ..."'
    prevalence: common

  - category: architecture
    pattern: "Staggered entrance animations via animate-section-enter"
    description: "CSS class defined in index.css but only used in 1 component (CommandCenterDashboard). Other dashboards don't use staggered entry."
    examples:
      - file: CommandCenterDashboard.tsx
        location: "CommandCenterDashboard.tsx:249"
        snippet: 'className="animate-section-enter soc-surface p-4 md:p-5"'
    prevalence: rare

related_architecture:
  components_relevant_to_domain:
    - component: AppShell
      responsibility: "Root layout with auth gate, modals, mobile nav, connectivity"
      location: "src/components/layout/AppShell.tsx"
      relationship_to_domain: "Owns mobile bottom nav definition and rendering"
    - component: OperationalShell
      responsibility: "Desktop sidebar + header + content layout for elevated roles"
      location: "src/components/layout/OperationalShell.tsx"
      relationship_to_domain: "Consumes sidebar nav items from parent, provides error slot"
    - component: Sidebar
      responsibility: "Grouped nav list with glyphs, scroll persistence, system health"
      location: "src/components/Sidebar.tsx"
      relationship_to_domain: "Renders SidebarItem[] with navGlyphs mapping for visual codes"
    - component: getSidebarNav
      responsibility: "Build role-filtered nav item list"
      location: "src/config/navigation.ts"
      relationship_to_domain: "Single source of truth for sidebar nav items and role filtering"
  interfaces_used_by_domain:
    - interface: NavItem
      location: "src/config/navigation.ts:4"
      usage_pattern: "view + label + group + optional permission"
    - interface: SidebarItem
      location: "src/components/Sidebar.tsx:5"
      usage_pattern: "view + label + optional group — less strict than NavItem, used by OperationalShell"
  data_flow_involving_domain: |
    1. Router determines active page → page component calls getSidebarNav(role) → gets NavItem[]
    2. Page component passes items to OperationalShell → OperationalShell passes to Sidebar
    3. AppShell independently defines mobileNavItems based on normalizedRole (no shared source)
    4. Sidebar renders items grouped by item.group with navGlyphs[view] for icon badge
    5. VIEW_TO_ROUTE maps view strings to URL paths for both sidebar clicks and mobile nav clicks

related_technology_stack:
  languages_used_in_domain:
    - TypeScript
    - CSS
  frameworks_used_in_domain:
    - name: React 18
      usage_in_domain: "Component rendering, hooks"
    - name: Tailwind CSS v4
      usage_in_domain: "Utility classes via @import 'tailwindcss' in index.css"
  libraries_used_in_domain:
    - name: react-router v7
      purpose_in_domain: "URL routing via useNavigate, useLocation, VIEW_TO_ROUTE"

related_conventions:
  naming_patterns_in_domain: "soc-* prefix for all custom CSS utility classes; --color-* for token variables; 2-letter uppercase glyphs for nav icons"
  structure_of_domain: "Navigation config in src/config/, layout shells in src/components/layout/, shared UI in src/components/dashboard/ui/"
  error_handling_in_domain: "Global ErrorBoundary at app root; OperationalShell error prop; individual pages manage own error/loading state strings"
  testing_in_domain: "Route tests in router/__tests__/routes.test.ts verify VIEW_TO_ROUTE mappings; guard tests verify auth loading states"
  documentation_in_domain: "AGENTS.md and COPILOT.md document key conventions (no truncate on headers, token classes, z-index stack)"

