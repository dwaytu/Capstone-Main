mobile_bottom_nav:
  guard_items:
    - { key: overview, label: Overview }
    - { key: calendar, label: Calendar }
    - { key: support, label: Support }
    - { key: profile, label: Profile }
  elevated_items:
    - { key: dashboard, label: Dashboard }
    - { key: calendar, label: Calendar }
    - { key: firearms, label: Firearms }
    - { key: armored-cars, label: Vehicles }
    - { key: profile, label: Profile }
  touch_targets: "min-h-11 (44px) on all nav buttons, meets WCAG 2.5.8"
  grid_layout: "grid-cols-4 for guard (4 items), grid-cols-5 for elevated (5 items)"
  guard_workspace_interaction: |
    When isGuardWorkspaceView is true (guard role on non-inbox/settings/profile views),
    the mobile bottom nav is hidden entirely. The guard-sticky-region takes its place
    with emergency contacts bar + inline nav. The guard-sticky-region uses z-index 42
    (below mobile-nav z-index 64 and drawer z-index 48).
  discrepancies_sidebar_vs_mobile:
    guard:
      - "Sidebar has 'Mission' label; mobile has 'Overview' — same view key 'overview'"
      - "Sidebar has 'Resources' and 'Map'; mobile has 'Calendar' and 'Profile' instead"
      - "Mobile nav adds 'Calendar' and 'Profile' not in guard sidebar"
    elevated:
      - "Sidebar has 15 items; mobile shows only 5 (Dashboard, Calendar, Firearms, Vehicles, Profile)"
      - "Mobile labels 'armored-cars' as 'Vehicles' vs sidebar's 'Armored Cars'"
      - "Mobile gives no access to: Approvals, Analytics, Audit, Trips, Schedule, Missions, Performance, Merit, Allocation, Permits, Maintenance"

