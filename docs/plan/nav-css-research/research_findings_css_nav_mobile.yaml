plan_id: nav-css-research
objective: "Research the CSS design system, navigation labels, mobile navigation, and empty/loading/error state patterns"
focus_area: css_nav_mobile
created_at: "2026-04-05"
created_by: gem-researcher
status: completed

tldr: |
  - Sidebar nav defined in `src/config/navigation.ts` with 15 elevated items (3 groups) and 4 guard items. Labels use 2-letter glyph codes (DG, AP, etc.) rendered from `navGlyphs` in Sidebar.tsx.
  - Mobile bottom nav is hardcoded in AppShell.tsx (not extracted): guards get 4 items (Overview/Calendar/Support/Profile), elevated roles get 5 (Dashboard/Calendar/Firearms/Vehicles/Profile). Touch targets are `min-h-11` (44px). Guard workspace suppresses mobile nav in favor of guard-sticky-region.
  - CSS design system is comprehensive (~1500 lines in index.css): full light/dark token parity, 60+ utility classes, z-index stack, forced-colors support, prefers-reduced-motion, soc-skeleton/soc-empty-state shared classes. No shared `<EmptyState>` React component exists — each page inlines its own empty text.
  - Loading states: `DashboardLoadingState` and `TableLoadingState` shared components exist but only 4 pages use them. Most pages have ad-hoc `loading` boolean. A global `ErrorBoundary` wraps the app, but section-level error boundaries are not used.
  - CSP meta tag is complete and correct: includes fonts.googleapis.com, fonts.gstatic.com, basemaps.cartocdn.com, railway.app for connect-src.

research_metadata:
  methodology: "hybrid retrieval: semantic_search + grep_search + read_file across navigation config, Sidebar.tsx, AppShell.tsx, index.css, index.html, ErrorBoundary, DashboardLoadingState, permissions.ts, routes.ts"
  scope: "All frontend navigation definitions, CSS design system, state pattern usage across ~25 page components"
  confidence: high
  coverage: 92
  decision_blockers: 0
  research_blockers: 0

