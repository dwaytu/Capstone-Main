csp_meta_tag:
  raw_content: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.up.railway.app wss://*.up.railway.app https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com; object-src 'none'; base-uri 'self'; form-action 'self';"
  status: "Correct. Includes Google Fonts (style-src + font-src), CartoDB tiles (connect-src), Railway (connect-src + wss), OpenStreetMap tiles (connect-src)."

open_questions:
  - question: "Should mobile bottom nav items be driven by navigation.ts instead of hardcoded in AppShell?"
    context: "Currently sidebar and mobile nav are defined independently, creating label discrepancies (e.g. 'Mission' vs 'Overview', 'Armored Cars' vs 'Vehicles')"
    type: nice_to_know
    affects: []
  - question: "Guard sidebar nav includes 'Resources' and 'Map' views — do these have corresponding route pages?"
    context: "'resources' and 'map' are not in VIEW_TO_ROUTE and have no glyph entries"
    type: research
    affects: []

gaps:
  - area: "Shared EmptyState component"
    description: "No reusable React EmptyState component exists. Each page inlines empty-state text with inconsistent styling (some use soc-empty-state class, many don't)."
    impact: nice_to_know
    affects: []
  - area: "Loading skeleton coverage"
    description: "Only 4 of ~15 page-level components use shared DashboardLoadingState or TableLoadingState. Most pages show no visual loading feedback beyond button text changes."
    impact: research_blocker
    affects: []
  - area: "Section-level error boundaries"
    description: "Only one global ErrorBoundary exists. A crash in any page component takes down the entire app view rather than isolating to that section."
    impact: nice_to_know
    affects: []
  - area: "animate-section-enter underuse"
    description: "The staggered entrance animation class is defined but only used in CommandCenterDashboard. Other dashboards don't benefit from the polished entrance."
    impact: nice_to_know
    affects: []
