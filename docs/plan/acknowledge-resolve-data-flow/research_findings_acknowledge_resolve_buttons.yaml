plan_id: acknowledge-resolve-data-flow
objective: "Trace complete data flow for Acknowledge/Resolve buttons in LiveOperationsFeed and IncidentAlertFeed"
focus_area: incident-status-update-ui
created_at: "2026-04-08T00:00:00Z"
created_by: gem-researcher
status: completed

tldr: |
  - Both Acknowledge and Resolve buttons exist in LiveOperationsFeed.tsx and IncidentAlertFeed.tsx
  - Both call back to a single handler: handleIncidentStatusUpdate in CommandCenterDashboard.tsx
  - That handler delegates to useIncidents().updateStatus which PATCHes /api/incidents/{id}/status
  - After the PATCH succeeds, useIncidents.refresh() re-fetches the full incidents list from /api/incidents/active
  - There is NO local optimistic state mutation, NO loading/pending spinner on the buttons, and NO per-button error handling — errors propagate as unhandled promise rejections (void cast on the onClick)

