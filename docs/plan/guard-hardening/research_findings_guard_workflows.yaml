open_questions:
  - question: "Are the hardcoded phone numbers (+63 912 345 6789, etc.) real DSIA operations numbers or placeholders?"
    context: "They appear in 3 locations across 2 files and look like Philippine format but the sequential pattern suggests placeholder"
    type: research
    affects: ["trust-breaking-remediation"]

  - question: "Does the backend /api/register enforce guard-only registration or could a modified request create admin accounts?"
    context: "Frontend only shows guard option but the role field is sent in the POST body"
    type: decision_blocker
    affects: ["security-hardening"]

  - question: "Is IncidentReportForm.tsx (with AI classification) intentionally excluded from guard workflow or was this an oversight?"
    context: "Guard uses a simpler inline form while admin gets the AI-powered version"
    type: research
    affects: ["incident-flow-improvement"]

gaps:
  - area: "Panic/Emergency button"
    description: "No one-tap emergency mechanism exists. Guards must navigate to incident form and fill out details."
    impact: decision_blocker
    affects: ["guard-safety"]

  - area: "Incident offline queue"
    description: "Incident reports cannot be queued offline, unlike check-in/check-out/schedule requests."
    impact: research_blocker
    affects: ["offline-resilience"]

  - area: "Pending offline actions UI"
    description: "offlineQueue.ts has getPendingCount() but no UI badge or indicator shows queued actions."
    impact: nice_to_know
    affects: ["offline-ux"]

  - area: "Emergency contacts not tappable"
    description: "Phone numbers are plain text, not tel: links. On mobile, guards cannot tap-to-call."
    impact: decision_blocker
    affects: ["emergency-contact-ux"]

  - area: "Incident location not auto-filled"
    description: "Guard has GPS coordinates from tracking but incident form requires manual location text entry."
    impact: research_blocker
    affects: ["incident-flow-improvement"]
