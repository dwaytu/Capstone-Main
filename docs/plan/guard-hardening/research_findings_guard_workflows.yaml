plan_id: guard-hardening
objective: Deep analysis of guard-facing UX workflows for real-world hardening
focus_area: guard-workflows
created_at: "2026-04-04T00:00:00Z"
created_by: gem-researcher
status: completed

tldr: |
  - UserDashboard.tsx is a 1137-line monolith with 33 useState hooks managing ALL guard state (data, forms, modals, tracking, UI)
  - NO panic/emergency button exists anywhere — "Report Incident" (2+ taps, modal form) is the closest thing
  - Emergency contacts are HARDCODED phone numbers in JSX (3 locations) — not fetched from backend
  - Login page has fake telemetry: "Monitoring Nodes: Active: 48" ticker cycling [48,49,48], "System Status: Operational", "Network: Secure Link" — all client-side theater
  - Offline queue (IndexedDB + Background Sync) exists for check-in/check-out/schedule but NOT for incident reports
  - Registration form allows role selection but only "Guard" option exists in the dropdown — correct but the dropdown is misleading UX

research_metadata:
  methodology: "hybrid retrieval: semantic_search + grep_search + read_file across 15 source files, 3 passes (complex)"
  scope: "All guard-facing components, hooks, routing, login, offline utilities, and trust-breaking element audit"
  confidence: high
  coverage: 95
  decision_blockers: 0
  research_blockers: 0

