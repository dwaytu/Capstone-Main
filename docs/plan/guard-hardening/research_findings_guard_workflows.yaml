patterns_found:

  # ── WORKFLOW 1: PANIC / EMERGENCY ──────────────────────────────────────────

  - category: workflow
    pattern: "NO_PANIC_BUTTON"
    description: |
      There is NO dedicated panic/emergency/SOS button anywhere in the guard interface.
      The closest equivalent is "⚠ Report Incident" button on the Mission tab.
      This requires: (1) be on Mission tab, (2) tap "Report Incident", (3) fill form in modal,
      (4) tap "Submit Incident" = minimum 4 interactions, ~15-30 seconds.
      There is no way to send a one-tap distress signal.
    examples:
      - file: UserDashboard.tsx
        location: "UserDashboard.tsx:1006-1012"
        snippet: |
          <button type="button" onClick={() => { setIncidentStatus(''); setIncidentModalOpen(true) }}
            className="min-h-12 w-full rounded-lg border-2 border-danger-border bg-danger-bg ...">
            ⚠ Report Incident
          </button>
    prevalence: common

  # ── WORKFLOW 2: INCIDENT REPORTING ─────────────────────────────────────────

  - category: workflow
    pattern: "INCIDENT_REPORT_FORM"
    description: |
      Entry point: Mission tab → "⚠ Report Incident" button → modal dialog.
      Required fields: title (text), location (text), description (textarea) — ALL manual.
      Optional but pre-set: priority (dropdown, defaults to 'high').
      Auto-fill: NOTHING. Location is NOT auto-filled from GPS. Time is NOT recorded client-side.
      User-id is NOT sent in the POST body (server presumably infers from JWT).
      Steps: 2 taps + 3 text fields + 1 dropdown + 1 submit = ~6 interactions, 30-60 seconds.
      NO offline queue support — if offline, incident report silently fails with error message.
      NOTE: A separate IncidentReportForm.tsx exists with AI severity classification, but the guard
      dashboard does NOT use it — it has its own simpler inline form in the modal.
    examples:
      - file: UserDashboard.tsx
        location: "UserDashboard.tsx:662-680"
        snippet: |
          if (!incidentForm.title.trim() || !incidentForm.description.trim() || !incidentForm.location.trim()) {
            setIncidentStatus('Title, description, and location are required.')
            return
          }
      - file: UserDashboard.tsx
        location: "UserDashboard.tsx:1200-1280"
        snippet: "Modal with 4 fields: title, location, priority dropdown, description textarea"
    prevalence: common

  # ── WORKFLOW 3: EMERGENCY CONTACT ACCESS ───────────────────────────────────

  - category: workflow
    pattern: "EMERGENCY_CONTACTS_HARDCODED"
    description: |
      Emergency contacts appear in TWO places, both hardcoded:
      1. Support tab → "Emergency Contacts" DashboardCard (GuardSupportTab.tsx:73-89)
         - Operations Desk: +63 912 345 6789
         - Site Supervisor: +63 901 234 5678
         - HR / Compliance: +63 955 321 4567
      2. Field Instructions modal (UserDashboard.tsx:1185-1187)
         - Operations Desk: +63 912 345 6789
         - Site Supervisor: +63 901 234 5678
      
      From Mission tab: tap Support nav → contacts visible at top = 2 taps.
      From Mission tab: tap "View Instructions" → contacts visible in modal footer = 2 taps.
      Contacts are NOT clickable tel: links — they are plain text, not tappable on mobile.
      They are NOT fetched from any backend API — completely static JSX.
    examples:
      - file: GuardSupportTab.tsx
        location: "GuardSupportTab.tsx:79"
        snippet: '<p className="text-xs text-text-secondary">+63 912 345 6789</p>'
      - file: GuardSupportTab.tsx
        location: "GuardSupportTab.tsx:83"
        snippet: '<p className="text-xs text-text-secondary">+63 901 234 5678</p>'
      - file: GuardSupportTab.tsx
        location: "GuardSupportTab.tsx:87"
        snippet: '<p className="text-xs text-text-secondary">+63 955 321 4567</p>'
      - file: UserDashboard.tsx
        location: "UserDashboard.tsx:1185-1187"
        snippet: "Operations Desk: +63 912 345 6789\\nSite Supervisor: +63 901 234 5678"
    prevalence: common

  # ── WORKFLOW 4: ASSIGNMENT / SHIFT CHECKING ────────────────────────────────

  - category: workflow
    pattern: "SHIFT_VISIBILITY"
    description: |
      Current assignment IS immediately visible on Mission tab load via the "StatusHero" banner:
      - Shows duty status (ON POST / STANDBY / AWAITING CHECK IN / OFF DUTY)
      - Shows location (client_site), shift time window, elapsed time if checked in
      - Shows tracking status indicator
      Today's shifts list is below the status hero with per-shift check-in/out buttons.
      This is the first thing the guard sees — 0 taps to view current assignment.
      Data comes from /api/guard-replacement/guard/{userId}/shifts endpoint.
    examples:
      - file: UserDashboard.tsx
        location: "UserDashboard.tsx:889-950"
        snippet: "StatusHero section with dutyStatusConfig color coding"
    prevalence: common

  # ── WORKFLOW 5: CHECK IN / CHECK OUT ───────────────────────────────────────

  - category: workflow
    pattern: "CHECK_IN_OUT_FLOW"
    description: |
      Primary check action button: 1 tap from Mission tab (always visible below StatusHero).
      "Check In – Start Shift" / "✓ Check Out – End Shift" — large full-width button.
      Per-shift check-in/out buttons also available in Today's Shifts list.
      Has offline queue support — queues to IndexedDB if network fails.
      Elapsed time counter runs client-side via 1-second interval timer.
    examples:
      - file: UserDashboard.tsx
        location: "UserDashboard.tsx:981-998"
        snippet: "min-h-14 w-full rounded-xl ... Check In – Start Shift"
    prevalence: common

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 3: TRUST-BREAKING ELEMENTS
# ═══════════════════════════════════════════════════════════════════════════════

  - category: trust_breaking
    pattern: "FAKE_MONITORING_NODES_TICKER"
    description: |
      Login page sidebar shows "Monitoring Nodes: Active: 48" that ticks between 48→49→48
      every 7 seconds. This is pure client-side theater — no backend API is called.
      useState(48) with setInterval cycling a fixed array [48, 49, 48].
    examples:
      - file: LoginPage.tsx
        location: "LoginPage.tsx:73-83"
        snippet: |
          const [monitoringNodes, setMonitoringNodes] = useState<number>(48)
          useEffect(() => {
            const values = [48, 49, 48]
            let idx = 0
            const ticker = window.setInterval(() => {
              idx = (idx + 1) % values.length
              setMonitoringNodes(values[idx])
            }, 7000)
            return () => window.clearInterval(ticker)
          }, [])
    prevalence: common

  - category: trust_breaking
    pattern: "FAKE_SYSTEM_STATUS_SIDEBAR"
    description: |
      Login page sidebar displays three status cards:
      1. "System Status: Operational" — hardcoded, never checks backend health
      2. "Network: Secure Link" — hardcoded, does not verify HTTPS or connectivity
      3. "Monitoring Nodes: Active: {ticker}" — fake ticker described above
      All three items have status lights (pulsing green dot for "Operational").
      None of these values come from any API or real system check.
    examples:
      - file: LoginPage.tsx
        location: "LoginPage.tsx:731-780"
        snippet: "{ label: 'System Status', value: 'Operational', tone: 'success', live: true }"
    prevalence: common

  - category: trust_breaking
    pattern: "HARDCODED_EMERGENCY_PHONE_NUMBERS"
    description: |
      All emergency phone numbers are hardcoded in JSX in 3 locations across 2 files.
      They are NOT fetched from the backend, NOT configurable, and NOT clickable tel: links.
      If the real numbers change, a code deploy is required.
      Numbers appear to be Philippine format but are likely placeholder/fake:
      +63 912 345 6789, +63 901 234 5678, +63 955 321 4567
    examples:
      - file: GuardSupportTab.tsx
        location: "GuardSupportTab.tsx:79,83,87"
        snippet: "Operations Desk: +63 912 345 6789, Site Supervisor: +63 901 234 5678, HR: +63 955 321 4567"
      - file: UserDashboard.tsx
        location: "UserDashboard.tsx:1185-1187"
        snippet: "Operations Desk: +63 912 345 6789 / Site Supervisor: +63 901 234 5678"
    prevalence: common

  - category: trust_breaking
    pattern: "HARDCODED_FIELD_INSTRUCTIONS"
    description: |
      Field instructions modal contains 5 static bullet points hardcoded in JSX.
      These are not fetched from any API and cannot be updated without code changes.
    examples:
      - file: UserDashboard.tsx
        location: "UserDashboard.tsx:1173-1179"
        snippet: |
          <li>Confirm assignment details before arrival at your post.</li>
          <li>Check in immediately once on-site and keep location tracking active.</li>
          <li>Report incidents with clear title, location, and priority level.</li>
          <li>Escalate critical threats to Operations Desk without delay.</li>
          <li>Check out only after formal handoff or shift completion.</li>
    prevalence: common

  - category: trust_breaking
    pattern: "REGISTRATION_ROLE_DROPDOWN_MISLEADING"
    description: |
      Registration form has a <select> for "Account Type" but only one option: "Guard".
      The help text correctly states "Admin and supervisor accounts are created internally."
      However, having a dropdown with one option is confusing UX — it implies choice where none exists.
      The role state defaults to 'guard' (LoginPage.tsx:61).
    examples:
      - file: LoginPage.tsx
        location: "LoginPage.tsx:603-607"
        snippet: |
          <select id="role" value={role} onChange={...}>
            <option value="guard">Guard</option>
          </select>
          <p>Admin and supervisor accounts are created internally.</p>
    prevalence: common

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 4: TECHNICAL DEBT
# ═══════════════════════════════════════════════════════════════════════════════

  - category: architecture
    pattern: "GOD_COMPONENT_USERDASHBOARD"
    description: |
      UserDashboard.tsx at 1137 lines contains:
      - 33 useState hooks (data, forms, modals, location, UI status)
      - 5 useEffect hooks (data fetch, location tracking, elapsed timer, profile modal, section sync)
      - 4 useMemo hooks (activeShifts, currentShift, dutyStatus, mapUrls)
      - 2 useCallback hooks (getAuthHeaders, refreshData)
      - 7 async handler functions (check-in, check-out, incident, schedule, ticket, location)
      - 3 modal dialogs inline (incident report, field instructions, profile)
      - All state is local — no extraction to hooks or context
      Mission section, location tracking logic, form handlers, and modals should each be separate.
    examples:
      - file: UserDashboard.tsx
        location: "UserDashboard.tsx:122-174"
        snippet: "33 consecutive useState declarations"
    prevalence: common

  - category: architecture
    pattern: "PROP_DRILLING_TO_SUPPORT_TAB"
    description: |
      GuardSupportTab receives 15 props from UserDashboard including form state, setters,
      submission handlers, and status strings. This is classic prop drilling.
      The form state (scheduleForm, ticketForm) and their handlers are defined in UserDashboard
      but only used inside GuardSupportTab.
    examples:
      - file: GuardSupportTab.tsx
        location: "GuardSupportTab.tsx:36-52"
        snippet: "15 props in GuardSupportTabProps interface"
    prevalence: common

  - category: architecture
    pattern: "DUPLICATE_INCIDENT_FORM"
    description: |
      Two separate incident reporting implementations exist:
      1. UserDashboard.tsx inline modal (guard uses this) — basic: title/location/priority/description
      2. IncidentReportForm.tsx component — advanced: has AI severity classification via /api/ai/classify-incident
      The guard form does NOT use the AI classifier. If the shared form were used instead,
      guards would get automatic severity suggestions.
    examples:
      - file: UserDashboard.tsx
        location: "UserDashboard.tsx:1200-1280"
        snippet: "Inline incident modal form"
      - file: IncidentReportForm.tsx
        location: "IncidentReportForm.tsx:38"
        snippet: "Standalone form with AI classify-incident integration"
    prevalence: common

  - category: architecture
    pattern: "ELAPSED_TIME_ONE_SECOND_INTERVAL"
    description: |
      A 1-second setInterval runs continuously when any shift is checked in, updating
      elapsed time display for every shift. This causes a re-render every second for the
      entire UserDashboard component since elapsedTime state lives at the top level.
    examples:
      - file: UserDashboard.tsx
        location: "UserDashboard.tsx:405-419"
        snippet: "const intervalId = window.setInterval(() => { ... setElapsedTime ... }, 1000)"
    prevalence: common

  - category: architecture
    pattern: "NO_INCIDENT_OFFLINE_QUEUE"
    description: |
      Check-in and check-out have offline queue support (enqueueOfflineAction).
      Schedule requests have offline queue support.
      Incident reports do NOT — they show a generic error if the network call fails.
      This is a critical gap: the most urgent guard action has no offline resilience.
    examples:
      - file: UserDashboard.tsx
        location: "UserDashboard.tsx:662-680"
        snippet: "handleIncidentSubmit catches error but does NOT call enqueueOfflineAction"
    prevalence: common

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 5: OFFLINE / CONNECTIVITY ANALYSIS
# ═══════════════════════════════════════════════════════════════════════════════

  - category: architecture
    pattern: "OFFLINE_HANDLING"
    description: |
      Connectivity detection: useUI() provides isNetworkOnline from UIContext (uses navigator.onLine + online/offline events).
      When offline:
      - Red banner: "No connection. Your device is offline. Data will sync automatically when connection is restored."
      - Check-in/check-out: queued to IndexedDB via enqueueOfflineAction
      - Schedule requests: queued to IndexedDB
      - Incident reports: NOT queued — silently fails
      - Ticket submissions: NOT queued — silently fails
      - Location heartbeats: fail silently, message says "Location heartbeat failed"
      
      Pending action count (getPendingCount) is available in offlineQueue.ts but NOT displayed in UI.
      No visual badge or indicator tells the guard they have queued actions waiting.
    examples:
      - file: UserDashboard.tsx
        location: "UserDashboard.tsx:858-862"
        snippet: "isNetworkOnline offline banner"
      - file: offlineQueue.ts
        location: "offlineQueue.ts:88"
        snippet: "getPendingCount() exists but unused in UI"
    prevalence: common

