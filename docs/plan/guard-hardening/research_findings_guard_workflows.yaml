# SECTION 6: SELF-REGISTRATION FLOW
# ═══════════════════════════════════════════════════════════════════════════════

  - category: workflow
    pattern: "REGISTRATION_FLOW"
    description: |
      Entry: LoginPage.tsx → "Don't have an account? Register" link toggles isRegistering state.
      Required fields (all mandatory):
      1. Username
      2. Full Name
      3. Phone Number (+63 format with auto-formatting)
      4. License Number (security guard license)
      5. License Issued Date
      6. License Expiry Date
      7. Full Address (textarea)
      8. Email (MUST be @gmail.com)
      9. Password (12+ chars, upper+lower+digit+special)
      10. Account Type (dropdown with only "Guard" option)
      
      After submit: email verification flow (6-digit code).
      Registration does NOT require admin approval in the frontend — it calls /api/register directly.
      The backend may have approval workflow but frontend doesn't show any "pending approval" state.
    examples:
      - file: LoginPage.tsx
        location: "LoginPage.tsx:120-155"
        snippet: "Registration validation requiring all fields"
    prevalence: common

