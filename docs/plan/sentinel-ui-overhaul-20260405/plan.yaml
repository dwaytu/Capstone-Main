# ── Pre-Mortem ─────────────────────────────────────────────────────────────────
pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "Shell migration breaks existing page functionality (missing props, event handlers, state)"
      likelihood: medium
      impact: high
      mitigation: "Migrate one page at a time. Keep LegacyPage bridge pattern for props. Browser-validate after each batch."
    - scenario: "Navigation role filtering removes items users need or exposes items they shouldn't see"
      likelihood: medium
      impact: critical
      mitigation: "Test every role's sidebar items against PRD AC-003 counts in validation gate. Unit-test getSidebarNav per role."
    - scenario: "Guard route hardening breaks deep links or browser back-button behavior"
      likelihood: low
      impact: medium
      mitigation: "Use Navigate with replace prop. Test forward/back navigation in browser validation."
    - scenario: "EmptyState/LoadingSkeleton adoption causes visual regressions in populated-data views"
      likelihood: low
      impact: medium
      mitigation: "EmptyState shows only when data.length === 0. Never replaces loaded content. Conditional rendering only."
    - scenario: "Analytics SVG charts cause performance degradation on large datasets"
      likelihood: medium
      impact: medium
      mitigation: "Paginate source data server-side. SVG charts render max 12–20 data points. Apply CSS containment."
    - scenario: "CSP change works in dev but breaks production font loading"
      likelihood: low
      impact: high
      mitigation: "Validate with production build (npm run build + npx vite preview) not just dev server."
    - scenario: "Mobile bottom nav overlaps guard sticky region or obscures page content"
      likelihood: medium
      impact: medium
      mitigation: "Guard role never sees elevated mobile nav. Add bottom padding equal to nav height. Test on 375px viewport."
  assumptions:
    - "Existing support_tickets table schema is sufficient for guard ticket system"
    - "Guard equipment checklist uses static list (no backend API) — MVP approach per open question"
    - "Support ticket detail shows status + resolution notes, not a conversation thread"
    - "'More' mobile bottom nav item opens a bottom-sheet drawer component"
    - "No backend API changes required except possibly guard support ticket creation endpoint"
    - "All pages currently using inline Sidebar+Header can be refactored to pass props through OperationalShell"

open_questions:
  - "Guard equipment checklist: static list or backend API? (Assuming static for MVP)"
  - "Support ticket replies visible to guard? (Assuming status + resolution only, no thread)"
  - "Mobile 'More' bottom nav: bottom-sheet drawer or full navigation page? (Assuming drawer)"

# ── Implementation Specification ───────────────────────────────────────────────
implementation_specification:
  code_structure: |
    All changes are frontend-only in DasiaAIO-Frontend/src/.
    New shared components: components/shared/EmptyState.tsx, components/shared/LoadingSkeleton.tsx.
    New guard components: components/guards/OffDutyPanel.tsx, components/guards/SupportTickets.tsx.
    Router changes centralized in router/index.tsx and router/guards.tsx.
    Navigation config centralized in config/navigation.ts.
    No new top-level directories, no new dependencies, no architectural departures.
  affected_areas:
    - "Router and route guards — router/index.tsx, router/guards.tsx"
    - "Navigation configuration — config/navigation.ts"
    - "Layout shell — layout/OperationalShell.tsx, layout/AppShell.tsx"
    - "11 legacy dashboard pages needing shell migration"
    - "Guard workspace — guards/UserDashboard.tsx"
    - "New shared components — shared/EmptyState.tsx, shared/LoadingSkeleton.tsx"
    - "Analytics + Audit pages — full redesign"
    - "CSP meta tag — index.html"
  component_details:
    - component: "shared/EmptyState"
      responsibility: "Reusable zero-data state with icon, title, subtitle, optional action button"
      interfaces:
        - "EmptyStateProps { icon: LucideIcon; title: string; subtitle: string; actionLabel?: string; onAction?: () => void }"
    - component: "shared/LoadingSkeleton"
      responsibility: "Consistent loading placeholder for dashboard cards, tables, KPI tiles"
      interfaces:
        - "LoadingSkeletonProps { variant: 'card' | 'table' | 'kpi' | 'hero'; count?: number }"
    - component: "guards/OffDutyPanel"
      responsibility: "Guard off-duty state: upcoming schedule, availability toggle, equipment checklist"
      interfaces:
        - "OffDutyPanelProps { user: User; schedule?: Shift[]; onToggleAvailability: (available: boolean) => void }"
    - component: "guards/SupportTickets"
      responsibility: "Guard support ticket list, create form, and detail view"
      interfaces:
        - "SupportTicketsProps { userId: string }"
  dependencies:
    - component: "EmptyState"
      relationship: "Consumed by all dashboard + resource pages for zero-data rendering"
    - component: "LoadingSkeleton"
      relationship: "Consumed by all pages as loading placeholder before data arrives"
    - component: "OperationalShell"
      relationship: "Wraps every authenticated page except guard workspace (UserDashboard)"
    - component: "config/navigation.ts"
      relationship: "Provides role-filtered NavItem[] to Sidebar via getSidebarNav()"
  integration_points:
    - "Router guards (RoleGuard) enforce role-based route access with guard→/overview redirect"
    - "Navigation config feeds sidebar items through OperationalShell → Sidebar"
    - "AppShell provides mobile bottom nav for elevated roles"
    - "Existing /api/support-tickets endpoints for guard ticket system"
    - "Existing schedule/shift APIs for guard off-duty panel"

