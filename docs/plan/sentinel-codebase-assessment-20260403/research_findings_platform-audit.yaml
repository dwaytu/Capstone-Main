- category: security
  pattern: Authorization depth is inconsistent behind authenticated routes
  description: Router-level auth exists, but some handlers trust client-supplied identities or return global data without server-side scoping.
  examples:
  - file: DasiaAIO-Backend/src/handlers/shift_swap.rs
    location: DasiaAIO-Backend/src/handlers/shift_swap.rs:33
    snippet: create_swap_request inserts requester_id and target_id from payload without comparing them to token claims.
  - file: DasiaAIO-Backend/src/handlers/shift_swap.rs
    location: DasiaAIO-Backend/src/handlers/shift_swap.rs:71
