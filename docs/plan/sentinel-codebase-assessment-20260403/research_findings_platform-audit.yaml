plan_id: sentinel-codebase-assessment-20260403
objective: Analyze the SENTINEL codebase to assess current strengths, shallow or incomplete areas, and whether the system behaves like a mission workflow platform.
focus_area: platform-audit
created_at: 2026-04-03T00:00:00Z
created_by: gem-researcher
status: completed

tldr: |
  - Current strengths: the codebase has real breadth, with role-aware dashboards, a substantial Axum backend, live tracking primitives, legal-consent/auth hardening, and native wrapper support for Android and desktop.
  - Biggest gaps: many workflows still stop at dashboard visibility rather than end-to-end command execution; several surfaces are client-side stitched summaries, manual forms, or MVP placeholders rather than operational systems.
  - Why it does not fully feel mission-grade yet: the app has command-center aesthetics and many endpoints, but too little shared workflow state, weak drill-down/action continuity, duplicated admin shells, and important workflow seams such as manual target IDs and coarse authorization.
  - Highest-leverage change surfaces are App-level role routing, the duplicated elevated dashboards, command-center data aggregation, shift-swap authorization, tracking authorization boundaries, and guard support/map workflows.
  - Evidence is strongest in App.tsx, the role dashboards, CommandCenterDashboard.tsx, useOperationalMapData.ts, main.rs, authz.rs, tracking.rs, shift_swap.rs, GuardSupportTab.tsx, and GuardShiftSwapPanel.tsx.

research_metadata:
  methodology: hybrid retrieval using grep_search, file_search, read_file, repository instruction review, PRD review, and targeted relationship discovery between frontend hooks/components and backend handlers/routes
  scope: frontend dashboards, backend routes/services, realtime tracking, operational map flows, role experiences, notifications/offline/push utilities, and Android/Tauri wrappers
  confidence: high
  coverage: 82
  decision_blockers: 0
  research_blockers: 0

