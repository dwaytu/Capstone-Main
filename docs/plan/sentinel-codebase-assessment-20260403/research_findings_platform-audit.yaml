patterns_found:
- category: strengths
  pattern: Broad operational surface area already exists
  description: The system covers auth, users, approvals, scheduling, incidents, firearms, permits, armored cars, analytics, AI, notifications, tracking, and wrappers in one repo.
  examples:
  - file: DasiaAIO-Backend/src/main.rs
    location: DasiaAIO-Backend/src/main.rs:215
    snippet: let app = Router::new() with a large consolidated route graph spanning auth, resources, analytics, AI, tracking, incidents, notifications, and system endpoints.
  - file: DasiaAIO-Frontend/src/App.tsx
    location: DasiaAIO-Frontend/src/App.tsx:721
    snippet: viewRegistry plus renderHome route users into many role-specific surfaces from one shell.
  prevalence: common

- category: strengths
  pattern: Role normalization and permission gating are consistently applied in the frontend shell
  description: The frontend normalizes roles, maps legacy user to guard, and applies permission checks before opening protected views.
  examples:
  - file: DasiaAIO-Frontend/src/types/auth.ts
    location: DasiaAIO-Frontend/src/types/auth.ts:20
    snippet: return normalized === 'user' ? 'guard' : (normalized as Role)
  - file: DasiaAIO-Frontend/src/App.tsx
    location: DasiaAIO-Frontend/src/App.tsx:786
    snippet: canView uses permission-aware routing before rendering protected views.
  prevalence: common

- category: strengths
  pattern: Real-time tracking foundation is deeper than pure mock UI
  description: The map stack includes telemetry persistence, websocket snapshot fan-out, geofence evaluation, path history, and active-guard queries.
  examples:
  - file: DasiaAIO-Backend/src/handlers/tracking.rs
    location: DasiaAIO-Backend/src/handlers/tracking.rs:1382
    snippet: get_map_data builds role-scoped snapshot payloads including sites, zones, points, and geofence alerts.
  - file: DasiaAIO-Backend/src/handlers/tracking.rs
    location: DasiaAIO-Backend/src/handlers/tracking.rs:1965
    snippet: tracking_ws authenticates upgrade requests and pushes snapshot refreshes over a broadcast bus.
  - file: DasiaAIO-Frontend/src/hooks/useOperationalMapData.ts
    location: DasiaAIO-Frontend/src/hooks/useOperationalMapData.ts:314
    snippet: websocket with exponential backoff falls back to 30 second polling.
