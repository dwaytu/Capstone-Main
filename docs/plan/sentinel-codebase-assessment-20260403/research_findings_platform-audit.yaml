related_conventions:
  naming_patterns_in_domain: role names are normalized to lowercase and legacy user is coerced to guard; frontend view keys drive shell routing; backend endpoints are mostly grouped under /api/{feature}; React hooks use useX naming for each dashboard slice.
  structure_of_domain: frontend is split into standalone role shells plus many feature panels; backend uses a large main.rs route registry with thin route module and direct handler-to-db queries.
  error_handling_in_domain: frontend hooks generally store local error strings and continue partial rendering; backend returns AppError variants and often uses unwrap_or defaults in analytics-style handlers.
  testing_in_domain: frontend has targeted Jest and Playwright coverage around the guard dashboard redesign, but the broader elevated workflows and backend authz boundaries are not evidenced here as tightly tested.
  documentation_in_domain: wrappers are documented as shells around the shared frontend build; PRD scope explicitly calls out frontend-only guard redesign; some settings copy labels features as MVP/later wave.

related_dependencies:
  internal:
  - component: DasiaAIO-Frontend/src/utils/api.ts
    relationship_to_domain: Provides fetchJsonOrThrow, auth header, and token lifecycle utilities for most frontend workflows.
    direction: outbound
  - component: DasiaAIO-Backend/src/utils.rs
    relationship_to_domain: Supplies token verification, permission checks, IDs, pagination, and role normalization.
    direction: outbound
  - component: DasiaAIO-Backend/src/db.rs
    relationship_to_domain: Defines operational tables and permissions that the handlers depend on.
    direction: outbound
  - component: DasiaAIO-Frontend/public/sw.js
    relationship_to_domain: Executes offline replay and push reception for selected frontend flows.
    direction: outbound
  external:
  - name: PostgreSQL
    purpose_for_domain: Persistence for users, shifts, incidents, notifications, telemetry, geofence events, and AI prediction artifacts.
  - name: Leaflet ecosystem
    purpose_for_domain: Tactical map rendering and interaction.
  - name: Native wrapper runtimes
    purpose_for_domain: Android and desktop packaging without a separate native application logic layer.

domain_security_considerations:
  sensitive_areas:
  - area: Shift swap authorization
    location: DasiaAIO-Backend/src/handlers/shift_swap.rs
    concern: authenticated access exists, but requester ownership and responder authorization are not enforced in the handler.
  - area: Tracking administration boundary
    location: DasiaAIO-Backend/src/middleware/authz.rs and DasiaAIO-Backend/src/main.rs
    concern: guards can access mutating tracking routes used for client-site and geofence management because tracking access is role-broadened.
  - area: Websocket authentication
    location: DasiaAIO-Backend/src/handlers/tracking.rs:1965
    concern: token validation is custom inside the websocket handler rather than enforced by standard router middleware, though the implementation does verify token and legal consent.
  authentication_patterns_in_domain: JWT bearer tokens are used across REST and websocket flows; frontend restores, refreshes, and clears auth sessions centrally in App.tsx.
  authorization_patterns_in_domain: most backend routes rely on router-applied authz middleware; some handlers add self-or-role checks, while shift-swap logic shows weaker server-side scoping.
  data_validation_in_domain: coordinate validation, incident status/priority normalization, and support-ticket required-field checks are present; many product workflows still trust simple client payloads and string IDs.

testing_patterns:
  framework: Jest plus Playwright on the frontend
  coverage_areas:
  - Guard dashboard redesign layout and grouped workflows
  - Settings persistence behavior
  - Guard smoke coverage in Playwright specs
  test_organization: unit-style tests live under src/__tests__ and browser coverage under tests/
  mock_patterns:
  - trackingPolicy, location permission, and push notification utilities are mocked for guard dashboard tests
  - mocked frontend data protects guard UX tests from backend dependency

change_priority_surfaces:
- file: DasiaAIO-Frontend/src/App.tsx
  reason: single choke point for role routing, home-view logic, consent gating, and global heartbeat duplication
  observed_issue: superadmin, admin, and supervisor all converge into the same large shell; route dispatch is broad but not workflow-centric
- file: DasiaAIO-Frontend/src/components/admin/SuperadminDashboard.tsx
  reason: largest elevated shell with overlapping concerns
  observed_issue: acts as a monolith for dashboard, approvals, schedule, missions, analytics, trips, audit, and notifications
- file: DasiaAIO-Frontend/src/components/AdminDashboard.tsx
  reason: parallel elevated shell
  observed_issue: duplicates user/approval/schedule logic instead of sharing a common operational platform layer
- file: DasiaAIO-Frontend/src/components/dashboard/CommandCenterDashboard.tsx
  reason: central product promise surface
  observed_issue: looks mission-grade visually, but state is still assembled from polling slices rather than a unified command workflow model
- file: DasiaAIO-Frontend/src/hooks/useOpsSummary.ts
  reason: hidden architectural hotspot behind the command center
  observed_issue: computes cross-domain operational state in the client from multiple endpoint calls
- file: DasiaAIO-Backend/src/handlers/shift_swap.rs
  reason: frontline workflow integrity and authorization
  observed_issue: server does not fully scope requester or responder authority
- file: DasiaAIO-Backend/src/middleware/authz.rs
  reason: authorization policy boundary
  observed_issue: tracking access policy is too coarse for client-site and geofence administration
- file: DasiaAIO-Backend/src/main.rs
  reason: route graph and API contract shape
  observed_issue: wide aliasing and duplicated route surfaces increase surface area and make platform behavior harder to reason about
- file: DasiaAIO-Frontend/src/components/dashboard/GuardSupportTab.tsx
  reason: frontline support experience
  observed_issue: hardcoded contacts and generic forms make the support workspace feel informational rather than operational
- file: DasiaAIO-Frontend/src/components/dashboard/GuardShiftSwapPanel.tsx
  reason: core workforce workflow
  observed_issue: manual target guard ID entry and weak workflow context make swap handling feel student-level
- file: DasiaAIO-Frontend/src/context/OperationalEventContext.tsx
  reason: potential backbone for shared operational state
  observed_issue: currently stores only selection highlight state, not actionable command context
- file: apps/android-capacitor/capacitor.config.ts and apps/desktop-tauri/src-tauri/src/main.rs
  reason: cross-platform differentiation
  observed_issue: wrappers are thin shells with limited native capability beyond packaging, geolocation/push plumbing, and updater support

open_questions:
- question: Is it intentional that admin and supervisor experiences are primarily served through the superadmin shell rather than distinct workflow shells?
  context: App.tsx routes superadmin, admin, and supervisor users into the same elevated experience, while a separate AdminDashboard also exists.
  type: research
  affects: [platform-audit]
- question: Are guards intended to be able to create and mutate client sites and geofences, or should those routes be supervisor-only?
  context: require_tracking_access currently gates the mutating tracking routes and allows both guards and supervisors.
  type: decision_blocker
  affects: [platform-audit]
- question: Is there any server-side web-push sending flow beyond storing subscriptions?
  context: the frontend and backend implement subscription capture, and the service worker handles incoming push, but this pass did not find a delivery fan-out path.
  type: research
  affects: [platform-audit]
- question: Are the hardcoded guard support contacts placeholders or expected production data?
  context: GuardSupportTab currently embeds specific contact cards directly in the component.
  type: research
  affects: [platform-audit]

gaps:
- area: Mission workflow continuity
  description: The system shows alerts, incidents, map telemetry, schedules, and AI signals, but there is little evidence of a shared incident-command workflow linking detection, assignment, escalation, response ownership, and resolution in one connected loop.
  impact: decision_blocker
  affects: [platform-audit]
- area: Elevated dashboard architecture
  description: Admin and superadmin flows are large, overlapping shells with repeated data-fetch and section logic, which makes the product feel assembled from screens rather than shaped around operational roles.
  impact: research_blocker
  affects: [platform-audit]
- area: Frontline guard workflows
  description: Support and swap flows rely on manual inputs, static contacts, and generic forms, which weakens the sense of a polished field-operations product.
  impact: research_blocker
  affects: [platform-audit]
- area: Authorization precision
  description: Shift swap authorization and tracking administration boundaries are too coarse to feel enterprise-grade.
  impact: decision_blocker
  affects: [platform-audit]
- area: Cross-platform differentiation
  description: Android and desktop wrappers currently package the web app effectively but do not yet add substantial mission-native capabilities that change the operational experience.
  impact: nice_to_know
  affects: [platform-audit]
- area: Product maturity signaling
  description: Explicit MVP/later-wave copy and placeholder governance sections remain in shipped UI, reinforcing an incomplete product feel.
  impact: research_blocker
  affects: [platform-audit]
