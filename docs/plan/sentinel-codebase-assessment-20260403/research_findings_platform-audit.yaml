    location: DasiaAIO-Frontend/src/components/guards/UserDashboard.tsx:323
    snippet: mission shell includes live tracking, current shift context, incident reporting, support forms, and map expansion.
  - file: DasiaAIO-Frontend/src/__tests__/guardDashboardRedesign.test.tsx
    location: DasiaAIO-Frontend/src/__tests__/guardDashboardRedesign.test.tsx:92
    snippet: targeted tests cover mission hierarchy, sticky controls, support grouping, and map behavior.
  prevalence: occasional

- category: architecture
  pattern: Elevated experiences are duplicated rather than platformized
  description: AdminDashboard and SuperadminDashboard contain large parallel shells with overlapping state, fetch logic, and view orchestration instead of deriving from a shared operational shell abstraction.
  examples:
  - file: DasiaAIO-Frontend/src/components/AdminDashboard.tsx
    location: DasiaAIO-Frontend/src/components/AdminDashboard.tsx:168
    snippet: standalone dashboard shell with fetchUsers, fetchShifts, fetchPendingApprovals, and command center wiring.
  - file: DasiaAIO-Frontend/src/components/admin/SuperadminDashboard.tsx
    location: DasiaAIO-Frontend/src/components/admin/SuperadminDashboard.tsx:188
