# ============================================================================
# GAPS
# ============================================================================

gaps:
  - area: "CSRF Protection"
    description: "No CSRF tokens or double-submit cookies. Relies solely on Bearer token auth which is CSRF-immune for API-only backends, but the dual-route structure and cookie handling should be verified."
    impact: nice_to_know
    affects: ["security-posture"]

  - area: "Password reset code brute-force"
    description: "Password reset uses 8-digit numeric codes. The auth rate limiter protects the endpoint, but a determined attacker with distributed IPs could attempt brute force within the 10-minute expiry window. A shorter code window or CAPTCHA would help."
    impact: research_blocker
    affects: ["auth-security"]

  - area: "No automated security testing"
    description: "No SAST/DAST integration found in the repo. No cargo-audit or cargo-deny in CI."
    impact: nice_to_know
    affects: ["ci-cd-security"]

  - area: "Horizontal scaling readiness"
    description: "In-memory rate limiting and no shared session state mean the backend cannot be horizontally scaled without architecture changes."
    impact: research_blocker
    affects: ["deployment-scaling"]
