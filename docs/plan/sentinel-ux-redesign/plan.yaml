  - id: T01
    title: Implement ActionInbox shared component
    description: |
      Create src/components/inbox/ActionInbox.tsx.

      Exports:
        - InboxItem interface: { id, priority ('urgent'|'high'|'normal'), category,
          categoryIcon (React.ElementType), title, description, actionLabel?,
          onAction?, statusChip?, timestamp }
        - ActionInboxProps interface: { items, loading?, emptyMessage?, className? }
        - ActionInbox FC

      Rendering rules:
        - Container: role="list" with soc-dashboard-card class
        - Each item: role="listitem" — left priority badge + category icon column,
          right title/description/timestamp column, far-right action button or
          status chip
        - Priority badge colors: urgent → danger CSS-var token, high → warning
          token, normal → info token (no hardcoded hex)
        - Action button: aria-label="[actionLabel] for [item.title]"
        - Timestamp: rendered as relative string (e.g., "2 h ago")
        - loading=true: render 4 placeholder skeleton rows using
          bg-[var(--color-surface-elevated)] and animate-pulse
        - items=[]: render emptyMessage (default "No items") centered in muted text
        - TypeScript strict: no `any`, no non-null assertions
