plan_id: sentinel-ux-redesign
objective: >
  Implement a "Unified Role-Centric Action Inbox + Workflow Timeline" UI/UX
  enhancement for the SENTINEL security operations system. Adds a prioritized
  action inbox and workflow timeline view to each role's dashboard without
  breaking existing functionality.
created_at: "2026-04-03"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 14
  risk_score: low

tldr: |
  Three-wave implementation: Wave 1 builds the two shared UI primitives
  (ActionInbox + WorkflowTimeline components) and updates navigation config
  in parallel — all three tasks have zero dependencies. Wave 2 builds four
  role-specific InboxPanel wrappers (Guard, Supervisor, Admin, Superadmin)
  that compose the primitives with role-filtered API data, all parallelizable.
  Wave 3 wires the panels into UserDashboard (guard 6th bottom-nav tab,
  first in order) and SuperadminDashboard (inbox section with role dispatch),
  each a surgical edit to one existing file. Wave 4 runs a full security/quality
  code review followed by Playwright E2E validation across all four role flows.
  Total: 11 tasks, 0 removed features, all strict-mode TypeScript.

open_questions:
  - Should the inbox badge/unread count on navigation items be driven by the
    existing NotificationPanel bell data or a dedicated count endpoint? (MVP
    assumption: no badge count for v1; add in follow-up sprint.)
  - Should 'inbox' in UserDashboard replace 'mission' as the default landing
    tab after login, or remain opt-in? (MVP assumption: default stays 'mission';
    inbox is opt-in first tab in nav order.)

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: >
        GuardSection type in UserDashboard.tsx is a closed union. Adding
        'inbox' without updating every switch/if-exhaustiveness check in the
        950-line file causes TypeScript errors that cascade through the build.
      likelihood: medium
      impact: high
      mitigation: >
        Update GuardSection type and every consuming expression in a single
        atomic replace_string_in_file call per location. Run get_errors
        immediately after each edit; fix exhaustiveness gaps before proceeding.
    - scenario: >
        SuperadminDashboard viewToSection record omits 'inbox' mapping, so
        clicking Inbox in the sidebar updates activeView but never transitions
        activeSection — the panel silently never renders.
      likelihood: medium
      impact: high
      mitigation: >
        T09 modifies both the useState type union AND the viewToSection record
        in the same edit pass. T11 E2E test explicitly navigates via sidebar
        click and asserts the inbox panel DOM is present.
    - scenario: >
        Role-specific panel components fetch authenticated endpoints without
        Authorization header, returning 401 that manifests as an empty/error
        UI state with no visible indication of the root cause.
      likelihood: low
      impact: high
      mitigation: >
        All fetch calls must use getAuthHeaders() from utils/api.ts following
        the exact pattern in GuardShiftSwapPanel.tsx. T10 reviewer explicitly
        checks every fetch call for Authorization header presence.
    - scenario: >
        SuperadminDashboard content dispatch checks isAdminViewer before
        isSuperadminViewer, causing superadmin users to receive AdminInboxPanel
        instead of SuperadminInboxPanel.
      likelihood: low
      impact: medium
      mitigation: >
        Mirror the existing isSuperadminViewer-first if-else chain already
        established in SuperadminDashboard. T10 reviewer checks branch order.
  assumptions:
    - All inbox component TypeScript interfaces are co-located in the same file
      as the component (no separate src/types/inbox.ts for MVP).
    - Guard inbox data is sourced from /api/guard-replacement/shifts and
      /api/users/{id}/notifications only; no new backend endpoints required.
    - InboxPanel components render CSS skeleton placeholder rows during fetch
      using existing border/bg-surface utility classes from the design system.
    - Lucide React is already installed and covers all required category icons
      (Clock, UserCheck, ArrowLeftRight, AlertTriangle, Shield, Users).
    - The 'inbox' tab in UserDashboard is inserted at index 0 of navItems
      (before 'mission') per the objective "first in order" requirement.
    - No badge/unread count on nav items in v1 (counted as future enhancement).

implementation_specification:
  code_structure: >
    New directory src/components/inbox/ contains all six inbox feature files.
    ActionInbox.tsx and WorkflowTimeline.tsx are shared primitives with
    co-located TypeScript interfaces. The four role panel files
    (GuardInboxPanel, SupervisorInboxPanel, AdminInboxPanel,
    SuperadminInboxPanel) are thin data-fetching wrappers that compose the
    primitives with role-scoped API data. All data fetching uses
    fetchJsonOrThrow + getAuthHeaders pattern from utils/api.ts.
    No new React context, no new state management library.
  affected_areas:
    - src/components/inbox/ (new directory — 6 new files)
    - src/components/UserDashboard.tsx (GuardSection type + navItems + render branch)
    - src/components/SuperadminDashboard.tsx (activeSection type + viewToSection + render branch)
    - src/config/navigation.ts (GUARD_NAV and ELEVATED_NAV prepend)
  component_details:
    - component: ActionInbox
      responsibility: >
        Renders a scrollable role="list" of InboxItem entries. Each item
        displays a priority badge (urgent→danger token, high→warning token,
        normal→info token), Lucide category icon, title, truncated description,
        action button or status chip (aria-label includes item title), and
        relative timestamp. Shows 4-row skeleton when loading=true. Shows
        emptyMessage string when items=[]. Styled exclusively with CSS
        variable tokens; no hardcoded hex values.
      interfaces:
        - "export interface InboxItem { id: string; priority: 'urgent' | 'high' | 'normal'; category: string; categoryIcon: React.ElementType; title: string; description: string; actionLabel?: string; onAction?: () => void; statusChip?: string; timestamp: string }"
        - "export interface ActionInboxProps { items: InboxItem[]; loading?: boolean; emptyMessage?: string; className?: string }"
        - "export const ActionInbox: FC<ActionInboxProps>"
    - component: WorkflowTimeline
      responsibility: >
        Renders a vertical timeline of WorkflowEntry items with colored status
        markers and a connecting vertical line. Status color mapping: pending
        → warning token, active → info token, resolved → success token,
        cancelled → text-tertiary. Click an entry with a detail string to
        toggle an inline aria-expanded detail row. Shows skeleton when
        loading=true. Shows emptyMessage when entries=[].
      interfaces:
        - "export interface WorkflowEntry { id: string; status: 'pending' | 'active' | 'resolved' | 'cancelled'; title: string; participant?: string; timestamp: string; detail?: string }"
        - "export interface WorkflowTimelineProps { entries: WorkflowEntry[]; loading?: boolean; emptyMessage?: string; className?: string }"
        - "export const WorkflowTimeline: FC<WorkflowTimelineProps>"
    - component: GuardInboxPanel
      responsibility: >
        Fetches guard shifts (/api/guard-replacement/shifts) and notifications
        (/api/users/{id}/notifications) then maps to InboxItem[] and
        WorkflowEntry[]. Shift priority derived from time delta: urgent
        if <2 h, high if <24 h, normal otherwise. Renders ActionInbox +
        WorkflowTimeline in a stacked layout inside a soc-dashboard-card
        container. RBAC-guarded: can(user.role, 'view_guard_workspace').
      interfaces:
        - "export interface GuardInboxPanelProps { user: AppUser }"
        - "export const GuardInboxPanel: FC<GuardInboxPanelProps>"
    - component: SupervisorInboxPanel
      responsibility: >
        Fetches pending-approvals, swap-requests, and incidents in parallel
        (Promise.allSettled). Maps approvals→urgent InboxItems, swaps→high
        InboxItems, incidents→WorkflowEntries. RBAC-guarded:
        can(user.role, 'approve_guards').
      interfaces:
        - "export interface SupervisorInboxPanelProps { user: AppUser }"
        - "export const SupervisorInboxPanel: FC<SupervisorInboxPanelProps>"
    - component: AdminInboxPanel
      responsibility: >
        Fetches pending-approvals, incidents, and analytics/metrics in parallel.
        Renders approvals and incidents as InboxItems; incidents also populate
        WorkflowTimeline. Includes a summary stats row from metrics (total
        on-duty guards, total open incidents) with safe fallback on 4xx.
        RBAC-guarded: can(user.role, 'manage_users').
      interfaces:
        - "export interface AdminInboxPanelProps { user: AppUser }"
        - "export const AdminInboxPanel: FC<AdminInboxPanelProps>"
    - component: SuperadminInboxPanel
      responsibility: >
        Superset of AdminInboxPanel: fetches same three endpoints plus renders
        a "System Health" WorkflowEntry synthesized from metrics. Uses Shield
        icon for governance category. Role-guarded by
        normalizedRole === 'superadmin' check (not a permission, since
        superadmin is the role itself).
      interfaces:
        - "export interface SuperadminInboxPanelProps { user: AppUser }"
        - "export const SuperadminInboxPanel: FC<SuperadminInboxPanelProps>"
  dependencies:
    - component: GuardInboxPanel
      relationship: composes ActionInbox + WorkflowTimeline
    - component: SupervisorInboxPanel
      relationship: composes ActionInbox + WorkflowTimeline
    - component: AdminInboxPanel
      relationship: composes ActionInbox + WorkflowTimeline
    - component: SuperadminInboxPanel
      relationship: composes ActionInbox + WorkflowTimeline
    - component: UserDashboard
      relationship: imports GuardInboxPanel; extends GuardSection type; prepends inbox to navItems
    - component: SuperadminDashboard
      relationship: imports 3 role panels; extends activeSection union; dispatches by isSuperadminViewer/isAdminViewer/isSupervisorViewer
  integration_points:
    - "UserDashboard.tsx ~line 66: extend GuardSection with 'inbox'"
    - "UserDashboard.tsx resolveSectionFromView: add 'inbox' → 'inbox' branch"
    - "UserDashboard.tsx ~line 748 navItems: prepend { key: 'inbox', label: 'Inbox' }"
    - "UserDashboard.tsx content render block: add 'inbox' branch → GuardInboxPanel"
    - "SuperadminDashboard.tsx ~line 192: extend activeSection union with 'inbox'"
    - "SuperadminDashboard.tsx viewToSection: add inbox: 'inbox' entry"
    - "SuperadminDashboard.tsx sectionTitle ternary: add 'inbox' → 'Action Inbox'"
    - "SuperadminDashboard.tsx badgeLabel ternary: add 'inbox' → 'Inbox'"
    - "SuperadminDashboard.tsx content render block: add 'inbox' branch with role dispatch"
    - "navigation.ts GUARD_NAV: prepend { view: 'inbox', label: 'Inbox', group: 'MAIN MENU' }"
    - "navigation.ts ELEVATED_NAV: prepend { view: 'inbox', label: 'Inbox', group: 'MAIN MENU' }"

