plan_id: sentinel-ux-redesign
objective: >
  Perform a thorough analysis of the SENTINEL frontend codebase to support
  implementation of a "Unified Role-Centric Action Inbox + Workflow Timeline"
  UI/UX redesign.
focus_area: frontend-architecture
created_at: "2025-07-21"
created_by: gem-researcher
status: completed

tldr: |
  - Auth state lives entirely in App.tsx (no AuthContext); roles are lowercase strings
    ('guard','supervisor','admin','superadmin'); 'user' normalizes to 'guard'
  - All routing is activeView string state — no React Router; viewRegistry maps 8 views to
    components; dashboard sections (approvals, schedule, missions, analytics, trips, audit-log)
    are handled INSIDE SuperadminDashboard via activeSection state
  - Guard workspace = UserDashboard.tsx (5-tab bottom nav: mission|resources|support|map|profile);
    GuardDashboard.tsx is a stub and should be ignored
  - Elevated roles (superadmin/admin/supervisor) all render SuperadminDashboard which embeds
    CommandCenterDashboard (6 SectionPanels) + User Management table in the 'dashboard' section
  - Design system uses CSS-variable semantic tokens in index.css; Tailwind config maps tokens;
    key named utilities: soc-dashboard-card, soc-scroll-area, soc-label, command-panel, etc.
  - 14 hooks cover all data domains; NotificationCenter (toast), NotificationPanel (bell dropdown),
    AlertsCenter (stub) are the three notification components; push notifications via
    utils/pushNotifications.ts toggled from ProfileDashboard

research_metadata:
  methodology: >
    Hybrid retrieval (semantic_search + grep_search) for initial discovery,
    then targeted parallel read_file passes (3 passes) covering all dashboards,
    hooks, types, config, styling, and layout components. Relationship discovery
    via file imports. Approximately 65 files read across 2 conversations.
  scope: >
    Full DasiaAIO-Frontend/src/ tree: all dashboard components, hooks, types,
    utilities, config, layout, rbac, context, and styling files. Backend
    (Rust/Axum) read only for API endpoint reference; not analyzed architecturally.
  confidence: high
  coverage: 92
  decision_blockers: 0
  research_blockers: 0

