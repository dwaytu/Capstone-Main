# ============================================================
# PATTERNS FOUND
# ============================================================
patterns_found:
  - category: architecture
    pattern: String-based view routing without React Router
    description: >
      App.tsx holds activeView state (string). renderProtectedView checks viewRegistry
      for the string key; falls through to renderHome for 'overview'/'dashboard'.
      Dashboard components have their own activeSection state for sub-navigation.
      Deep navigation requires coordinated prop callbacks (onViewChange).
    examples:
      - file: App.tsx
        location: App.tsx:~500-600
        snippet: "viewRegistry[activeView] ?? renderHome()"
      - file: SuperadminDashboard.tsx
        location: SuperadminDashboard.tsx:~510
        snippet: "if (view === 'approvals' || ...) setActiveSection(view) else onViewChange?.(view)"
    prevalence: common

  - category: architecture
    pattern: Monolithic dashboard components with co-located data fetching
    description: >
      UserDashboard (~950 lines) and SuperadminDashboard (~2500 lines) each own
      their data-fetching logic (multiple fetchX() functions), form state,
      filter state, and section navigation. No separation between container and
      presentation layers.
    examples:
      - file: SuperadminDashboard.tsx
        location: SuperadminDashboard.tsx:~200-800
        snippet: "fetchData(), fetchShifts(), fetchMissions(), fetchPendingApprovals(), fetchGuardsAndFirearms()"
      - file: UserDashboard.tsx
        location: UserDashboard.tsx:~100-400
        snippet: "useState for attendance, scheduleItems, firearmItems, ticketItems, checkInStatus"
    prevalence: common

  - category: architecture
    pattern: Role-conditional rendering via normalizeRole + can() checks
    description: >
      Role checks always pipe through normalizeRole() before comparison.
      can(role, permission) used inline in JSX for conditional rendering.
      Allowed component provides declarative RBAC gate.
    examples:
      - file: SuperadminDashboard.tsx
        location: SuperadminDashboard.tsx:~860
        snippet: "const canManageUsers = can(normalizedViewerRole, 'manage_users')"
      - file: components/rbac/Allowed.tsx
        location: Allowed.tsx:~10
        snippet: "if (!can(role, permission)) return fallback ?? null"
    prevalence: common

  - category: structure
    pattern: SectionPanel as collapsible card container
    description: >
      CommandCenterDashboard uses a SectionPanel component to group related
      sub-panels (title, subtitle, icon, collapsible, actions slot).
      Five panels: System Status, Tactical View, Live Operations,
      Operations Management, Asset Monitoring.
    examples:
      - file: CommandCenterDashboard.tsx
        location: CommandCenterDashboard.tsx:~240
        snippet: "<SectionPanel title=\"Tactical View\" subtitle=\"...\" collapsible>"
    prevalence: occasional

  - category: structure
    pattern: Bottom tab navigation for mobile guard dashboard
    description: >
      UserDashboard renders a sticky bottom tab bar with 5 items
      (mission, resources, support, map, profile). Conceptually similar to
      mobile app tab bars. Desktop adapts same content layout.
    examples:
      - file: UserDashboard.tsx
        location: UserDashboard.tsx:~760
        snippet: "tabNav = [{key:'mission'},{key:'resources'},{key:'support'},{key:'map'},{key:'profile'}]"
    prevalence: occasional

  - category: naming
    pattern: Tone-based StatCard coloring
    description: >
      StatCard accepts a tone prop ('guard'|'vehicle'|'mission'|'maintenance'|
      'analytics'|'default') that maps to CSS utility classes (tone-guard-surface, etc.)
    examples:
      - file: dashboard/ui/StatCard.tsx
        location: StatCard.tsx:~10
        snippet: "tone-guard-surface, tone-vehicle-surface, tone-mission-surface"
    prevalence: common

  - category: error_handling
    pattern: addNotification() as universal user feedback mechanism
    description: >
      Both SuperadminDashboard and UserDashboard define an addNotification()
      function that wraps createNotification() and appends to local notifications state.
      NotificationCenter renders the toast stack.
    examples:
      - file: SuperadminDashboard.tsx
        location: SuperadminDashboard.tsx:~870
        snippet: "addNotification('error', 'Validation Error', 'Please select a guard')"
    prevalence: common

  - category: architecture
    pattern: Polling-based data freshness
    description: >
      Multiple hooks use setInterval for auto-refresh (useOpsSummary: 30s,
      CommandCenterDashboard: 15s, NotificationPanel: 30s). No WebSocket for
      live data; all updates are poll-based.
    examples:
      - file: CommandCenterDashboard.tsx
        location: CommandCenterDashboard.tsx:~85
        snippet: "setInterval(refresh, 15_000)"
    prevalence: common

  - category: testing
    pattern: No test coverage for component files found
    description: >
      tests/ directory exists but contains only tracking_audit_integration.rs
      (Rust integration test). No React component tests located.
    examples:
      - file: DasiaAIO-Backend/tests/tracking_audit_integration.rs
        location: tracking_audit_integration.rs:1
        snippet: "Rust integration test only"
    prevalence: rare

