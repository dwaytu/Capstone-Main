# ============================================================
# SECURITY CONSIDERATIONS
# ============================================================
domain_security_considerations:
  sensitive_areas:
    - area: Auth token storage
      location: App.tsx handleLogin / handleLogout
      concern: >
        JWT + refreshToken stored in localStorage (no HttpOnly cookie).
        Susceptible to XSS token theft. No CSRF protection needed for
        token-based auth, but XSS hardening in user-provided content is critical.
    - area: Role checking without server revalidation
      location: utils/permissions.ts + renderProtectedView
      concern: >
        Client-side role checks gate view rendering only; backend must
        independently validate on every API request. Confirmed backend
        uses middleware auth layer (DasiaAIO-Backend/src/middleware/).
    - area: window.confirm for destructive operations
      location: SuperadminDashboard.tsx handleDeleteUser, handleBulkDeleteSelected
      concern: >
        Uses native window.confirm — not ARIA-role-correct dialog; easily
        bypassed by automation. No additional confirmation for bulk delete.

  authentication_patterns_in_domain: >
    JWT stored in localStorage['token']; refreshToken in localStorage['refreshToken'];
    getAuthHeaders() utility appends Authorization: Bearer token to all API calls.
    handleLogin normalizes role on receipt. handleLogout clears all localStorage.

  authorization_patterns_in_domain: >
    Client: normalizeRole + can()/canAny() + Allowed component for UI gates.
    canViewUserRow / canEditUserRow functions implement row-level scoping in user table.
    Backend: middleware in DasiaAIO-Backend/src/middleware/ (assumed JWT verification).

  data_validation_in_domain: >
    Form inputs validated in submit handlers (mission form checks selectedGuards/
    selectedFirearms/selectedVehicles before POST). No client-side schema
    validation library detected (no Zod/Yup imports found).

# ============================================================
# HOOK INVENTORY
# ============================================================
# Documented here as a dedicated section for the redesign
hooks_inventory:
  - name: useIncidents
    file: hooks/useIncidents.ts
    returns: "{ incidents: Incident[], loading, error, lastUpdated, refresh, reportIncident }"
    api: "GET /api/incidents/active?page=1&page_size=50"
    incident_type: >
      { id, title, description, location, reported_by, status: 'open'|'investigating'|'resolved',
      priority: 'low'|'medium'|'high'|'critical', created_at, updated_at }

  - name: useOpsShifts
    file: hooks/useOpsShifts.ts
    returns: "{ shifts[], loading, error, lastUpdated, refresh }"
    api: "GET /api/guard-replacement/shifts"

  - name: useOpsSummary
    file: hooks/useOpsSummary.ts
    returns: "{ summary: OpsSummary, loading, error, lastUpdated, refresh }"
    ops_summary_type: >
      { activeGuardsOnDuty, guardsAbsentToday, pendingGuardApprovals,
      firearmsCurrentlyIssued, overdueFirearmReturns, activeArmoredCarTrips,
      vehiclesInMaintenance, expiringGuardPermits }
    api: "7 parallel endpoints (shifts, approvals, allocations, overdue, trips, vehicles, permits)"

  - name: usePredictiveAlerts
    file: hooks/usePredictiveAlerts.ts
    returns: "{ alerts: PredictiveAlert[], loading, error, lastUpdated, refresh }"
    predictive_alert_type: >
      { id, category, severity: 'info'|'warning'|'critical', message, detectedAt, context? }
    api: "GET /api/alerts/predictive"

  - name: useGuardReliability
    file: hooks/useGuardReliability.ts
    returns: "{ leaders: GuardReliability[], loading, error, lastUpdated, refresh }"
    api: "GET /api/analytics/guard-reliability"

  - name: useGuardAbsencePrediction
    file: hooks/useGuardAbsencePrediction.ts
    returns: "{ predictions: GuardAbsencePrediction[], loading, error, lastUpdated, refresh }"
    prediction_type: >
      { guardId, guardName, riskScore, riskLevel: 'LOW'|'MEDIUM'|'HIGH',
      previousAbsences, lateCheckins, recentLeaveRequests, formula, calculatedAt }
    api: "GET /api/ai/guard-absence-risk"

  - name: useReplacementSuggestions
    file: hooks/useReplacementSuggestions.ts
    returns: "{ postId, postName, suggestions: ReplacementSuggestion[], loading, error, lastUpdated, refresh }"
    suggestion_type: >
      { guardId, guardName, reliabilityScore, distanceKm, availability,
      permitValid, distanceScore, replacementScore, formula, generatedAt }
    api: "GET /api/ai/replacement-suggestions"

  - name: useVehicleMaintenancePrediction
    file: hooks/useVehicleMaintenancePrediction.ts
    returns: "{ predictions: VehicleMaintenancePrediction[], loading, error, lastUpdated, refresh }"
    prediction_type: >
      { vehicleId, licensePlate, riskScore, riskLevel: 'LOW'|'MEDIUM'|'HIGH',
      mileageSinceService, daysSinceService, recommendedAction, formula }
    api: "GET /api/ai/vehicle-maintenance-risk"

  - name: useOpsAssets
    file: hooks/useOpsAssets.ts
    returns: "{ firearms[], vehicles[], loading, error, lastUpdated, refresh }"
    api: "GET /api/firearms + GET /api/armored-cars"

  - name: useOpsAlerts
    file: hooks/useOpsAlerts.ts
    returns: "getOpsAlerts(summary): OpsAlert[] — pure function, NOT a hook"
    api: "Derived from OpsSummary (no API call)"

  - name: useServiceHealth
    file: hooks/useServiceHealth.ts
    returns: "{ services: ServiceHealthResult, refresh }"
    api: "GET /api/health/system"

  - name: useOperationalMapData
    file: hooks/useOperationalMapData.ts
    returns: "{ clientSites, trackingPoints, geofenceAlerts, activeGuards, guardHistory, ... }"
    api: "Multiple tracking endpoints"

  - name: useAuditLogs
    file: hooks/useAuditLogs.ts
    returns: "{ logs, meta, loading, error, filters, setFilters, fetchPage }"
    api: "GET /api/audit-logs (paginated)"

  - name: useAuditIntelligence
    file: hooks/useAuditIntelligence.ts
    returns: "{ loading, error, fetchAnomalies, fetchUserActivity }"
    api: "GET /api/audit/anomalies, GET /api/audit/user-activity/{id}"

# ============================================================
# ROUTE STRUCTURE REFERENCE
# ============================================================
route_structure:
  top_level_views:
    - key: "overview / dashboard"
      component: renderHome()
      access: all authenticated users
      renders: UserDashboard (guard) OR SuperadminDashboard (elevated)

    - key: profile
      component: ProfileDashboard
      access: all authenticated users
      renders: User profile + push notification toggle + guard availability

    - key: calendar
      component: CalendarDashboard
      access: all (no permission guard)

    - key: performance
      component: PerformanceDashboard
      permission: view_analytics
      access: superadmin, admin, supervisor

    - key: merit
      component: MeritScoreDashboard
      permission: view_analytics
      access: superadmin, admin, supervisor

    - key: firearms
      component: FirearmInventory
      permission: manage_firearms
      access: superadmin, admin, supervisor

    - key: allocation
      component: FirearmAllocation
      permission: manage_allocations
      access: superadmin, admin, supervisor

    - key: permits
      component: GuardFirearmPermits
      permission: manage_permits
      access: superadmin, admin, supervisor

    - key: maintenance
      component: FirearmMaintenance
      permission: manage_maintenance
      access: superadmin, admin, supervisor

    - key: armored-cars
      component: ArmoredCarDashboard
      permission: manage_armored_cars
      access: superadmin, admin, supervisor

  superadmin_dashboard_sections:
    - key: dashboard
      title: Dashboard
      badge: Overview
      content: CommandCenterDashboard + User Management table
    - key: approvals
      title: Guard Approvals
      badge: Approvals
      content: Pending guard registration table with approve/reject actions
    - key: schedule
      title: Guard Schedules
      badge: schedule
      content: Shifts table + Add Schedule form
    - key: missions
      title: Mission Assignment
      badge: missions
      content: Mission assign form + missions list
    - key: analytics
      title: Analytics & Reports
      badge: analytics
      content: AnalyticsDashboard component
    - key: trips
      title: Trip Management
      badge: Trips
      content: TripManagement component
    - key: audit-log
      title: System Audit Log
      badge: Audit Log
      content: AuditDashboard (lazy-loaded)

  guard_dashboard_sections:
    - key: mission
      label: Mission Screen
      content: Duty status, field tracking toggle, shift check-in/out, incident modal
    - key: resources
      label: Resources
      content: GuardResourcesTab (firearms + permits sub-tabs)
    - key: support
      label: Support
      content: Support tickets list + create ticket form
    - key: map
      label: Map
      content: GuardMapTab (expandable map view)
    - key: profile
      label: Profile
      content: Navigate to ProfileDashboard via onViewChange('profile')

