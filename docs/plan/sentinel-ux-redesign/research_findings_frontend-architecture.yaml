      relationship_to_domain: Used by SuperadminDashboard and UserDashboard for UX feedback

    - component: NotificationPanel
      responsibility: Bell-icon dropdown for backend-persisted user notifications
      location: src/components/NotificationPanel.tsx
      relationship_to_domain: User-facing notification history; used in Header

    - component: Allowed
      responsibility: Declarative RBAC gate; renders children if permission satisfied
      location: src/components/rbac/Allowed.tsx
      relationship_to_domain: Used throughout for role-based UI surfaces

  interfaces_used_by_domain:
    - interface: User (AppUser)
      location: src/App.tsx
      usage_pattern: >
        Passed as prop to all dashboard components; source of truth for role,
        id, profilePhoto, and all profile fields

    - interface: Permission
      location: src/utils/permissions.ts
      usage_pattern: >
        Used as argument to can(), canAny(), Allowed component, and viewRegistry
        permission guards

    - interface: NavGroup / NavItem
      location: src/config/navigation.ts
      usage_pattern: >
        Returned by getSidebarNav(); passed to OperationalShell navItems prop;
        consumed by Sidebar for rendering

  data_flow_involving_domain: >
    Login → App.tsx handleLogin → normalizeRole → stores in localStorage →
    sets isLoggedIn=true → renders OperationalShell (elevated) or UserDashboard layout (guard) →
    activeView prop drives view; DashboardComponent owns activeSection sub-routing →
    each hook polls its API endpoint on mount + interval →
    data passed as props to sub-panels → user actions call addNotification()
    for feedback + API mutations

  key_relationships_to_domain:
    - from: SuperadminDashboard
      to: CommandCenterDashboard
      relationship: composes (renders as child in 'dashboard' section)

    - from: SuperadminDashboard
      to: AnalyticsDashboard
      relationship: composes (renders in 'analytics' section)

    - from: SuperadminDashboard
      to: TripManagement
      relationship: composes (renders in 'trips' section)

    - from: SuperadminDashboard
      to: AuditDashboard
      relationship: composes (lazy-loaded in 'audit-log' section)

    - from: App.tsx
      to: SuperadminDashboard
      relationship: composes (elevated roles renderHome)

    - from: App.tsx
      to: UserDashboard
      relationship: composes (guard renderHome)

    - from: OperationalShell
      to: Sidebar
      relationship: composes

    - from: CommandCenterDashboard
      to: OperationalEventContext
      relationship: provides via OperationalEventProvider wrapper

