    - name: Web Push API
      purpose_in_domain: Push notifications via utils/pushNotifications.ts in ProfileDashboard
    - name: Leaflet (suspected)
      purpose_in_domain: Map in OperationalMap / GuardMapTab (not confirmed in reads)

  external_apis_used_in_domain:
    - name: SENTINEL Backend (Rust/Axum)
      integration_point: "http://localhost:5000 (dev) / Railway URL (prod)"

# ============================================================
# CONVENTIONS
# ============================================================
related_conventions:
  naming_patterns_in_domain: >
    Components: PascalCase files matching export name (UserDashboard.tsx).
    Hooks: use* prefix in hooks/ directory.
    CSS utilities: soc-* prefix for named utility classes.
    Tone classes: tone-{name}-surface for semantic color variants.
    View keys: kebab-case strings ('audit-log', 'armored-cars').
    Section types: union string literals (GuardSection, activeSection type).

  structure_of_domain: >
    src/
      App.tsx (root)
      types/ (auth.ts, other types)
      utils/ (permissions.ts, pushNotifications.ts, etc.)
      config/ (navigation.ts)
      context/ (OperationalEventContext, ThemeProvider)
      hooks/ (14 hooks)
      components/
        layout/ (OperationalShell)
        dashboard/ (CommandCenterDashboard + all sub-panels + ui/)
        rbac/ (Allowed, DeniedFallback)
        [feature components at root level]

  error_handling_in_domain: >
    API errors caught in try/catch inside fetch functions within dashboard components.
    User feedback via addNotification() → toast via NotificationCenter.
    Global error state in App.tsx for network/backend health issues.
    ErrorBoundary component exists (src/components/ErrorBoundary.tsx) but usage scope unknown.

  testing_in_domain: >
    No frontend component tests found. Backend has Rust integration test.
    Playwright config (playwright.config.ts) and jest.config.cjs exist but
    test coverage status unknown.

  documentation_in_domain: >
    CHATGPT_SYSTEM_GUIDE.md and SENTINEL - Group 8.md are the primary documentation files
    maintained in sync with implementation per system-guide-maintenance.instructions.md.
    COPILOT.md provides architectural context for Copilot.

