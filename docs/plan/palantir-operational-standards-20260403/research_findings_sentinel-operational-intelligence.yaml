    - Health endpoint checks for backend smoke verification

translated_standards:
  palantir_like_definition:
    concise_definition: A Palantir-like operational intelligence platform is a decision-centric operating system that fuses live multi-source data, shared operational objects, governed actions, and human-in-the-loop workflows into one role-aware environment built for fast, high-consequence decisions.
    core_traits:
      - trait: Real-time fused operational picture
        standard: The platform must combine incidents, personnel, assets, geography, alerts, and predictions into one continuously refreshed operational view rather than separate reporting pages.
        source_basis:
          - Palantir Foundry describes closed-loop operations and real-time collaboration.
          - SENTINEL CommandCenterDashboard merges summary, shifts, assets, incidents, and predictions on a 15-second cycle.
      - trait: Shared operational model
        standard: Data must be represented as coherent operational objects and relationships so multiple panels and workflows reference the same incident, guard, site, mission, firearm, or vehicle instead of duplicating state.
        source_basis:
          - Palantir Ontology describes coherent objects, properties, links, actions, logic, and security.
          - SENTINEL OperationalEventContext provides a small but real shared-event pattern.
      - trait: Decision environments, not dashboard cosmetics
        standard: Every major surface must answer what is happening, what matters now, who owns it, what can be done next, and what changes if an operator acts.
        source_basis:
          - Gotham frames itself as an operating system for global decision-making.
          - SENTINEL inbox panels already turn raw data into review, assign, inspect, and approve actions.
      - trait: Human-in-the-loop AI
        standard: AI outputs must propose, prioritize, or explain actions inside operational workflows, but remain visible, attributable, and approval-aware.
        source_basis:
          - AIP emphasizes operators reviewing AI-proposed resolutions with execution visibility.
          - SENTINEL system docs describe predictive panels upgraded to actionable buttons.
      - trait: Governed actionability
        standard: The same platform that reads operational truth must be able to write back through controlled workflows, audit trails, and role restrictions.
        source_basis:
          - Palantir Ontology describes traceable, governed actions and unified security policies.
          - SENTINEL permissions, approvals, audit surfaces, and rollout/audit docs establish the beginnings of that control model.
      - trait: High-stakes clarity
        standard: Severity, freshness, ownership, state transitions, and next actions must be visually obvious in the first scan, especially on mobile or degraded connections.
        source_basis:
          - Gotham and Foundry emphasize operational environments under dynamic conditions.
          - SENTINEL PRD and guard UX tests explicitly prioritize first-viewport mission clarity and summary-first layouts.
  sentinel_role_decision_model:
    superadmin:
      mission: Govern the integrity of the entire platform and intervene on cross-domain risk, access, and compliance.
      primary_decisions:
        - Approve or reject pending accounts and privileged operational changes.
        - Review unresolved or severe incidents with governance implications.
        - Inspect audit history and system-wide anomalies.
        - Set escalation posture when systemic drift, abuse, or policy conflict appears.
      decision_environment_standard:
        - Governance inbox with overdue approvals, unresolved incidents, and unread compliance-significant notifications.
        - Full access to audit logs, analytics, users, operations, and resources.
        - Authority to see and act across all roles.
      evidence_in_repo:
        - SuperadminInboxPanel labels the surface as Governance Inbox and prioritizes incidents plus overdue approvals.
        - permissions.ts grants manage_users and view_audit_logs only to superadmin.
    admin:
      mission: Run operational readiness across personnel, assets, approvals, and day-to-day service continuity.
      primary_decisions:
        - Approve guard-related operational requests.
        - Investigate firearm or asset statuses requiring action.
        - Monitor incident counts, active guards, and readiness signals.
        - Coordinate staffing and resource availability across the operation.
      decision_environment_standard:
        - Operations inbox with approvals, firearm status reviews, and unread operational notifications.
        - Access to analytics and resource-management views, without superadmin-only governance powers.
        - Visibility into most roles except superadmin for user-row management.
      evidence_in_repo:
        - AdminInboxPanel builds queue items from approvals, firearms, notifications, and metrics.
        - SuperadminDashboard restricts admin from acting on superadmin rows.
    supervisor:
      mission: Control the field in near-real time by resolving staffing gaps, live incidents, and on-the-ground execution friction.
      primary_decisions:
        - Fill unassigned shifts and replacement needs.
        - Triage active incidents by site and urgency.
        - Act on live field notifications and local operational disruptions.
        - Maintain situational awareness through field telemetry and incident timelines.
      decision_environment_standard:
        - Field Control Inbox centered on replacement approvals, live incidents, and unassigned shifts.
        - Access to the elevated command center but with narrower authority boundaries than admin or superadmin.
        - Live tracking and field heartbeat access retained because supervisor is an operational edge role.
      evidence_in_repo:
        - SupervisorInboxPanel explicitly labels the surface Field Control Inbox.
        - App.tsx permits tracking heartbeat for supervisor and guard roles only.
    guard:
      mission: Execute assigned work safely and accurately with minimal cognitive overhead under field pressure.
      primary_decisions:
        - Confirm current assignment and next shift obligations.
        - Check in, check out, report incidents, and request help or schedule changes.
        - Maintain awareness of permits, equipment, map position, and support channels.
        - Continue operating in degraded conditions when connectivity is limited.
      decision_environment_standard:
        - Mission-first field shell with inbox, mission, resources, support, and map.
        - First viewport must show duty context, primary actions, and immediate status without admin noise.
        - Offline or partial-sync behavior must be explicit and survivable.
      evidence_in_repo:
        - UserDashboard implements a compact GuardSection model and offline queue integration.
        - GuardInboxPanel prioritizes upcoming shifts, swap requests, unread notices, and offline messaging.
  production_grade_panel_criteria:
    platform_and_data:
      - criterion: One shared operational truth model linking guards, incidents, shifts, vehicles, firearms, sites, and alerts across views.
      - criterion: Cross-panel focus state so alerts, maps, feeds, and detail panes can align on the same event or mission.
      - criterion: Clearly documented freshness model for each live stream, including timestamp, update frequency, and stale-state behavior.
    role_design:
      - criterion: Each role has a distinct decision charter, queue, escalation scope, and action boundary rather than a single generic dashboard with hidden buttons.
      - criterion: Access control is enforced in both navigation and action execution paths, with auditable reasoning for privileged decisions.
      - criterion: High-consequence actions are attributable to a person or controlled automation path.
    operational_workflows:
      - criterion: Mission-critical flows are closed loop, meaning alert to decision to action to acknowledgement to resolution is visible in one system.
      - criterion: AI predictions and summaries are embedded into workflows as explainable recommendations, not detached side widgets.
      - criterion: Failure modes are treated as first-class states, including offline, partial sync, stale feed, and degraded service conditions.
    reliability_and_security:
      - criterion: Production deployment path is documented and repeatable across web, desktop, and mobile against one canonical backend.
      - criterion: Build, test, health-check, and release verification evidence exists and is current.
      - criterion: Secrets, auth, password reset, audit logging, and role enforcement show explicit hardening rather than classroom defaults.
    high_stakes_ux_clarity:
      - criterion: First scan reveals severity, owner, freshness, and next action without interpretation work.
      - criterion: One screen does not compete with itself through duplicated navigation, inconsistent status language, or decorative overload.
      - criterion: Mobile and field usage preserve action clarity, thumb reach, and cognitive simplicity.
      - criterion: Alerts and recommendations are prioritized, labeled, and contextualized enough that operators can trust what they are seeing under pressure.
  student_level_anti_patterns:
    - anti_pattern: A dashboard that mostly reports numbers but does not let operators decide or act from the same surface.
    - anti_pattern: One shared UI for every role where differentiation is mostly visual or hidden rather than decision-based.
    - anti_pattern: 'AI' features that generate summaries or scores without provenance, confidence framing, or workflow integration.
    - anti_pattern: No visible freshness, stale-state handling, or degraded-mode behavior for live operational data.
    - anti_pattern: Fragmented data where incidents, schedules, assets, and map context disagree or must be reconciled manually by the operator.
    - anti_pattern: Over-designed interfaces that look sophisticated but bury urgent actions, ownership, and severity cues.

open_questions:
  - question: Is the capstone panel evaluating SENTINEL against enterprise product heuristics or against literal defense-grade command-and-control expectations?
    context: The phrase 'Palantir-level' can imply either platform qualities or military-grade operational scope, and those are not the same bar.
    type: nice_to_know
    affects: []
  - question: Which operational objects should become first-class shared entities in SENTINEL's own explicit ontology or object model?
    context: Current code already links events across panels, but the repository does not document a formal shared operational object model.
    type: research
    affects: []
  - question: What are the target freshness, uptime, and response-time expectations for command-center surfaces?
    context: Production-grade judgment depends heavily on non-functional targets, but these are not formally documented in the reviewed materials.
    type: research
    affects: []

gaps:
  - area: Formal operational ontology
    description: The repo documents many domains and cross-panel event focus, but it does not define one formal shared entity/action model comparable to the Ontology language used in Palantir's platform framing.
    impact: research_blocker
    affects: []
  - area: Non-functional operating thresholds
    description: Freshness SLAs, stale-data thresholds, escalation latency targets, and operator response budgets are not explicitly defined in the reviewed docs.
    impact: research_blocker
    affects: []
  - area: Role-specific elevated home experiences
    description: Elevated roles are well differentiated by permissions and inboxes, but they still share one main dashboard shell rather than fully distinct decision environments.
    impact: nice_to_know
    affects: []
  - area: Human-in-the-loop governance policy detail
    description: AI actionability is described in the system guide, but the exact approval, override, and accountability rules for AI-assisted actions are not fully documented in the reviewed artifacts.
    impact: nice_to_know
    affects: []
