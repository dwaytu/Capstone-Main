related_conventions:
  naming_patterns_in_domain: Role and workspace naming is explicit and operator-oriented, using terms such as CommandCenterDashboard, Field Control Inbox, Governance Inbox, OperationalEventContext, and Mission-first guard sections.
  structure_of_domain: Elevated roles use one shared shell with route-level modules and role-specific queue panels; guard workflows are condensed into a focused field shell.
  error_handling_in_domain: Frontline and inbox surfaces prefer partial-failure tolerance, empty states, and offline or retry messaging over hard crashes.
  testing_in_domain: Current documented testing emphasis is strongest for the guard UX tranche; production docs also record build, test, Docker, and health-check validation.
  documentation_in_domain: High-level behavior is documented in PRD, system guide, rollout guide, and system audit artifacts rather than one dedicated operational-standards document.

related_dependencies:
  internal:
    - component: DasiaAIO-Frontend/src/utils/api.ts
      relationship_to_domain: Provides authenticated fetch behavior and protected request handling.
      direction: outbound
    - component: DasiaAIO-Frontend/src/hooks
      relationship_to_domain: Supplies live summary, assets, incidents, predictions, and service health to the command center.
      direction: outbound
    - component: DasiaAIO-Backend API routes and services
      relationship_to_domain: Supplies the operational data model and AI outputs rendered by the frontend decision environments.
      direction: outbound
  external:
    - name: Railway
      purpose_for_domain: Production hosting and backend deployment target documented in rollout materials.
    - name: Docker Compose
      purpose_for_domain: Local operational verification path for backend and database services.

domain_security_considerations:
  sensitive_areas:
    - area: Role-based access to elevated operational views
      location: DasiaAIO-Frontend/src/App.tsx; DasiaAIO-Frontend/src/utils/permissions.ts
      concern: Decision environments expose incident, personnel, audit, and resource controls that must remain capability-gated.
    - area: Human-in-the-loop operational actions
      location: CHATGPT_SYSTEM_GUIDE.md:215; DasiaAIO-Frontend/src/components/dashboard/CommandCenterDashboard.tsx
      concern: AI-suggested or high-impact actions must remain attributable, governed, and reviewable.
    - area: Location tracking
      location: DasiaAIO-Frontend/src/App.tsx:634; DasiaAIO-Frontend/src/components/guards/UserDashboard.tsx
      concern: Live location and field telemetry require explicit consent, scoped role access, and clear operator messaging.
  authentication_patterns_in_domain: Authenticated session state is required before protected API calls and home rendering; login and consent gating are handled at the application root.
  authorization_patterns_in_domain: Authorization is implemented through normalized roles, a permission matrix, filtered navigation, and access-denied fallbacks.
  data_validation_in_domain: Frontend validation is present for role normalization and section gating, while backend/API contract enforcement remains the source of truth for protected writes.

testing_patterns:
