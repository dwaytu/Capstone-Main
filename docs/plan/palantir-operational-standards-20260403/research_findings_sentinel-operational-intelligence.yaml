patterns_found:
  - category: architecture
    pattern: Shared elevated command environment with role-specific inbox overlays.
    description: Superadmin, admin, and supervisor all enter the same elevated dashboard shell, but each role sees a different decision queue and authority boundary.
    examples:
      - file: DasiaAIO-Frontend/src/App.tsx
        location: DasiaAIO-Frontend/src/App.tsx:819
        snippet: if (role === 'superadmin' || role === 'admin' || role === 'supervisor') { return <SuperadminDashboard ... /> }
      - file: DasiaAIO-Frontend/src/components/admin/SuperadminDashboard.tsx
        location: DasiaAIO-Frontend/src/components/admin/SuperadminDashboard.tsx:19
        snippet: import { SupervisorInboxPanel } ... import { AdminInboxPanel } ... import { SuperadminInboxPanel }
    prevalence: common
  - category: architecture
    pattern: Unified operations picture assembled from multiple live domains.
    description: The command center fuses personnel, incident, vehicle, firearm, and predictive-alert streams into one operational view.
    examples:
      - file: DasiaAIO-Frontend/src/components/dashboard/CommandCenterDashboard.tsx
        location: DasiaAIO-Frontend/src/components/dashboard/CommandCenterDashboard.tsx:46
        snippet: const summaryState = useOpsSummary(); const shiftsState = useOpsShifts(); const assetsState = useOpsAssets(); const incidentsState = useIncidents()
      - file: DasiaAIO-Frontend/src/components/dashboard/CommandCenterDashboard.tsx
        location: DasiaAIO-Frontend/src/components/dashboard/CommandCenterDashboard.tsx:118
        snippet: liveOperationsItems combines shifts, vehicles, incidents, and firearms into one feed.
    prevalence: common
  - category: structure
    pattern: Mission-first field UX for guards.
    description: Guard flows are compressed into a small set of field actions and sections rather than a dense multi-pane admin shell.
    examples:
      - file: DasiaAIO-Frontend/src/components/guards/UserDashboard.tsx
        location: DasiaAIO-Frontend/src/components/guards/UserDashboard.tsx:56
        snippet: type GuardSection = 'inbox' | 'mission' | 'resources' | 'support' | 'map'
      - file: docs/PRD.yaml
        location: docs/PRD.yaml:4
        snippet: as_a Guard i_want A mission-first dashboard landing view that surfaces my current duty context and primary actions immediately
    prevalence: common
  - category: architecture
    pattern: Cross-panel event focus instead of isolated widgets.
    description: Event selection is shared across panels so multiple modules can align around the same incident or alert.
    examples:
      - file: DasiaAIO-Frontend/src/context/OperationalEventContext.tsx
        location: DasiaAIO-Frontend/src/context/OperationalEventContext.tsx:20
        snippet: OperationalEventProvider stores selectedEventId, selectedEvent, selectEvent, clearSelection.
      - file: CHATGPT_SYSTEM_GUIDE.md
        location: CHATGPT_SYSTEM_GUIDE.md:217
        snippet: Cross-panel selection highlights matching rows across alert and feed panels.
    prevalence: occasional
  - category: security
    pattern: Role normalization and capability gating before rendering or tracking.
    description: Roles are normalized early, views are permission-gated, and tracking is restricted to the operational edge roles.
    examples:
      - file: DasiaAIO-Frontend/src/types/auth.ts
        location: DasiaAIO-Frontend/src/types/auth.ts:13
        snippet: normalizeRole maps invalid or legacy values to a safe Role.
      - file: DasiaAIO-Frontend/src/App.tsx
        location: DasiaAIO-Frontend/src/App.tsx:784
        snippet: canView checks route permission before view rendering.
      - file: DasiaAIO-Frontend/src/App.tsx
        location: DasiaAIO-Frontend/src/App.tsx:635
        snippet: const canSendTrackingHeartbeat = role === 'supervisor' || role === 'guard'
    prevalence: common
  - category: ux
    pattern: Degraded-mode messaging for frontline continuity.
    description: Guard-facing flows expose offline, sync, and partial-failure cues instead of silently failing.
    examples:
      - file: DasiaAIO-Frontend/src/components/inbox/GuardInboxPanel.tsx
        location: DasiaAIO-Frontend/src/components/inbox/GuardInboxPanel.tsx:186
        snippet: Offline - showing cached data
      - file: DasiaAIO-Frontend/src/components/guards/UserDashboard.tsx
        location: DasiaAIO-Frontend/src/components/guards/UserDashboard.tsx:112
        snippet: state includes isInitialLoading, isSyncing, syncError, actionStatus, isOnline
    prevalence: occasional
  - category: testing
    pattern: UX acceptance tests focus on first-viewport clarity and action availability.
    description: Guard redesign tests validate mission hierarchy, sticky actions, summary-first sections, and support grouping.
    examples:
      - file: docs/PRD.yaml
        location: docs/PRD.yaml:30
        snippet: AC-001 Mission-first hierarchy is visible in first viewport
      - file: DasiaAIO-Frontend/src/__tests__/guardDashboardRedesign.test.tsx
        location: DasiaAIO-Frontend/src/__tests__/guardDashboardRedesign.test.tsx:120
