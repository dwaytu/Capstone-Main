      roles: [superadmin, admin, supervisor]
      in_sidebar: true
      sidebar_label: "Firearms"
      sidebar_glyph: "FA"
      sidebar_group: "RESOURCES"
      sidebar_permission: "manage_firearms"
      notes: "Uses manual Sidebar+Header. HARDCODES its own nav items (does not use getSidebarNav)"

    - path: "/allocation"
      component: "FirearmAllocation"
      roles: [superadmin, admin, supervisor]
      in_sidebar: true
      sidebar_label: "Allocation"
      sidebar_glyph: "AS"
      sidebar_group: "RESOURCES"
      sidebar_permission: "manage_allocations"
      notes: "Uses manual Sidebar+Header shell"

    - path: "/permits"
      component: "GuardFirearmPermits"
      roles: [superadmin, admin, supervisor, guard]
      in_sidebar: true
      sidebar_label: "Permits"
      sidebar_glyph: "PM"
      sidebar_group: "RESOURCES"
      sidebar_permission: "manage_permits"
      notes: "ALL_ROLES route. Uses manual Sidebar+Header shell."

    - path: "/maintenance"
      component: "FirearmMaintenance"
      roles: [superadmin, admin, supervisor]
      in_sidebar: true
      sidebar_label: "Maintenance"
      sidebar_glyph: "MT"
      sidebar_group: "RESOURCES"
      sidebar_permission: "manage_maintenance"
      notes: "Uses manual Sidebar+Header shell"

    - path: "/armored-cars"
      component: "ArmoredCarDashboard"
      roles: [superadmin, admin, supervisor, guard]
      in_sidebar: true
      sidebar_label: "Armored Cars"
      sidebar_glyph: "AC"
      sidebar_group: "RESOURCES"
      sidebar_permission: "manage_armored_cars"
      notes: "ALL_ROLES route. Uses manual Sidebar+Header shell."

    - path: "/analytics"
      component: "AnalyticsDashboard"
      roles: [superadmin, admin, supervisor]
      in_sidebar: true
      sidebar_label: "Analytics"
      sidebar_glyph: "AN"
      sidebar_group: "MAIN MENU"
      sidebar_permission: "view_analytics"
      notes: "NO SHELL CHROME — no Sidebar or Header rendered inside the component. Relies entirely on being inside AppShell's Outlet."

    - path: "/audit"
