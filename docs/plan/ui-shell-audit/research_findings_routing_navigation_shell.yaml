      component: "CalendarDashboard"
      roles: [superadmin, admin, supervisor, guard]
      in_sidebar: true
      sidebar_label: "Calendar"
      sidebar_glyph: "CL"
      sidebar_group: "MAIN MENU"
      notes: "Uses manual Sidebar+Header shell"

    - path: "/profile"
      component: "ProfileDashboard"
      roles: [superadmin, admin, supervisor, guard]
      in_sidebar: false
      notes: "Uses manual Sidebar+Header shell. Not in sidebar nav — accessed via HeaderGlobalActions."

    - path: "/settings"
      component: "SettingsView"
      roles: [superadmin, admin, supervisor, guard]
      in_sidebar: false
      notes: "Uses OperationalShell. Not in sidebar nav — accessed via HeaderGlobalActions."

    - path: "/shift-swaps"
      component: "div (stub: 'Shift Swaps')"
      roles: [superadmin, admin, supervisor, guard]
      in_sidebar: false
      notes: "STUB — renders plain div, not a real component"

    - path: "/notifications"
      component: "div (stub: 'Notifications')"
      roles: [superadmin, admin, supervisor, guard]
      in_sidebar: false
      notes: "STUB — renders plain div, not a real component"

    - path: "/support"
      component: "div (stub: 'Support')"
      roles: [superadmin, admin, supervisor, guard]
      in_sidebar: false
      notes: "STUB — renders plain div, not a real component"

    - path: "/inbox"
      component: "SuperadminDashboard"
      roles: [superadmin, admin, supervisor, guard]
      in_sidebar: false
      notes: "ALL_ROLES route but renders SuperadminDashboard which assumes elevated role. Guard accessing /inbox will see SuperadminDashboard's OperationalShell — potential UX issue."

    - path: "*"
      component: "Navigate → /dashboard"
      roles: "*"
      in_sidebar: false
      notes: "Catch-all redirect inside AppShell"

