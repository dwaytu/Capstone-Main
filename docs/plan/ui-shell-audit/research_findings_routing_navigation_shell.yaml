plan_id: ui-shell-audit
objective: "Map all frontend routing, navigation, shell architecture, and role-based UI differentiation"
focus_area: routing_navigation_shell
created_at: "2026-04-05"
created_by: gem-researcher
status: completed

tldr: |
  - Router uses react-router v7 createBrowserRouter with AppShell as the auth-gated layout; 23 route paths defined in ROUTES constant, mapped through RoleGuard wrappers with 4 role tiers.
  - Two distinct shell patterns coexist: OperationalShell (used by SuperadminDashboard, AdminDashboard, SettingsView) and a manual Sidebar+Header pattern (used by Calendar, Performance, Merit, Firearms, Allocation, Permits, Maintenance, ArmoredCars, Profile). Guard uses its own custom layout with no sidebar.
  - Sidebar labels are clean readable strings (e.g., "Dashboard", "Approvals", "Calendar") but the sidebar renders a 2-char glyph badge with each label. User-reported "DGDashboard" is the glyph "DG" prepended to "Dashboard" visually — this is a rendering concatenation in the glyph+label layout, not a broken label.
  - Significant architecture inconsistency: ~8 page components manually compose Sidebar+Header instead of using OperationalShell; FirearmInventory hardcodes its own nav items array instead of using getSidebarNav(); AnalyticsDashboard and AuditDashboard render zero shell chrome (no sidebar, no header — they rely on being inside AppShell's Outlet).
  - Mobile bottom nav is rendered by AppShell for non-guard roles (5 items: Dashboard, Calendar, Firearms, Vehicles, Profile) and is absent for guards (guard sticky nav replaces it).

research_metadata:
  methodology: "hybrid retrieval: semantic_search + grep_search + targeted file reads across router, navigation config, layout shells, and all dashboard components"
  scope: "All frontend routing, sidebar, shell layout, mobile nav, role guards, and navigation label definitions"
  confidence: high
  coverage: 95
  decision_blockers: 0
  research_blockers: 0

# ═══════════════════════════════════════════════════════════════════════════════
# COMPLETE ROUTE TABLE
# ═══════════════════════════════════════════════════════════════════════════════

route_table:
  source_file: "DasiaAIO-Frontend/src/router/index.tsx"
  route_definitions: "DasiaAIO-Frontend/src/router/routes.ts"
  guard_definitions: "DasiaAIO-Frontend/src/router/guards.tsx"

  role_groups:
    ELEVATED_ROLES: [superadmin, admin, supervisor]
    ALL_ROLES: [superadmin, admin, supervisor, guard]
    SUPERADMIN_ONLY: [superadmin]
    GUARD_ONLY: [guard]

  routes:
    # ── Unauthenticated ──────────────────────────────────────────────────
    - path: "/"
      component: "Navigate → /dashboard"
      roles: "*"
      in_sidebar: false
      notes: "Root redirect"

    - path: "/login"
      component: "LoginPage"
      roles: "unauthenticated"
      in_sidebar: false
      notes: "Lazy loaded. On guard login navigates to /overview, elevated to /dashboard"

    # ── Authenticated (inside AppShell) ──────────────────────────────────

    # ELEVATED_ROLES group
    - path: "/dashboard"
      component: "SuperadminDashboard"
      roles: [superadmin, admin, supervisor]
      in_sidebar: true
      sidebar_label: "Dashboard"
      sidebar_glyph: "DG"
      sidebar_group: "MAIN MENU"
      notes: "Elevated-role home. Uses OperationalShell."

    - path: "/approvals"
      component: "SuperadminDashboard"
      roles: [superadmin, admin, supervisor]
      in_sidebar: true
      sidebar_label: "Approvals"
      sidebar_glyph: "AP"
      sidebar_group: "MAIN MENU"
      sidebar_permission: "approve_guards"
      notes: "Same component as /dashboard; activeView maps to internal approvals section"

    - path: "/schedule"
      component: "SuperadminDashboard"
      roles: [superadmin, admin, supervisor]
      in_sidebar: true
      sidebar_label: "Schedule"
      sidebar_glyph: "SC"
      sidebar_group: "OPERATIONS"
      notes: "Same component; internal schedule section"

    - path: "/missions"
      component: "SuperadminDashboard"
      roles: [superadmin, admin, supervisor]
      in_sidebar: true
      sidebar_label: "Missions"
      sidebar_glyph: "MS"
      sidebar_group: "OPERATIONS"
      notes: "Same component; internal missions section"

    - path: "/trips"
      component: "SuperadminDashboard"
      roles: [superadmin, admin, supervisor]
      in_sidebar: true
      sidebar_label: "Trip Management"
      sidebar_glyph: "TR"
      sidebar_group: "OPERATIONS"
      notes: "Same component; internal trips section"

    - path: "/performance"
      component: "PerformanceDashboard"
      roles: [superadmin, admin, supervisor]
      in_sidebar: true
      sidebar_label: "Performance"
      sidebar_glyph: "PF"
      sidebar_group: "OPERATIONS"
      notes: "Uses manual Sidebar+Header shell (not OperationalShell)"

    - path: "/merit"
      component: "MeritScoreDashboard"
      roles: [superadmin, admin, supervisor]
      in_sidebar: true
      sidebar_label: "Merit Scores"
      sidebar_glyph: "MR"
      sidebar_group: "OPERATIONS"
      notes: "Uses manual Sidebar+Header shell"

    - path: "/firearms"
