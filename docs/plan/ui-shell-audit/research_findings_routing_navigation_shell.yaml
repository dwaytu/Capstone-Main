# ═══════════════════════════════════════════════════════════════════════════════
# SHELL / LAYOUT ARCHITECTURE
# ═══════════════════════════════════════════════════════════════════════════════

shell_architecture:
  outer_wrapper:
    component: "AppShell"
    file: "DasiaAIO-Frontend/src/components/layout/AppShell.tsx"
    responsibilities:
      - "Auth gate (redirects to /login if not logged in)"
      - "Loading skeleton"
      - "Terms of Agreement modal (blocking)"
      - "Location consent upgrade modal"
      - "What's New modal"
      - "Release update modal"
      - "Connectivity banner (offline/backend unreachable)"
      - "Location permission banner"
      - "Mobile bottom nav (non-guard only)"
      - "Check for Updates button (desktop, non-guard, non-dev)"
      - "ToastContainer"
    renders: "<Outlet /> for child routes"
    does_NOT_render: "No Sidebar, no Header — those are per-component responsibility"

  elevated_shell_pattern_A:
    name: "OperationalShell"
    file: "DasiaAIO-Frontend/src/components/layout/OperationalShell.tsx"
    structure: |
      <div flex h-[100dvh]>
        <skip-link />
        <Sidebar items={navItems} ... />
        <main>
          <Header title={...} badgeLabel={...} ... />
          <div soc-scroll-area>
            {error banner}
            {children}
          </div>
        </main>
      </div>
    used_by:
      - "SuperadminDashboard (admin/SuperadminDashboard.tsx)"
      - "AdminDashboard (AdminDashboard.tsx) — legacy, not routed"
      - "SettingsView (settings/SettingsView.tsx)"
    sidebar_source: "getSidebarNav(user.role)"
    header_source: "shared/Header.tsx"

  elevated_shell_pattern_B:
    name: "Manual Sidebar+Header (legacy pattern)"
    structure: |
      <div flex h-[100dvh]>
        <skip-link />  -- sometimes missing
        <Sidebar items={navItems} ... />
        <main>
          <Header title={...} ... />
          <div overflow-y-auto>
            {content}
          </div>
        </main>
      </div>
    used_by:
      - "CalendarDashboard"
      - "PerformanceDashboard"
      - "MeritScoreDashboard"
      - "FirearmInventory"
      - "FirearmAllocation"
      - "GuardFirearmPermits"
      - "FirearmMaintenance"
      - "ArmoredCarDashboard"
      - "ProfileDashboard"
    sidebar_source: "getSidebarNav(user.role) — EXCEPT FirearmInventory which hardcodes navItems"
    header_source: "Header.tsx (shim) → shared/Header.tsx"
    issues:
      - "Duplicates shell chrome (Sidebar+Header) in every component"
      - "Skip link may be missing in some components"
      - "No shared scroll area styling (soc-scroll-area)"
      - "No shared error banner pattern"

  no_shell_pattern:
    name: "Bare component (no chrome)"
    used_by:
      - "AnalyticsDashboard — renders content only, no Sidebar/Header"
      - "AuditDashboard — renders content only, no Sidebar/Header"
    notes: |
      These components render inside AppShell's <Outlet> but AppShell does NOT provide Sidebar/Header.
      Result: when navigating to /analytics or /audit, the user sees content with NO sidebar, NO header,
      NO navigation. This is a SIGNIFICANT issue — these pages have no way to navigate away
      except browser back button.

  guard_shell:
    name: "Guard custom layout"
    file: "DasiaAIO-Frontend/src/components/guards/UserDashboard.tsx"
    structure: |
      <div min-h-[100dvh]>
        <skip-link />
        <header (custom, not shared/Header)>
          "Field Operations" + user name
          HeaderGlobalActions (inbox, settings, profile, refresh)
        </header>
        <main guard-sticky-main>
          {section content based on activeSection}
        </main>
        <div guard-sticky-region>
          <EmergencyContactsBar />
          <nav guard-sticky-nav>
            [Mission] [Resources] [Support] [Map]
          </nav>
        </div>
        <PanicButton />
      </div>
    notes:
      - "No sidebar at all — guard uses bottom sticky nav"
      - "Custom inline header (not shared/Header.tsx)"
      - "activeSection is internal state, not URL-driven (except initial resolve from activeView prop)"
      - "Sections: inbox, mission, resources, support, map"
      - "EmergencyContactsBar always visible above nav"
      - "PanicButton (64px) always visible bottom-right"

# ═══════════════════════════════════════════════════════════════════════════════
# ROLE-BASED UI DIFFERENTIATION
# ═══════════════════════════════════════════════════════════════════════════════

role_differentiation:
  how_role_is_used:
    - "normalizeRole() converts 'user' → 'guard' and lowercases role strings"
    - "RoleGuard component in router checks user.role against allowed roles array"
    - "getSidebarNav() filters ELEVATED_NAV by permission-based access"
    - "can() in utils/permissions.ts checks role→permission mapping"
    - "Allowed/DeniedFallback RBAC components wrap fine-grained sections"
    - "AppShell checks normalizedRole === 'guard' for mobile nav variant and guard sticky region logic"

  elevated_roles_share_same_component: true
  explanation: |
    superadmin, admin, and supervisor all use SuperadminDashboard.tsx as their home page.
    The component internally checks role permissions to show/hide:
    - canManageUsers (superadmin, admin)
    - canViewUserRow/canEditUserRow (hierarchy-based)
    - isSuperadminViewer, isAdminViewer, isSupervisorViewer for edit controls
    Sidebar items are filtered by getSidebarNav which uses the can() permission checker.

  guard_fully_separate: true
  explanation_guard: |
    Guard uses UserDashboard.tsx — a completely different component with its own layout,
    its own header, its own bottom nav, and no sidebar. It has sections (mission, resources,
    support, map, inbox) managed via internal state.

  inbox_role_differentiation:
    superadmin: "SuperadminInboxPanel"
    admin: "AdminInboxPanel"
    supervisor: "SupervisorInboxPanel"
    guard: "GuardInboxPanel (inside UserDashboard)"
    notes: "Each role has a dedicated inbox panel component. Guard inbox is within UserDashboard's section system."

# ═══════════════════════════════════════════════════════════════════════════════
# ISSUES AND CONCERNS
# ═══════════════════════════════════════════════════════════════════════════════

issues_found:
  critical:
    - issue: "AnalyticsDashboard and AuditDashboard have NO navigation shell chrome"
      detail: |
        These components render bare content with no Sidebar, no Header, no back navigation.
        User navigating to /analytics or /audit has no way to navigate to other pages
        without using browser back button. Likely a migration gap when routes were extracted
        from SuperadminDashboard's internal sections.
      files:
        - "DasiaAIO-Frontend/src/components/AnalyticsDashboard.tsx"
        - "DasiaAIO-Frontend/src/components/AuditDashboard.tsx"

    - issue: "/inbox route renders SuperadminDashboard for ALL roles including guard"
      detail: |
        In router/index.tsx, /inbox is in the ALL_ROLES group but renders SuperadminDashboard.
        When a guard navigates to /inbox, they see OperationalShell with elevated sidebar nav.
        The inbox content itself switches (GuardInboxPanel vs SuperadminInboxPanel),
        but the SHELL displayed is the elevated-role OperationalShell — guard sees the full
        admin sidebar when on /inbox page. This is a role leak in the UI chrome.
      files:
        - "DasiaAIO-Frontend/src/router/index.tsx:154"

  high:
    - issue: "Shell duplication across ~9 page components"
      detail: |
        CalendarDashboard, PerformanceDashboard, MeritScoreDashboard, FirearmInventory,
        FirearmAllocation, GuardFirearmPermits, FirearmMaintenance, ArmoredCarDashboard,
        ProfileDashboard all manually compose Sidebar+Header instead of using OperationalShell.
        This causes maintenance burden and inconsistency.

    - issue: "FirearmInventory hardcodes its own nav items"
      detail: |
        FirearmInventory.tsx defines a local navItems array instead of calling getSidebarNav().
        This array is missing the 'audit-log' item and does not perform permission filtering.
        Any changes to navigation config will not propagate to this component.
      file: "DasiaAIO-Frontend/src/components/FirearmInventory.tsx:44-58"

    - issue: "3 route stubs render plain divs"
      detail: |
        /shift-swaps, /notifications, /support render `<div>Shift Swaps</div>` etc.
        These have no shell chrome and no functionality. They exist in ALL_ROLES routing
        but are dead ends.
      file: "DasiaAIO-Frontend/src/router/index.tsx:148-150"

  medium:
    - issue: "Guard bottom nav in AppShell is defined but never rendered"
      detail: |
        AppShell defines mobileNavItems for guard with [Overview, Calendar, Support, Profile]
        but the rendering condition {!isGuardWorkspaceView} suppresses it for guards.
        Guard uses its own nav in UserDashboard. The AppShell guard nav items are dead code.

    - issue: "Calendar route allows guard role but CalendarDashboard renders elevated sidebar"
      detail: |
        /calendar is in ALL_ROLES but CalendarDashboard uses getSidebarNav(user.role).
        For guard role, this returns GUARD_NAV (Mission, Resources, Support, Map),
        which is a SIDEBAR nav for guard — but guard layout normally has no sidebar.
        Guard on /calendar will see an unfamiliar sidebar layout.

    - issue: "Permits and ArmoredCars routes allow guard but render elevated-style shell"
      detail: |
        /permits and /armored-cars are ALL_ROLES routes. Their components use manual 
        Sidebar+Header layout with getSidebarNav(user.role). For guards this returns 
        GUARD_NAV as sidebar items, creating an inconsistent UX compared to the guard's 
        normal bottom-nav layout.

