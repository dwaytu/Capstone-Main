plan_id: backend-server-config
objective: Understand SENTINEL backend server configuration and diagnose ERR_CONNECTION_REFUSED on http://127.0.0.1:5000/api/health
focus_area: backend-server-configuration
created_at: "2026-04-04"
created_by: gem-researcher
status: completed

tldr: |
  - Backend is a Rust/Axum server (binary: `server`) that defaults to port 5000 on 0.0.0.0.
  - Required env vars: DATABASE_URL (PostgreSQL), ADMIN_CODE (non-default). No `.env` file exists—only `.env.example`.
  - Frontend resolves API URL from VITE_API_BASE_URL; `.env.development` points to Railway production, NOT localhost.
  - The frontend will fail in dev because VITE_API_BASE_URL is set to the remote Railway URL, or if unset, config.ts throws an error demanding it.
  - To run locally: create a `.env` in the backend dir, start PostgreSQL, then `cargo run --bin server`.

research_metadata:
  methodology: "hybrid retrieval: semantic_search + grep_search, sequential file reads of Cargo.toml, main.rs, config.rs, config.ts, .env files, docker-compose.yml, package.json"
  scope: "Backend entry point, config, env vars, frontend API URL resolution, docker-compose, build scripts"
  confidence: high
  coverage: 95
  decision_blockers: 1
  research_blockers: 0

files_analyzed:
  - file: Cargo.toml
    path: DasiaAIO-Backend/Cargo.toml
    purpose: Rust package manifest — defines binary target and dependencies
    key_elements:
      - element: "[[bin]] name = 'server'"
        type: pattern
        location: "Cargo.toml:31-32"
        description: "Single binary target 'server' with entry point at src/main.rs"
      - element: "sqlx postgres feature"
        type: variable
        location: "Cargo.toml:11"
        description: "PostgreSQL driver via sqlx with runtime-tokio-native-tls"
    language: toml
    lines: 32

  - file: main.rs
    path: DasiaAIO-Backend/src/main.rs
    purpose: Server entry point — loads config, connects DB, runs migrations, builds Axum router, binds listener
    key_elements:
      - element: "config::Config::from_env()"
        type: function
        location: "main.rs:49"
        description: "Loads all configuration from environment variables"
      - element: "db::init_db_pool()"
        type: function
        location: "main.rs:53-56"
        description: "Connects to PostgreSQL with retry logic (10 attempts, 5s delay)"
      - element: "db::run_migrations()"
        type: function
        location: "main.rs:60"
        description: "Runs inline SQL migrations on startup"
      - element: "TcpListener::bind"
        type: function
        location: "main.rs:1597-1598"
        description: "Binds to {server_host}:{server_port} — defaults 0.0.0.0:5000"
      - element: "CORS fallback chain"
        type: pattern
        location: "main.rs:75-212"
        description: "CORS_ORIGINS → CORS_ORIGIN → localhost allow-list fallback. In dev (no CORS env), allows localhost:5173, 127.0.0.1:5173, localhost:4173, localhost:3000, and native wrapper origins"
    language: rust
    lines: 1610

  - file: config.rs
    path: DasiaAIO-Backend/src/config.rs
    purpose: Configuration struct loaded entirely from environment variables
    key_elements:
      - element: "Config struct"
        type: class
        location: "config.rs:3-13"
        description: "Fields: app_env, server_host, server_port, database_url, gmail_user, gmail_password, admin_code, db_pool_max_connections, db_pool_acquire_timeout_secs"
      - element: "Port resolution chain"
        type: pattern
        location: "config.rs:90-92"
        description: "PORT → SERVER_PORT → default '5000'"
      - element: "server_host default"
        type: variable
        location: "config.rs:103"
        description: "SERVER_HOST defaults to '0.0.0.0'"
      - element: "DATABASE_URL required"
        type: variable
        location: "config.rs:106-107"
        description: "Mandatory — panics with Railway-specific help message if missing"
      - element: "ADMIN_CODE validation"
        type: pattern
        location: "config.rs:98-100"
        description: "ADMIN_CODE is required and must NOT equal the insecure default '122601'"
      - element: "Production validation"
        type: function
        location: "config.rs:20-50"
        description: "In production: JWT_SECRET must be 32+ chars, ADMIN_CODE must not be default, CORS_ORIGINS or CORS_ORIGIN must be set"
    language: rust
    lines: 126

  - file: config.ts
    path: DasiaAIO-Frontend/src/config.ts
    purpose: Frontend API URL resolution — reads VITE_API_BASE_URL, validates, exports API_BASE_URL
    key_elements:
      - element: "resolveApiBaseUrl()"
        type: function
        location: "config.ts:63-79"
        description: "Reads import.meta.env.VITE_API_BASE_URL. If set, validates it. If not set AND PROD, falls back to DEFAULT_PRODUCTION_API_BASE_URL. If not set AND DEV, throws error."
      - element: "DEFAULT_PRODUCTION_API_BASE_URL"
        type: variable
        location: "config.ts:2"
        description: "'https://backend-production-0c47.up.railway.app'"
      - element: "validateApiBaseUrl()"
        type: function
        location: "config.ts:39-61"
        description: "Validates URL format, HTTPS in prod, rejects localhost/private IPs in prod"
    language: typescript
    lines: 95

  - file: .env.example
    path: DasiaAIO-Backend/.env.example
    purpose: Template for backend environment variables
    key_elements:
