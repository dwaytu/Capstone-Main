patterns_found:
  - category: architecture
    pattern: "Direct API URL via env var (no Vite proxy)"
    description: "Frontend uses VITE_API_BASE_URL as a fully-qualified URL for all API calls. No Vite dev proxy is configured. The frontend makes direct fetch() calls to the backend origin."
    examples:
      - file: config.ts
        location: "DasiaAIO-Frontend/src/config.ts:63-79"
        snippet: |
          const configuredUrl = import.meta.env.VITE_API_BASE_URL
          // If not set in DEV, throws error
    prevalence: common

  - category: architecture
    pattern: "Port resolution chain: PORT → SERVER_PORT → 5000"
    description: "Backend checks PORT first (Railway convention), then SERVER_PORT, then defaults to 5000."
    examples:
      - file: config.rs
        location: "DasiaAIO-Backend/src/config.rs:90-92"
        snippet: |
          let port_str = env::var("PORT")
              .or_else(|_| env::var("SERVER_PORT"))
              .unwrap_or_else(|_| "5000".to_string());
    prevalence: common

  - category: error_handling
    pattern: "ADMIN_CODE must not be default"
    description: "config.rs rejects the insecure default ADMIN_CODE '122601'. This will prevent startup if .env.example is copied as-is."
    examples:
      - file: config.rs
        location: "DasiaAIO-Backend/src/config.rs:98-100"
        snippet: |
          if admin_code == "122601" {
              return Err("ADMIN_CODE must not use the insecure default value.".to_string());
          }
    prevalence: common

  - category: architecture
    pattern: "CORS localhost fallback in dev"
    description: "When neither CORS_ORIGINS nor CORS_ORIGIN is set, the server allows localhost:5173, 127.0.0.1:5173, and several other localhost origins."
    examples:
      - file: main.rs
        location: "DasiaAIO-Backend/src/main.rs:180-196"
        snippet: |
          "CORS_ORIGINS/CORS_ORIGIN not set. Allowing localhost origins only."
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: Axum HTTP server
      responsibility: "Serves REST API on configurable host:port"
      location: DasiaAIO-Backend/src/main.rs
      relationship_to_domain: "Primary server process"
    - component: PostgreSQL database
      responsibility: "Persistent data store for all application data"
      location: "Docker container or external service"
      relationship_to_domain: "Required dependency — server fails to start without it"
    - component: Frontend config module
      responsibility: "Resolves API base URL from VITE_API_BASE_URL env var"
      location: DasiaAIO-Frontend/src/config.ts
      relationship_to_domain: "Determines which backend the frontend talks to"

  data_flow_involving_domain: |
    1. Frontend loads VITE_API_BASE_URL from .env.development (or .env.web/.env.production)
    2. config.ts validates and exports API_BASE_URL
    3. App.tsx and all components use `${API_BASE_URL}/api/...` for fetch calls
    4. Backend binds to 0.0.0.0:{PORT|SERVER_PORT|5000}
    5. Backend requires DATABASE_URL to connect to PostgreSQL before serving

