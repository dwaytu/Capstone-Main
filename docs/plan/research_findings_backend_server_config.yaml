        type: variable
        location: ".env.example:7"
        description: "postgresql://postgres:password@localhost:5432/guard_firearm_system"
    language: shell
    lines: 28

  - file: .env.development
    path: DasiaAIO-Frontend/.env.development
    purpose: Frontend dev environment — loaded by Vite in dev mode
    key_elements:
