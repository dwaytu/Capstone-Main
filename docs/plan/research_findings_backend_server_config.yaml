  - file: db.rs
    path: DasiaAIO-Backend/src/db.rs
    purpose: Database pool initialization with retry logic and inline migrations
    key_elements:
      - element: "init_db_pool"
        type: function
        location: "db.rs:4-47"
        description: "Connects to PostgreSQL with configurable max_connections and acquire_timeout. Retries 10 times with 5s delay."
    language: rust
    lines: 50

  - file: vite.config.ts
    path: DasiaAIO-Frontend/vite.config.ts
    purpose: Vite configuration — NO proxy configured for API
    key_elements:
