# SECTION 5: GAP ANALYSIS FRAMEWORK
# ══════════════════════════════════════════════════════════════════════════════

gap_analysis:

  - capability: "Situational Awareness"
    professional_standard: "Push-state map-centric COP with animated markers, audio alerts, <3s update latency"
    sentinel_current: "Poll-based (15s) map + summary panels, LiveFreshnessPill, no audio, WebSocket only for tracking"
    gap: "Dashboard state propagation is poll-based not push. No audio alerts. Map is one panel, not primary canvas."
    priority: HIGH
    effort: medium

  - capability: "Incident Lifecycle"
    professional_standard: "6-stage workflow (detect→triage→assign→act→resolve→debrief) with SLA timers, evidence chain, escalation"
    sentinel_current: "3-stage (open→investigating→resolved), manual status changes, no assignment, no evidence, no escalation"
    gap: "Missing 50% of incident lifecycle. No responder assignment, evidence attachment, SLA tracking, auto-escalation, debrief."
    priority: CRITICAL
    effort: major

  - capability: "Resource Tracking"
    professional_standard: "Real-time positions with history, movement trails, geofence compliance, fleet management"
    sentinel_current: "Real-time guard/vehicle positions via WebSocket, geofence events, client sites. No movement trails, no route replay."
    gap: "Positions and geofences present. Missing: movement history trails, route replay, guard-to-map deep linking, coverage heatmaps."
    priority: MEDIUM
    effort: medium

  - capability: "Communication"
    professional_standard: "In-app messaging, broadcast alerts, escalation chains, PTT radio integration"
    sentinel_current: "Database-stored notifications polled via API. Push notification scaffolding (VAPID, SW) but no delivery pipeline."
    gap: "No real-time messaging between users. No broadcast. No escalation chains. Push notifications scaffolded but not wired."
    priority: CRITICAL
    effort: major

  - capability: "Decision Support"
    professional_standard: "AI severity classification, predictive staffing, historical trends, scenario modeling, compliance dashboards"
    sentinel_current: "AI severity classifier (LLM+keyword), absence prediction (heuristic), replacement suggestion, vehicle maintenance prediction, incident summary"
    gap: "Advisory panels exist but are read-only stubs. No workflow triggers. No historical trends. No scenario modeling."
    priority: HIGH
    effort: medium

  - capability: "Reporting & Analytics"
    professional_standard: "Scheduled reports, configurable dashboards, export (PDF/CSV), trend analysis, KPI tracking with targets"
    sentinel_current: "Point-in-time analytics snapshot, KPI targets hardcoded in frontend, no export, no trend storage, no scheduled reports"
    gap: "No time-series data. No report generation. No export. No configurable dashboards."
    priority: HIGH
    effort: major

  - capability: "Mobile Experience"
    professional_standard: "Native or near-native mobile app with biometric auth, push notifications, background sync, camera/photo integration"
    sentinel_current: "Capacitor-wrapped SPA with GPS tracking, offline queue (IndexedDB), touch-optimized layout. No biometric auth, limited background sync, no camera integration."
    gap: "Wrapped web app, not native performance. Offline queue exists but only for check-in. No biometric unlock. No camera for evidence capture."
    priority: HIGH
    effort: medium

  - capability: "Offline Capability"
    professional_standard: "Full read/write offline with conflict resolution, background sync for all operations, local data cache"
    sentinel_current: "offlineQueue.ts for check-in only. No local data cache. Dashboard panels show nothing when offline."
    gap: "Offline queue scaffolded but barely used. No read-cache. Dashboard unusable offline. Incidents cannot be reported offline."
    priority: CRITICAL
    effort: major

