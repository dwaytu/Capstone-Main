# SECTION 6: TRANSFORMATION OPPORTUNITIES
# ══════════════════════════════════════════════════════════════════════════════

transformation_opportunities:

  quick_wins:
    description: "Achievable with small code changes, no new backend endpoints"
    items:
      - id: qw-1
        title: "Auto-fill incident location from GPS"
        description: "UserDashboard already has lastKnownLocation state. Pre-populate incidentForm.location with reverse-geocoded address or lat/lng when opening incident modal."
        estimated_files: 1
        estimated_lines: 20

      - id: qw-2
        title: "Auto-detect current shift for check-in"
        description: "Filter scheduleItems for shifts where now() is between start_time and end_time + buffer. Auto-select the matching shift instead of requiring manual selection."
        estimated_files: 1
        estimated_lines: 30

      - id: qw-3
        title: "Extend offline queue to incident reports"
        description: "Wrap incident submission in the same offlineQueue pattern already used for check-in. enqueueOfflineAction on network failure."
        estimated_files: 1
        estimated_lines: 15

      - id: qw-4
        title: "Add audio alert for critical incidents in command center"
        description: "Play a short audio cue (Web Audio API) when incidentAlerts includes a new critical-severity item. Configurable via settings."
        estimated_files: 2
        estimated_lines: 30

      - id: qw-5
        title: "Make AI action buttons functional"
        description: "Connect existing Assign Now, Deploy Replacement, Flag for Inspection buttons to corresponding API endpoints. Backend endpoints for assignment/dispatch may need creation."
        estimated_files: 3-5
        estimated_lines: 80-150

      - id: qw-6
        title: "Add SOS/panic button to guard sticky dock"
        description: "One-tap button that creates a CRITICAL incident with auto-filled location, auto-filled title (Emergency SOS), and sends immediate notification to supervisors."
        estimated_files: 2
        estimated_lines: 50

  medium_effort:
    description: "Structural improvements requiring new components or backend changes"
    items:
      - id: me-1
        title: "WebSocket-based dashboard state push"
        description: "Replace 15s polling in CommandCenterDashboard with server-sent events or WebSocket channels for incidents, shifts, and alert state changes. Tracking WebSocket infrastructure already exists."
        impact: "Reduces command center latency from 15s to <3s, reduces server load from N*polls to event-driven"

      - id: me-2
        title: "Incident assignment and escalation workflow"
        description: "Add assigned_to, acknowledged_at, escalated_at, sla_deadline columns to incidents table. New states: assigned, acknowledged, escalated. Backend handlers for assign, acknowledge, escalate. Frontend incident detail panel with action timeline."
        impact: "Transforms incidents from passive records to actionable workflows"

      - id: me-3
        title: "Local data cache for offline reads"
        description: "Use IndexedDB to cache last-known schedule, allocations, and permits. Serve cached data when offline. Invalidate on successful API refresh."
        impact: "Guard dashboard remains usable offline with stale-but-readable data"

      - id: me-4
        title: "Push notification delivery pipeline"
        description: "Wire existing VAPID/service-worker scaffolding to backend. Store push subscriptions server-side. Send Web Push for critical incidents, shift changes, and escalations."
        impact: "Guards receive alerts even when app is backgrounded"

      - id: me-5
        title: "Map-centric command center layout"
        description: "Redesign CommandCenterDashboard to make OperationalMap the primary canvas (60% of viewport). Overlay event feed, alert queue, and resource panels as collapsible sidebars."
        impact: "Matches professional SOC information architecture"

      - id: me-6
        title: "Guard movement history trails"
        description: "Backend already stores tracking_points with timestamps. Add patrol path visualization on OperationalMap with time-slider replay."
        impact: "Supervisor can review guard patrol compliance"

  major_evolution:
    description: "New capabilities requiring significant architecture work"
    items:
      - id: mj-1
        title: "Real-time messaging system"
        description: "In-app messaging (1:1, group, broadcast) using WebSocket channels. Message persistence in PostgreSQL. Read receipts. File/photo attachment support."
        impact: "Eliminates dependency on external communication tools. Enables evidence-based communication."

      - id: mj-2
        title: "Evidence management"
        description: "Photo/video capture from guard mobile, upload to object storage (S3/R2), attach to incidents. Chain-of-custody metadata. Thumbnail generation."
        impact: "Professional-grade incident documentation"

      - id: mj-3
        title: "Compliance reporting engine"
        description: "Scheduled report generation (daily/weekly/monthly), configurable templates, PDF/CSV export, email distribution. Regulatory framework mapping."
        impact: "Reduces manual compliance work, enables client reporting"

      - id: mj-4
        title: "Historical trend analysis"
        description: "Time-series aggregation of all operational metrics. Trend visualization with period-over-period comparison. Anomaly detection on metric trends."
        impact: "Transforms analytics from snapshot to predictive"

      - id: mj-5
        title: "Native mobile app (React Native or Flutter)"
        description: "Replace Capacitor web wrapper with native mobile app for better performance, background execution, biometric auth, camera integration, and push notification reliability."
        impact: "Professional-grade mobile experience for guards"

