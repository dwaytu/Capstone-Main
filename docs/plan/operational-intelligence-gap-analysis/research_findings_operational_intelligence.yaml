plan_id: operational-intelligence-gap-analysis
objective: "Analyze what makes a REAL operational intelligence platform and map the gap between professional standards (Palantir Gotham, Axon Evidence, Genetec Security Center) and SENTINEL's current state"
focus_area: operational-intelligence-platform-patterns
created_at: "2026-04-04T00:00:00Z"
created_by: gem-researcher
status: completed

tldr: |
  - SENTINEL has a Palantir-inspired command center with real-time summary, map, feeds, and AI panels — but it is read-heavy with limited actionable workflows (no incident lifecycle, no resource dispatch, no inter-user communication).
  - Guard mobile UX has been redesigned with mission-first layout but still has 15+ useState hooks, no true offline-first architecture, no one-tap SOS, and no push notification delivery pipeline.
  - The AI layer (incident classification, absence prediction, replacement suggestion, vehicle maintenance prediction) exists with LLM+keyword fallback but outputs are advisory-only — no closed-loop automation or workflow triggers.
  - Critical professional platform capabilities missing: incident lifecycle management (triage→assign→resolve→debrief), real-time inter-user messaging, resource dispatch workflow, configurable alert routing/escalation, compliance reporting engine, and true offline-first mobile architecture.
  - WebSocket infrastructure exists for tracking but is not used for push-state updates to dashboards — all panels poll on 15-30s intervals.

research_metadata:
  methodology: "Hybrid retrieval (semantic_search + grep_search), targeted file reads of dashboard components/hooks/handlers/services, domain knowledge of Palantir Gotham/Axon Evidence/Genetec Security Center/PSIM platforms"
  scope: "Full frontend dashboard layer, backend handler+service layer, hook layer, offline/communication utilities, AI services"
  confidence: high
  coverage: 85
  decision_blockers: 0
  research_blockers: 0

# ══════════════════════════════════════════════════════════════════════════════
# SECTION 1: PROFESSIONAL SECURITY OPERATIONS PLATFORM PATTERNS
# ══════════════════════════════════════════════════════════════════════════════

professional_platform_patterns:

  command_center_views:
    pattern: "High-density unified operational picture"
    description: |
      Professional SOC/PSIM platforms (Palantir Gotham, Genetec Security Center,
      Milestone XProtect) present a single-pane-of-glass command center with:
      - Status strip: system health, threat level, time, active resources (always visible)
      - Primary map: full-width geospatial view with layered overlays (guards, vehicles, incidents, geofences)
      - Feed columns: real-time event stream, alert queue, communications log
      - Resource panels: guard roster with live status, vehicle fleet, asset inventory
      - AI/analytics: predictive alerts, pattern detection, anomaly flags
    information_density: |
      Professional platforms achieve ~40-60 data points visible without scrolling on a
      1920x1080 display. Key design: progressive disclosure (summary → detail on click),
      color-coded severity (red/amber/green/blue), spatial encoding (map pins carry state).
    sentinel_comparison: |
      SENTINEL CommandCenterDashboard renders ~6 vertical sections requiring scroll:
      SystemStatus → TacticalView → LiveOperations → OperationsManagement → AssetMonitoring.
      Approximately 20-25 data points visible without scrolling. Map is one panel among many
      rather than the primary canvas.

  real_time_situational_awareness:
    pattern: "Push-state event-driven updates"
    description: |
      Professional platforms use server-sent events or WebSocket channels for immediate
      state propagation. When a guard checks in, moves, or reports an incident, ALL
      connected supervisor screens update within 1-3 seconds. Key elements:
      - Animated map markers showing guard movement in real-time
      - Event stream with newest-first ordering and severity highlighting
      - Audio/visual alerts for critical events (configurable per user)
      - Freshness indicators showing data age
    sentinel_comparison: |
      SENTINEL has WebSocket for tracking (useOperationalMapData) but all dashboard panels
      (incidents, shifts, assets, AI predictions) use polling at 15-30s intervals via
      useEffect refresh cycles in CommandCenterDashboard. No audio alerts. LiveFreshnessPill
      shows data age. Event stream (LiveOperationsFeed) is derived from polled shift/incident
      data, not a true streaming feed.

  alert_incident_management:
    pattern: "Full incident lifecycle: Detect → Triage → Assign → Act → Resolve → Debrief"
    description: |
      Professional platforms model incidents as stateful entities with:
      - Detection: automated (sensor, geofence, AI) or manual (guard report)
      - Triage: operator reviews, sets priority, categorizes type
      - Assignment: dispatcher assigns responders, notifies via radio/push
      - Action tracking: responder logs actions, uploads evidence (photo/video/audio)
      - Resolution: incident closed with outcome classification
      - Debrief: post-incident report generation, lessons learned, corrective actions
      - Evidence chain: complete audit trail with timestamps, actors, media
    sentinel_comparison: |
      SENTINEL has: create incident (guard), list active incidents (supervisor), update
      status (open→investigating→resolved). Missing: assignment to responder, evidence
      attachment, action logging, automated escalation timers, debrief/report generation,
      SLA tracking. Incident model has only 3 states (open/investigating/resolved).
      AI classifier assigns severity but does not trigger automated routing.

  resource_deployment_visualization:
    pattern: "Dispatch-ready resource management"
    description: |
      Resource deployment in professional platforms shows:
      - Guard locations on map with status colors (on-post, en-route, break, off-duty)
      - Drag-and-drop assignment from available pool to posts/incidents
      - Shift coverage heatmap showing gaps
      - Vehicle tracking with route replay
      - Equipment allocation with chain-of-custody
    sentinel_comparison: |
      SENTINEL OperationalMap shows guard positions and client sites via Leaflet.
      GuardDeploymentOverview is a data grid of shifts, not a visual deployment board.
      No drag-and-drop assignment. No shift coverage heatmap. Vehicle positions displayed
      but no route replay. Firearm allocations tracked but not shown spatially.

  communication_channels:
    pattern: "Integrated multi-channel communication"
    description: |
      Professional platforms include:
      - Push-to-talk (PTT) radio integration
      - In-app messaging (1:1 and group)
      - Broadcast alerts (all guards, zone-specific)
      - Automated notifications (system-generated alerts)
      - Escalation chains (if no response in X minutes, notify next level)
    sentinel_comparison: |
      SENTINEL has: user notifications (database-stored, polled via API), push
      notification scaffolding (VAPID key, service worker registration, subscription
      endpoint). Missing: real-time messaging between users, broadcast capability,
      escalation chains with timeout triggers, radio integration (expected limitation).
      Guard support tab references "radio discipline" but no actual radio integration.

  decision_support:
    pattern: "Contextual intelligence for commanders"
    description: |
      - AI-generated incident summaries and severity classifications
      - Predictive staffing (who is likely absent tomorrow)
      - Historical pattern analysis (incident hotspots, time-of-day trends)
      - Resource optimization recommendations
      - Compliance dashboard (permit expiry, training status, certification gaps)
      - Scenario modeling ("what if we redeploy 3 guards from Zone A to Zone B")
    sentinel_comparison: |
      SENTINEL has: AI incident classifier (Groq/OpenAI LLM + keyword fallback),
      guard absence risk prediction (weighted heuristic), smart replacement suggestions,
      vehicle maintenance prediction, incident summary generation. All are advisory panels
      in the command center. Missing: historical trend analysis, scenario modeling,
      compliance dashboard (permit expiry is a count only), actionable workflow triggers
      from AI outputs (action buttons exist but are non-functional stubs).

# ══════════════════════════════════════════════════════════════════════════════
# SECTION 2: GUARD-FIRST DESIGN PRINCIPLES
# ══════════════════════════════════════════════════════════════════════════════

guard_first_design_principles:

  mobile_device_primacy:
    principle: "Design for 360x640 portrait phone first, not desktop"
    rationale: "Guards carry phones on patrol. Every interaction happens one-handed, often while walking."
    sentinel_state: |
      UserDashboard.tsx has single-column mobile layout with bottom nav (Mission/Resources/
      Support/Map) and sticky field action dock. Responsive design present. However, the
      component is 1000+ lines with 15+ useState hooks — a monolith that ships all tab
      logic to every render. Not optimized for low-end Android devices common in security
      workforce.

  one_tap_critical_actions:
    principle: "Check-in, SOS/panic, incident report available in ≤1 tap from any screen"
    rationale: "In emergency, guard cannot navigate menus. Muscle memory on fixed positions."
    sentinel_state: |
      Sticky field action dock has: Report Incident, Check In/Check Out, View Instructions.
      These are always visible at bottom of guard dashboard. However: Report Incident opens
      a modal with 4 fields (title, description, location, priority) — minimum 5 taps to
      submit. No SOS/panic button (one-tap emergency with auto-location). Check-in is
      per-shift (must select correct shift) rather than context-aware (auto-detect current
      shift).

  context_aware_defaults:
    principle: "Pre-fill location, time, shift, and priority based on context"
    rationale: "Reduce data entry. Guard's phone knows where they are and what shift is active."
    sentinel_state: |
      Incident form does not auto-fill location from GPS. Check-in does not auto-detect
      the current/upcoming shift. No auto-priority based on time-of-day or location risk.
      Location tracking resolves GPS but doesn't feed into form pre-population.

  offline_resilience:
    principle: "All critical actions queue locally and sync when connectivity returns"
    rationale: "Guards patrol areas with poor cellular coverage. Actions must never fail silently."
    sentinel_state: |
      offlineQueue.ts exists with IndexedDB storage and Background Sync API support.
      Used by: check-in (enqueueOfflineAction on network failure). Not used by: incident
      report, check-out, support tickets. Offline detection via navigator.onLine +
      UIContext listeners. No local data cache for read operations (schedule, assignments
      disappear when offline).

  glanceable_status:
    principle: "Guard knows their state in <3 seconds: checked-in? location? shift end? trackable?"
    rationale: "No time to read. Color, position, and iconography must convey state instantly."
    sentinel_state: |
      Mission tab has Status Hero zone (checkmark + location + time) and Quick Info Row.
      Color-coded status: green (on-post), amber (awaiting check-in), blue (standby).
      Tracking indicator present. This is the strongest area of guard UX — session memory
      confirms the 3-second rule redesign was planned and partially implemented.

  low_light_conditions:
    principle: "Dark theme with high-contrast critical elements, OLED-friendly"
    rationale: "Night shift guards need readable screens without attracting attention."
    sentinel_state: |
      SOC dark theme applied globally via CSS custom properties. Semantic token contract
      covers dark palette. OLED optimization not explicitly present (true black backgrounds
      save battery on AMOLED screens). Contrast ratios generally adequate in dark mode.

# ══════════════════════════════════════════════════════════════════════════════
# SECTION 3: SUPERVISOR COMMAND CENTER PRINCIPLES
# ══════════════════════════════════════════════════════════════════════════════

supervisor_command_center_principles:

  real_time_guard_overview:
    principle: "See all active guards with location, status, and time-on-post at a glance"
    sentinel_state: |
      CommandCenterDashboard → OperationalMap shows guard positions.
      GuardDeploymentOverview shows shift list (guard name, site, status, times).
      OperationalSummaryStrip shows aggregate counts (active guards, absent, etc.).
      Missing: individual guard cards with last-seen time, movement status (moving/idle),
      and communication status. No guard-to-map linking (click guard → zoom to position).

  incident_escalation_management:
    principle: "Incidents auto-escalate if unacknowledged within SLA. Visual urgency increases."
    sentinel_state: |
      Incidents have priority levels but no SLA timers. No auto-escalation.
      IncidentAlertFeed shows severity-colored alerts. IncidentSeverityMonitoringPanel
      shows distribution. No acknowledgment workflow (supervisor must manually change
      status). No escalation chain to admin/superadmin.

  resource_allocation_decisions:
    principle: "One-click reassignment of guards, vehicles, equipment to incidents or posts"
    sentinel_state: |
      AssignmentPicker component exists for assignment selection. QuickActionsPanel
      provides shortcut buttons. No one-click reassignment from incident to guard.
      ReplacementSuggestionPanel shows AI-ranked suggestions with "Assign Now" CTA
      buttons — but these are non-functional UI stubs (no backend dispatch endpoint).

  shift_coverage_gap_detection:
    principle: "Automatic detection and alerting when posts are unmanned or understaffed"
    sentinel_state: |
      TodaysShiftOperations shows shift list with status. Guard absence prediction
      identifies HIGH risk guards. No automatic unmanned-post detection. No visual
      coverage gap display (e.g., timeline showing when a post goes uncovered).

  performance_monitoring:
    principle: "Real-time and historical guard performance visible in context"
    sentinel_state: |
      MeritScoreDashboard tracks attendance rate, mission performance, permit compliance,
      reliability score. TopReliableGuardsPanel shows rankings. PerformanceDashboard
      shows guard reliability metrics. Analytics summary endpoint provides aggregate KPIs.
      These are separate views — not integrated into the command center for in-context
      decision making.

# ══════════════════════════════════════════════════════════════════════════════
# SECTION 4: ADMIN / SUPERADMIN INTELLIGENCE PRINCIPLES
# ══════════════════════════════════════════════════════════════════════════════

admin_intelligence_principles:

  operational_metrics_and_trends:
    principle: "Time-series trends for all key metrics, not just current-state snapshots"
    sentinel_state: |
      AnalyticsDashboard shows current-state snapshots: total guards, active missions,
      completion rates, resource utilization. Backend analytics handler computes point-in-
      time aggregates. No time-series storage or trend computation. No "compared to last
      week/month" analysis. Calendar view exists but is event-focused, not metric-focused.

  compliance_and_audit:
    principle: "Comprehensive audit trail with filtering, export, and anomaly detection"
    sentinel_state: |
      AuditDashboard (lazy loaded) + AuditLogViewer provide audit log viewing with
      pagination, multi-field filtering, user-activity timelines, and anomaly group
      extraction. Backend audit middleware captures write operations and authorization
      denials. This is one of SENTINEL's strongest features — close to professional
      standard for audit capability. Missing: scheduled compliance reports, export to
      PDF/CSV, regulatory framework mapping.

  resource_utilization_analysis:
    principle: "Firearm utilization rates, vehicle fleet efficiency, guard deployment density"
    sentinel_state: |
      Analytics endpoint provides: firearms_in_use/available, vehicles_deployed/available,
      guards_on_duty/available. PerformanceDashboard shows guard reliability. Missing:
      utilization trends over time, cost-per-guard-hour analysis, optimal deployment
      modeling, fleet lifecycle cost tracking.

  predictive_insights:
    principle: "ML-driven forecasting for staffing needs, incident likelihood, equipment failure"
    sentinel_state: |
      Guard absence risk prediction (weighted heuristic, not ML). Vehicle maintenance
      prediction (heuristic-based). Incident severity classification (LLM-based via
      Groq/OpenAI, keyword fallback). Incident summary generation (LLM-based). These
      are real capabilities but heuristic-grade, not trained-model-grade. No historical
      data analysis for trend-based prediction.

  cost_and_efficiency:
    principle: "Operational cost visibility, overtime tracking, billing integration"
    sentinel_state: |
      Merit score system tracks overtime candidates. No cost tracking, billing integration,
      payroll data, or operational cost analysis features.

