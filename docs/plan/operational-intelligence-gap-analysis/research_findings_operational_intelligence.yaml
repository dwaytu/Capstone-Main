patterns_found:
  - category: architecture
    pattern: "Poll-based dashboard refresh"
    description: "All command center panels use 15-30s polling intervals via useEffect + setInterval"
    examples:
      - file: CommandCenterDashboard.tsx
        location: "CommandCenterDashboard.tsx:70-95"
        snippet: "const refresher = window.setInterval(() => { void runRefreshCycle() }, 15000)"
    prevalence: common

  - category: architecture
    pattern: "Monolithic component state"
    description: "Guard dashboard uses 15+ useState hooks in a single component"
    examples:
      - file: UserDashboard.tsx
        location: "UserDashboard.tsx:120-180"
        snippet: "const [attendance, setAttendance] = useState<AttendanceRecord[]>([]); const [scheduleItems, setScheduleItems]..."
    prevalence: common

  - category: architecture
    pattern: "Advisory-only AI outputs"
    description: "AI panels render predictions/classifications but action buttons have no backend wiring"
    examples:
      - file: GuardAbsencePredictionPanel.tsx
        location: "GuardAbsencePredictionPanel.tsx"
        snippet: "Deploy Replacement / Notify Guard buttons rendered but onClick is UI-only"
    prevalence: common

  - category: architecture
    pattern: "Partial offline support"
    description: "Offline queue exists but only used for check-in; incidents, tickets, check-out are online-only"
    examples:
      - file: UserDashboard.tsx
        location: "UserDashboard.tsx:~300"
        snippet: "enqueueOfflineAction called in check-in error handler only"
    prevalence: occasional

open_questions:
  - question: "Is the backend push notification delivery (web-push crate or external service) planned or implemented?"
    context: "Frontend has VAPID scaffolding and subscription endpoint but no evidence of backend push sending logic"
    type: research
    affects: ["me-4", "communication gap"]

  - question: "Are the AI action buttons (Assign Now, Deploy Replacement, etc.) intended to be functional or are they planned stubs?"
    context: "v1.2.0 changelog describes them as 'actionable call-to-action buttons' but no corresponding backend dispatch endpoints were found"
    type: decision_blocker
    affects: ["qw-5", "decision support gap"]

  - question: "Is there a message/chat table or endpoint planned for inter-user communication?"
    context: "grep for chat/messaging/communication found only the radio discipline reference in GuardSupportTab"
    type: research
    affects: ["mj-1", "communication gap"]

gaps:
  - area: "Incident lifecycle management"
    description: "Only 3 states, no assignment, no evidence, no SLA, no escalation — this is the largest functional gap vs professional platforms"
    impact: decision_blocker
    affects: ["me-2"]

  - area: "Real-time communication"
    description: "No messaging between users. Push notifications scaffolded but not delivering. No broadcast."
    impact: decision_blocker
    affects: ["mj-1", "me-4"]

  - area: "Offline-first mobile architecture"
    description: "Guard dashboard is unusable offline. Only check-in has offline queue. No read cache."
    impact: research_blocker
    affects: ["qw-3", "me-3"]

  - area: "Time-series analytics"
    description: "All analytics are point-in-time. No historical storage. No trend comparison."
    impact: research_blocker
    affects: ["mj-4"]
