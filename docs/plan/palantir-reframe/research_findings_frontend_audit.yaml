# ============================================================================
# 5. BACKEND API SURFACE
# ============================================================================
backend_api_surface:
  total_handler_modules: 25
  total_routes_approximate: 120

  auth_endpoints:
    - { method: POST, path: "/api/register", note: "+/api/auth/register alias", rate_limited: true }
    - { method: POST, path: "/api/login", note: "+/api/auth/login alias", rate_limited: true }
    - { method: POST, path: "/api/verify", note: "email verification", rate_limited: true }
    - { method: POST, path: "/api/resend-code", rate_limited: true }
    - { method: POST, path: "/api/forgot-password", rate_limited: true }
    - { method: POST, path: "/api/verify-reset-code", rate_limited: true }
    - { method: POST, path: "/api/reset-password", rate_limited: true }
    - { method: POST, path: "/api/refresh", note: "token refresh", rate_limited: true }
    - { method: POST, path: "/api/logout", rate_limited: true }

  user_endpoints:
    - { method: "GET/POST", path: "/api/users", authz: "require_manage_users", audit: true }
    - { method: GET, path: "/api/users/pending-approvals", authz: "require_guard_approval_management" }
    - { method: PUT, path: "/api/users/:id/approval", authz: "require_guard_approval_management", audit: true }
    - { method: GET, path: "/api/user/:id", authz: "require_authenticated" }
    - { method: PUT, path: "/api/user/:id", authz: "require_authenticated", audit: true }
    - { method: DELETE, path: "/api/user/:id", authz: "require_manage_users", audit: true }
    - { method: "PUT/DELETE", path: "/api/user/:id/profile-photo", authz: "require_authenticated", audit: true }
    - { method: GET, path: "/api/guards", authz: "require_authenticated" }

  guard_operations_endpoints:
    - { method: "POST/GET", path: "/api/guard-replacement/shifts", authz: "require_schedule_management" }
    - { method: "PUT/DELETE", path: "/api/guard-replacement/shifts/:shift_id", authz: "require_schedule_management", audit: true }
    - { method: GET, path: "/api/guard-replacement/guard/:guard_id/shifts", authz: "require_authenticated" }
    - { method: POST, path: "/api/guard-replacement/attendance/check-in", authz: "require_authenticated", audit: true }
    - { method: POST, path: "/api/guard-replacement/attendance/check-out", authz: "require_authenticated", audit: true }
    - { method: GET, path: "/api/attendance/:guard_id", authz: "require_authenticated" }
    - { method: POST, path: "/api/guard-replacement/detect-no-shows", authz: "require_schedule_management", audit: true }
    - { method: POST, path: "/api/guard-replacement/request-replacement", authz: "require_authenticated", audit: true }
    - { method: POST, path: "/api/guard-replacement/accept-replacement", authz: "require_authenticated", audit: true }
    - { method: POST, path: "/api/guard-replacement/set-availability", authz: "require_authenticated", audit: true }
    - { method: GET, path: "/api/guard-replacement/availability/:guard_id", authz: "require_authenticated" }
    - { method: POST, path: "/api/shifts/swap-request", authz: "require_authenticated" }
    - { method: GET, path: "/api/shifts/swap-requests", authz: "require_authenticated" }
    - { method: PATCH, path: "/api/shifts/swap-requests/:id/respond", authz: "require_authenticated" }

  incident_endpoints:
    - { method: POST, path: "/api/incidents", authz: "require_authenticated", audit: true }
    - { method: GET, path: "/api/incidents", authz: "require_authenticated" }
    - { method: GET, path: "/api/incidents/active", authz: "require_authenticated" }
    - { method: PATCH, path: "/api/incidents/:id/status", authz: "require_authenticated", audit: true }

  firearm_endpoints:
    - { method: "POST/GET", path: "/api/firearms", authz: "require_firearm_management" }
    - { method: "GET/PUT/DELETE", path: "/api/firearms/:id", authz: "require_firearm_management" }
    - { method: POST, path: "/api/firearm-allocation/issue", authz: "require_firearm_allocation", audit: true }
    - { method: POST, path: "/api/firearm-allocation/return", authz: "require_firearm_allocation", audit: true }
    - { method: GET, path: "/api/guard-allocations/:guard_id", authz: "require_authenticated" }
    - { method: GET, path: "/api/firearm-allocations/active", authz: "require_firearm_allocation" }
    - { method: GET, path: "/api/firearm-allocations", authz: "require_firearm_allocation" }
    - { method: GET, path: "/api/firearm-allocations/overdue", authz: "require_firearm_allocation" }
    - { method: GET, path: "/api/firearm-maintenance", authz: "require_firearm_management" }
    - { method: POST, path: "/api/firearm-maintenance/schedule", authz: "require_firearm_management", audit: true }
    - { method: GET, path: "/api/firearm-maintenance/pending", authz: "require_firearm_management" }
    - { method: POST, path: "/api/firearm-maintenance/:maintenance_id/complete", authz: "require_firearm_management", audit: true }

  permit_endpoints:
    - { method: "POST/GET", path: "/api/guard-firearm-permits", authz: "require_firearm_management" }
    - { method: GET, path: "/api/guard-firearm-permits/expiring", authz: "require_firearm_management" }
