  all_authenticated_routes:
    - { path: "/calendar", component: "CalendarDashboard", roles: "all" }
    - { path: "/permits", component: "GuardFirearmPermits", roles: "all" }
    - { path: "/armored-cars", component: "ArmoredCarDashboard", roles: "all" }
    - { path: "/profile", component: "ProfileDashboard", roles: "all" }
    - { path: "/settings", component: "SettingsView", roles: "all" }
    - { path: "/shift-swaps", component: "placeholder div", roles: "all", note: "UNIMPLEMENTED" }
    - { path: "/notifications", component: "placeholder div", roles: "all", note: "UNIMPLEMENTED" }
    - { path: "/support", component: "placeholder div", roles: "all", note: "UNIMPLEMENTED" }
    - { path: "/inbox", component: "SuperadminDashboard", roles: "all" }

  elevated_only_routes:
    - { path: "/performance", component: "PerformanceDashboard", roles: "superadmin, admin, supervisor" }
    - { path: "/merit", component: "MeritScoreDashboard", roles: "superadmin, admin, supervisor" }
    - { path: "/firearms", component: "FirearmInventory", roles: "superadmin, admin, supervisor" }
    - { path: "/allocation", component: "FirearmAllocation", roles: "superadmin, admin, supervisor" }
    - { path: "/maintenance", component: "FirearmMaintenance", roles: "superadmin, admin, supervisor" }
    - { path: "/analytics", component: "AnalyticsDashboard", roles: "superadmin, admin, supervisor" }

  superadmin_only_routes:
    - { path: "/audit", component: "AuditDashboard", roles: "superadmin" }

  unimplemented_routes:
    - "/shift-swaps (renders placeholder div)"
    - "/notifications (renders placeholder div)"
    - "/support (renders placeholder div)"

  login_redirect:
    guard: "/overview"
    elevated: "/dashboard"


open_questions:
  - question: "What is the actual guard inbox content? GuardInboxPanel/SupervisorInboxPanel/AdminInboxPanel — need to read these to understand workflow prioritization."
    context: "Inbox panels exist per role but their data source and action types weren't deeply examined."
    type: nice_to_know
    affects: ["inbox-redesign"]

  - question: "Is the AccountManager.tsx component used anywhere?"
    context: "Found in components root but not in the router. May be dead code or accessed via internal navigation."
    type: nice_to_know
    affects: ["cleanup"]

  - question: "What does the AnalyticsDashboard actually display vs the CommandCenterDashboard?"
    context: "Both seem to show operational analytics. Need to understand overlap/differentiation."
    type: research
    affects: ["analytics-consolidation"]


gaps:
  - area: "Shift Swaps route"
    description: "Route /shift-swaps renders a placeholder <div>Shift Swaps</div> — backend endpoints exist but frontend is unimplemented"
    impact: research_blocker
    affects: ["guard-experience"]

  - area: "Notifications route"
    description: "Route /notifications renders a placeholder <div>Notifications</div> — backend notification CRUD exists but notifications page is unimplemented"
    impact: research_blocker
    affects: ["notification-system"]

  - area: "Support route"
    description: "Route /support renders a placeholder <div>Support</div> — guard has support tab but standalone support page is unimplemented"
    impact: nice_to_know
    affects: ["support-system"]

  - area: "Push notification integration"
    description: "POST /api/notifications/push-subscribe exists but no frontend Push API or service worker integration found"
    impact: research_blocker
    affects: ["real-time-experience"]
