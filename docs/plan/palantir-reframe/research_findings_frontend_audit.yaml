plan_id: palantir-reframe
objective: "Deep audit of SENTINEL frontend — map every user-facing surface, data flow, interaction pattern, and API dependency"
focus_area: frontend-system-audit
created_at: "2026-04-04"
created_by: gem-researcher
status: completed

tldr: |
  - SENTINEL has 3 primary workspaces: Guard (UserDashboard), Elevated (SuperadminDashboard+CommandCenter), and Admin (lighter AdminDashboard). All share a common OperationalShell layout.
  - The CommandCenterDashboard is the real decision surface — it aggregates 8+ data hooks with 15s polling, displays AI predictions (absence risk, replacement suggestions, vehicle maintenance), live ops feed, incident alerts, and an operational map with WebSocket support.
  - Guard workspace is mobile-first with 5 sections (inbox, mission, resources, support, map) and offline-capable via enqueueOfflineAction. Location heartbeats fire every 20s.
  - Backend exposes ~120+ API endpoints across 25 handler modules with 6 AI/predictive services, full RBAC via middleware, audit logging on all writes, and a background geofence alert loop.
  - Real-time: WebSocket only for map tracking; everything else is poll-based (15s CommandCenter, 15s health, 20s guard heartbeat). No server-sent events or push notifications beyond the push-subscribe endpoint.


research_metadata:
  methodology: "hybrid retrieval: semantic_search + grep_search + targeted read_file across frontend components, router, hooks, backend main.rs (all routes), handlers/mod.rs, services/, middleware/"
  scope: "Full frontend component tree, all backend API routes, all data hooks, real-time patterns, routing structure"
  confidence: high
  coverage: 95
  decision_blockers: 0
  research_blockers: 0


# ============================================================================
# 1. GUARD WORKSPACE
# ============================================================================
guard_workspace:
  entry_component: "DasiaAIO-Frontend/src/components/guards/UserDashboard.tsx"
  route: "/overview"
  role_access: ["guard"]

  sections:
    - id: inbox
      label: "Inbox"
      component: "GuardInboxPanel"
      purpose: "Action-oriented inbox for guard-specific notifications and workflow items"
      operational_value: medium

    - id: mission
      label: "Mission"
      purpose: "Primary duty surface — shift status, check-in/out, incident reporting, location tracking"
      sub_components:
        - "DashboardCard (duty status banner)"
        - "StatCard (post, time window, tracking accuracy)"
        - "Incident report modal"
        - "Instructions modal"
        - "Schedule request form"
        - "Shift swap options"
      operational_value: high

    - id: resources
      label: "Resources"
      component: "GuardResourcesTab"
      purpose: "View firearm allocations and permits assigned to the guard"
      operational_value: medium

    - id: support
      label: "Support"
      component: "GuardSupportTab"
      purpose: "Submit and view support tickets"
      operational_value: low

    - id: map
      label: "Map"
      component: "GuardMapTab"
      purpose: "View own location on OpenStreetMap embed with accuracy indicator"
      operational_value: medium

  views:
    - "Duty status banner (On Post / Standby / Awaiting Check In / Completed / Off Duty)"
    - "Current shift details (client site, time window, elapsed time)"
    - "Location tracking status (accuracy: High/Medium/Low/No Fix)"
    - "Today's schedule list"
    - "Firearm allocations list"
    - "Permit records list"
    - "Support tickets list"
    - "Attendance history"
    - "OpenStreetMap location embed"

  actions:
    - "Check In to assigned shift"
    - "Check Out from active shift"
    - "Report Incident (title, description, location, priority)"
    - "Request Schedule (client site, date, start/end time)"
    - "Submit Support Ticket (subject, message)"
    - "Toggle Location Tracking on/off"
    - "Request Location Permission"
    - "View Instructions overlay"
    - "Navigate to Profile modal"
    - "Refresh data (manual pull)"
    - "Navigate to inbox/settings/profile"

  data_feeds:
    - endpoint: "GET /api/attendance/{userId}"
      data: "Attendance records (check-in/out history)"
      refresh: manual
    - endpoint: "GET /api/guard-replacement/guard/{userId}/shifts"
      data: "Guard's assigned shifts"
      refresh: manual
    - endpoint: "GET /api/guard-allocations/{userId}"
      data: "Firearm allocations for this guard"
      refresh: manual
    - endpoint: "GET /api/guard-firearm-permits/{userId}"
      data: "Permit records for this guard"
      refresh: manual
    - endpoint: "GET /api/support-tickets/{userId}"
      data: "Support tickets submitted by this guard"
      refresh: manual
    - endpoint: "POST /api/tracking/heartbeat"
      data: "Location heartbeat (lat, lon, heading, speed, accuracy)"
      refresh: "Every 20 seconds when tracking enabled"
    - endpoint: "POST /api/guard-replacement/attendance/check-in"
      data: "Check-in action"
      direction: "guard → system"
    - endpoint: "POST /api/guard-replacement/attendance/check-out"
      data: "Check-out action"
      direction: "guard → system"
    - endpoint: "POST /api/incidents"
      data: "Incident report"
      direction: "guard → system"
    - endpoint: "POST /api/guard-replacement/shifts"
      data: "Schedule request"
      direction: "guard → system"
    - endpoint: "POST /api/support-tickets"
      data: "Support ticket"
      direction: "guard → system"

  real_time:
    websocket: false
    polling: "Location heartbeat every 20s (when tracking on)"
    offline_capable: true
    offline_strategy: "enqueueOfflineAction — queues check-in/out and schedule requests for later sync"

  decision_surfaces:
    - "Check in / Check out (binary duty state transition)"
    - "Report incident with priority classification"
    - "Toggle location tracking (consent-gated)"
    - "Request schedule changes"
    - "Submit support tickets"


# ============================================================================
# 2. ELEVATED WORKSPACE (Superadmin / Admin / Supervisor)
# ============================================================================
elevated_workspace:
  entry_component: "DasiaAIO-Frontend/src/components/admin/SuperadminDashboard.tsx"
  route: "/dashboard"
  role_access: ["superadmin", "admin", "supervisor"]
  notes: "AdminDashboard.tsx is a lighter version used for admin/supervisor with fewer sections. SuperadminDashboard serves all elevated roles with RBAC gating via canViewUserRow/canEditUserRow."

  sections:
    - id: dashboard
      label: "Dashboard (Command Center)"
      component: "CommandCenterDashboard"
      purpose: "SOC-style operational overview with real-time aggregated metrics, AI predictions, live feed, and map"
      operational_value: critical

    - id: approvals
      label: "Guard Approvals"
      purpose: "Review and approve/reject pending guard registrations"
      permission: "approve_guards"
      operational_value: high

    - id: schedule
      label: "Guard Schedules"
      purpose: "Create, edit, delete guard shift schedules. Assign guards to client sites."
      permission: "schedule_management"
      operational_value: high

    - id: missions
      label: "Mission Assignment"
      purpose: "Create missions with guard/firearm/vehicle allocation using AssignmentPicker"
      permission: "mission_management"
      operational_value: high

    - id: analytics
      label: "Analytics & Reports"
      component: "AnalyticsDashboard"
      purpose: "Performance trends, guard reliability, mission statistics"
      permission: "view_analytics"
      operational_value: high

    - id: trips
      label: "Trip Management"
      component: "TripManagement"
      purpose: "Manage armored car trips — create, track, end trips; assign drivers"
      permission: "trip_management"
      operational_value: medium

    - id: audit-log
      label: "System Audit Log"
      component: "AuditDashboard (lazy loaded)"
      purpose: "Immutable audit trail of all system write operations"
      permission: "superadmin-only"
      operational_value: high

    - id: inbox
      label: "Inbox"
      components:
        - "SuperadminInboxPanel (superadmin)"
        - "AdminInboxPanel (admin)"
        - "SupervisorInboxPanel (supervisor)"
      purpose: "Role-specific action inbox — pending items, approvals, notifications"
      operational_value: medium

  views:
    - "User management table (with search, role filter, status filter, bulk selection)"
    - "User online/offline status with precise last-seen timestamps"
    - "Pending guard approvals list with detail expansion"
    - "Shift schedule table (all guards)"
    - "Mission assignment form with resource picker"
    - "Mission list"
    - "Notification center (toast-style)"
    - "Tracking accuracy mode selector"
    - "Live freshness pill (data staleness indicator)"

  actions:
    - "View/Edit/Delete users (RBAC: superadmin sees all, admin can't see superadmin, supervisor sees guards only)"
    - "Create new user"
    - "Approve/Reject guard registrations"
    - "Create/Edit/Delete shift schedules"
    - "Assign missions (guard + firearm + vehicle allocation)"
    - "Bulk user selection and processing"
    - "Navigate to analytics, audit, trips, calendar, performance, merit, firearms, allocation, permits, maintenance, armored-cars"
    - "Set tracking accuracy mode (high/balanced/battery_saver)"
    - "Edit user modal"
    - "Edit schedule modal"

  data_feeds:
    - endpoint: "GET /api/users"
      data: "All users with roles, status, last_seen_at"
      refresh: "on section change"
    - endpoint: "GET /api/users/pending-approvals"
      data: "Guards pending approval"
      refresh: "on section change"
    - endpoint: "GET /api/guard-replacement/shifts"
      data: "All guard shifts"
      refresh: "on section change"
    - endpoint: "GET /api/missions"
      data: "All missions"
      refresh: "on section change"
    - endpoint: "GET /api/firearms"
      data: "Available firearms for assignment"
      refresh: "on load"
    - endpoint: "GET /api/armored-cars"
      data: "Available vehicles for assignment"
      refresh: "on load"


# ============================================================================
# 3. COMMAND CENTER DASHBOARD (Heart of the system)
# ============================================================================
command_center:
  component: "DasiaAIO-Frontend/src/components/dashboard/CommandCenterDashboard.tsx"
  embedded_in: "SuperadminDashboard (dashboard section)"
  polling_interval: "15 seconds (all data sources refreshed sequentially)"

  data_hooks:
    - hook: useOpsSummary
      endpoints:
        - "GET /api/guard-replacement/shifts"
        - "GET /api/users/pending-approvals"
        - "GET /api/firearm-allocations/active"
        - "GET /api/firearm-allocations/overdue"
        - "GET /api/trips"
        - "GET /api/armored-cars"
        - "GET /api/guard-firearm-permits/expiring"
      metrics_produced:
        - activeGuardsOnDuty
        - guardsAbsentToday
        - pendingGuardApprovals
        - firearmsCurrentlyIssued
        - overdueFirearmReturns
        - activeArmoredCarTrips
        - vehiclesInMaintenance
        - expiringGuardPermits

    - hook: useOpsShifts
      endpoints:
        - "GET /api/guard-replacement/shifts"
      data: "Today's shift operations"

    - hook: useOpsAssets
      endpoints:
        - "GET /api/firearms"
        - "GET /api/armored-cars"
      data: "Firearms inventory and vehicle fleet status"

    - hook: useServiceHealth
      endpoints:
        - "GET /api/health/system"
      polling: "15 seconds"
      data: "Database, API gateway, WebSocket, auth service online/offline status"

    - hook: useIncidents
      endpoints:
        - "GET /api/incidents/active?page=1&page_size=50"
      data: "Active incidents with status and priority"
      actions: "reportIncident (POST /api/incidents), updateStatus (PATCH /api/incidents/:id/status)"

    - hook: usePredictiveAlerts
      endpoints:
        - "GET /api/alerts/predictive"
      data: "AI-generated predictive alerts (info/warning/critical)"

    - hook: useGuardAbsencePrediction
      endpoints:
        - "GET /api/ai/guard-absence-risk"
      data: "Per-guard absence risk (score, level, historical factors)"

    - hook: useReplacementSuggestions
      endpoints:
        - "GET /api/tracking/client-sites"
        - "GET /api/ai/replacement-suggestions?post_id=..."
      data: "Ranked replacement candidates (reliability score, distance, availability, permit validity)"

    - hook: useVehicleMaintenancePrediction
      endpoints:
        - "GET /api/ai/vehicle-maintenance-risk"
      data: "Per-vehicle maintenance risk (mileage, days since service, recommended action)"

  panels:
    - name: OperationalSummaryStrip
      purpose: "8 key operational metrics in a glanceable strip"
      value: critical

    - name: OperationalMap
      purpose: "Live map with guard positions, client sites, geofence zones, tracking points"
      value: critical
      data_source: "useOperationalMapData (WebSocket + HTTP fallback)"

    - name: GuardDeploymentOverview
      purpose: "Visual overview of guard deployment across client sites"
      value: high

    - name: LiveOperationsFeed
      purpose: "Scrolling feed of recent operations (shifts, vehicles, incidents, equipment)"
      value: high

    - name: IncidentAlertFeed
      purpose: "Active incident alerts with severity classification"
      value: critical

    - name: PredictiveAlertsPanel
      purpose: "AI-generated predictive alerts for operational risks"
      value: high

    - name: GuardAbsencePredictionPanel
      purpose: "Guards at risk of absence with risk scores and historical data"
      value: high

    - name: ReplacementSuggestionPanel
      purpose: "AI-ranked replacement candidates for vacant posts"
      value: high

    - name: VehicleMaintenancePredictionPanel
      purpose: "Vehicles with maintenance risk scores and recommended actions"
      value: medium

    - name: IncidentSeverityMonitoringPanel
      purpose: "Real-time incident severity trend monitoring"
      value: medium

    - name: IncidentSeverityClassifier
      purpose: "AI incident severity classification tool"
      value: medium

    - name: IncidentSummaryGenerator
      purpose: "AI-powered incident summary generation"
      value: medium

    - name: TodaysShiftOperations
      purpose: "Today's shift schedule with status indicators"
      value: high

    - name: FirearmsStatusPanel
      purpose: "Firearms inventory status (issued, available, overdue)"
      value: medium

    - name: SystemStatusBanner
      purpose: "System health status (Operational/Warning/Critical)"
      value: high

    - name: QuickActionsPanel
      purpose: "Shortcut buttons for common actions"
      value: medium


