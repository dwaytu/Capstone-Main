# ============================================================================
# 6. REAL-TIME CAPABILITIES
# ============================================================================
real_time:
  websocket:
    - endpoint: "/api/tracking/ws"
      consumer: "useOperationalMapData hook"
      purpose: "Live guard/vehicle tracking point updates on operational map"
      reconnect: "Exponential backoff, max 8 attempts, 1.5s base, 30s max"
      auth: "Token passed via WebSocket sub-protocol"
      fallback: "HTTP polling via GET /api/tracking/map-data"
      env_gate: "VITE_ENABLE_TRACKING_WS must be 'true'"

  polling:
    - consumer: "CommandCenterDashboard"
      interval: "15 seconds"
      scope: "All 8 data hooks (summary, shifts, assets, health, incidents, predictions)"
      note: "Sequential refresh — each module refreshes in order"

    - consumer: "useServiceHealth"
      interval: "15 seconds"
      endpoint: "GET /api/health/system"

    - consumer: "Guard location heartbeat"
      interval: "20 seconds"
      endpoint: "POST /api/tracking/heartbeat"
      condition: "locationTrackingEnabled && hasLocationConsent"

    - consumer: "OperationalMapPanel"
      interval: "variable (multiple setInterval calls for map data)"

    - consumer: "LiveFreshnessPill"
      interval: "1 second (UI clock only)"

  static_until_refresh:
    - "Guard attendance records (UserDashboard)"
    - "Guard shift assignments (UserDashboard)"
    - "Guard firearm allocations (UserDashboard)"
    - "Guard permit records (UserDashboard)"
    - "Guard support tickets (UserDashboard)"
    - "User management table (SuperadminDashboard — refreshes on section change)"
    - "Pending approvals (SuperadminDashboard — refreshes on section change)"
    - "Shift schedule table (SuperadminDashboard — refreshes on section change)"
    - "Mission list (SuperadminDashboard — refreshes on section change)"

  push_notifications:
    - endpoint: "POST /api/notifications/push-subscribe"
      status: "Endpoint exists but no evidence of active Push API integration in frontend"
      gap: true


# ============================================================================
# 7. DATA FLOW MAP
# ============================================================================
data_flow:
  guard_to_system:
    - "Check-in/Check-out events → attendance_records table"
    - "Location heartbeats (lat/lon/speed/heading/accuracy) → tracking_points table (every 20s)"
    - "Incident reports (title/description/location/priority) → incidents table"
    - "Schedule requests → shifts table"
    - "Support tickets → support_tickets table"
    - "Availability status → guard availability"
    - "Shift swap requests → shift_swaps table"

  system_to_guard:
    - "Assigned shifts and schedules"
    - "Firearm allocation records"
    - "Permit records and expiry dates"
    - "Support ticket statuses"
    - "Notification inbox items"
    - "Duty status derivation (computed client-side from shift data + time)"

  guard_to_supervisor:
    - "Location tracking points (visible on operational map for supervisors)"
    - "Check-in/out events (visible in shift operations)"
    - "Incident reports (visible in incident feed)"
    - "Support tickets (escalation chain unclear)"

  supervisor_to_admin:
    - "Guard approval decisions → admin/superadmin visibility"
    - "Schedule management → visible to higher roles"

  admin_to_system:
    - "User CRUD (create/edit/delete/suspend)"
    - "Guard approval (approve/reject registrations)"
    - "Schedule CRUD (create/edit/delete shifts)"
    - "Mission assignment (guard + firearm + vehicle allocation)"
    - "Firearm CRUD (inventory management)"
    - "Firearm allocation (issue/return)"
    - "Permit management (create/revoke/auto-expire)"
    - "Vehicle management (CRUD, allocation, maintenance, driver assignment)"
    - "Trip management (create, end, status update)"
    - "Training record management"
    - "Audit log review (superadmin only)"

  approval_chains:
    - name: "Guard Registration Approval"
      flow: "Guard registers → pending_approval status → superadmin/admin/supervisor reviews → approve/reject"
      endpoint: "PUT /api/users/:id/approval"

    - name: "Shift Swap"
      flow: "Guard requests swap → system records → other guard/supervisor responds → approved/rejected"
      endpoint: "POST /api/shifts/swap-request → PATCH /api/shifts/swap-requests/:id/respond"

    - name: "Guard Replacement"
      flow: "Request replacement → system finds candidates → candidate accepts"
      endpoint: "POST /api/guard-replacement/request-replacement → POST /api/guard-replacement/accept-replacement"

    - name: "No-Show Detection"
      flow: "System or supervisor triggers no-show detection → marks absent guards"
      endpoint: "POST /api/guard-replacement/detect-no-shows"

  ai_intelligence_generated:
    - name: "Guard Absence Risk Prediction"
      source: "Historical attendance + late check-ins + leave requests"
      output: "Per-guard risk score (LOW/MEDIUM/HIGH) with formula"
      consumer: "GuardAbsencePredictionPanel"

    - name: "Replacement Guard Suggestions"
      source: "Reliability score + distance to post + availability + permit validity"
      output: "Ranked candidate list with composite score"
      consumer: "ReplacementSuggestionPanel"

    - name: "Vehicle Maintenance Risk"
      source: "Mileage since service + days since service + maintenance history count"
      output: "Per-vehicle risk score with recommended action"
      consumer: "VehicleMaintenancePredictionPanel"

    - name: "Predictive Alerts"
      source: "Aggregated operational anomalies"
      output: "Categorized alerts (info/warning/critical)"
      consumer: "PredictiveAlertsPanel"

    - name: "Incident Severity Classification"
      source: "Incident text input"
      output: "Auto-classified severity level"
      consumer: "IncidentSeverityClassifier"

    - name: "Incident Summary Generation"
      source: "Incident description text"
      output: "AI-generated executive summary"
      consumer: "IncidentSummaryGenerator"

    - name: "Geofence Alerts"
      source: "Guard tracking points vs site geofence boundaries"
      output: "Enter/exit alerts with distance"
      consumer: "Operational map + alert feed"
      note: "Runs as background server loop — proactive, not on-demand"

  intelligence_gaps:
    - area: "Cross-shift pattern analysis"
      description: "No analysis of what guard combinations or shift patterns lead to incidents — could surface 'high-risk shift configurations'"

    - area: "Response time analytics"
      description: "No measurement of time from incident report to status change (investigating → resolved). MTTR for incidents is untracked."

    - area: "Guard fatigue/overwork detection"
      description: "No tracking of consecutive shifts, total weekly hours, or rest periods between shifts. Could predict burnout and coverage gaps."

    - area: "Client site risk scoring"
      description: "No historical incident density per client site. Could rank sites by danger level to inform guard allocation and equipment decisions."

    - area: "Supervisor decision latency"
      description: "No tracking of how long approvals, schedule changes, or swap requests sit unactioned. Could surface neglected action items."

    - area: "Firearm chain-of-custody timeline"
      description: "Issue/return events exist but no continuous timeline visualization showing who had what firearm and when."

    - area: "Real-time push to guards"
      description: "Guards have no real-time push channel. Schedule changes, incident alerts, and swap approvals require manual refresh or inbox check."

    - area: "Geofence breach real-time notification"
      description: "Backend generates geofence alerts in background loop but there's no push mechanism to notify supervisors immediately in the browser."

    - area: "Armored car route tracking"
      description: "Trips have lifecycle management but no GPS route tracking or route deviation alerts during active trips."

    - area: "Training compliance integration"
      description: "Training records exist but aren't surfaced in guard deployment decisions. A guard with expired training could be assigned to a post requiring it."


# ============================================================================
# 8. ROUTE STRUCTURE
# ============================================================================
route_structure:
  guard_routes:
