tldr: |
  10 tasks across 4 waves to transform the guard experience and operational dashboards.
  Wave 1 (parallel): Guard Mission tab overhaul, Map tab cleanup, Support tab reorganization.
  Wave 2 (parallel): AI panel action buttons, Sidebar role-scoping, Command center layout priority.
  Wave 3 (parallel): Dead state cleanup, Resource tab polish, Login page streamline, Consistent empty states.
  Wave 4: Integration test — browser-test all roles end-to-end.
  All tasks are frontend-only. No backend changes. SuperadminDashboard is out of scope.

open_questions: []

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: UserDashboard.tsx mission section refactor breaks check-in/check-out flow
      likelihood: medium
      impact: critical
      mitigation: >
        Extract view markup only — do not touch state logic, handlers, or data fetching.
        Verify check-in/out buttons remain wired to existing handleCheckIn/handleCheckOut handlers.
        Browser test wave 4 specifically validates check-in flow.
    - scenario: Sidebar role-scoping accidentally hides menu items from elevated roles
      likelihood: low
      impact: high
      mitigation: >
        Modify only the GUARD_NAV array in navigation.ts. Leave ELEVATED_NAV unchanged.
        Existing shellNavigation.test.tsx covers elevated role nav items.
    - scenario: CommandCenterDashboard layout reorder loses AI panels
      likelihood: low
      impact: medium
      mitigation: >
        Reorder SectionPanel blocks only — no component removal. All existing panels must remain.
  assumptions:
    - All existing backend endpoints remain available and unchanged
    - No new npm dependencies are needed — all changes use existing component library
    - Guard check-in/out state machine in UserDashboard.tsx is not refactored (view extraction only)
    - SecurityBentoGrid is used in CalendarDashboard, not LoginPage — LoginPage uses ParticleBackground
    - SuperadminDashboard.tsx (1,751 lines) is completely out of scope
    - ArmoredCarDashboard.tsx and TripManagement.tsx are not modified

implementation_specification:
  code_structure: |
    All changes are in DasiaAIO-Frontend/src/components/ and DasiaAIO-Frontend/src/config/.
    No new top-level components created — refactors touch existing files.
    Guard Mission tab: extract 3 zones in-place within UserDashboard.tsx mission section.
    Sidebar: modify GUARD_NAV array in navigation.ts and mobileNavItems in AppShell.tsx.
    Command Center: reorder SectionPanel blocks in CommandCenterDashboard.tsx.
    Login: remove ParticleBackground import and usage in LoginPage.tsx.
  affected_areas:
    - DasiaAIO-Frontend/src/components/guards/UserDashboard.tsx (mission section markup)
    - DasiaAIO-Frontend/src/components/dashboard/GuardMapTab.tsx
    - DasiaAIO-Frontend/src/components/dashboard/GuardSupportTab.tsx
    - DasiaAIO-Frontend/src/components/dashboard/GuardResourcesTab.tsx
    - DasiaAIO-Frontend/src/components/dashboard/CommandCenterDashboard.tsx
    - DasiaAIO-Frontend/src/components/dashboard/GuardAbsencePredictionPanel.tsx
    - DasiaAIO-Frontend/src/components/dashboard/VehicleMaintenancePredictionPanel.tsx
    - DasiaAIO-Frontend/src/config/navigation.ts
    - DasiaAIO-Frontend/src/components/layout/AppShell.tsx
    - DasiaAIO-Frontend/src/components/LoginPage.tsx
    - DasiaAIO-Frontend/src/components/Sidebar.tsx
  component_details:
    - component: Guard Mission Tab (UserDashboard.tsx mission section)
      responsibility: >
        Condense 6 cards into 3 zones: StatusHero (duty status + location + timer + tracking badge),
        QuickActions (check-in/out + incident report + instructions — 3 large tap targets),
        TodaysSchedule (shift list, compact). Remove duplicate duty status card, verbose readiness note,
        and separate KPI row.
      interfaces:
        - Same props as current UserDashboard — no interface changes
    - component: Guard Map Tab (GuardMapTab.tsx)
      responsibility: >
        Remove 3 KPI stat cards above map. Map iframe shows at full viewport height.
        Small overlay badge for accuracy + last update inside the map container.
      interfaces:
        - GuardMapTabProps unchanged — remove internal stat rendering
    - component: Guard Support Tab (GuardSupportTab.tsx)
      responsibility: >
        Move emergency contacts to top (already partially done with Quick Contacts).
        Collapse schedule request and ticket forms into expandable accordion sections.
        Add "Recent Attendance" display at bottom.
      interfaces:
        - GuardSupportTabProps — add optional attendanceRecords prop
    - component: Sidebar Role-Scoping (navigation.ts + AppShell.tsx)
      responsibility: >
        Reduce GUARD_NAV to 4 items: Overview, Map, Schedule, Support.
        Update mobileNavItems in AppShell.tsx to match.
      interfaces:
        - getSidebarNav() return type unchanged
    - component: Command Center Layout (CommandCenterDashboard.tsx)
      responsibility: >
        Move Active Incidents + Shift Coverage SectionPanels to the top.
        Demote decorative panels (system status stat cards) below operational content.
      interfaces:
        - CommandCenterDashboardProps unchanged
    - component: AI Panel Action Buttons (GuardAbsencePredictionPanel.tsx, VehicleMaintenancePredictionPanel.tsx)
      responsibility: >
        Add action buttons to AI prediction items that navigate to relevant views.
        "Predicted absent → View guard schedule" / "Maintenance due → View vehicle record"
      interfaces:
        - Add optional onAction callback prop to both panels
  dependencies:
    - component: UserDashboard mission section
      relationship: Renders GuardMapTab, GuardSupportTab, GuardResourcesTab as child tabs
    - component: AppShell
      relationship: Imports getSidebarNav from navigation.ts to build sidebar items
    - component: CommandCenterDashboard
      relationship: Renders GuardAbsencePredictionPanel and VehicleMaintenancePredictionPanel
  integration_points:
    - Guard workspace tab navigation in UserDashboard.tsx (navItems array)
    - Sidebar rendering in AppShell via OperationalShell and Sidebar components
    - Command center section ordering in CommandCenterDashboard.tsx

