# ─────────────────────────────────────────────────────────────
# OPEN QUESTIONS & GAPS
# ─────────────────────────────────────────────────────────────
open_questions:
  - question: "Is there any CSRF protection on the login/consent POST endpoints?"
    context: "Login and legal consent submit via POST with JSON body but no CSRF token observed. JWT Bearer auth covers most endpoints but pre-auth endpoints rely on SameSite cookies (not observed) or are unprotected."
    type: nice_to_know
    affects: [security]

  - question: "What is the intended behavior when multiple tabs are open and one tab logs out?"
    context: "No cross-tab synchronization via 'storage' events. Other tabs retain stale tokens until their next fetch fails."
    type: research
    affects: [state-management]

  - question: "Are WebSocket auth close codes documented on the backend?"
    context: "WS_AUTH_CLOSE_CODES is referenced but the actual Set values were not in the visible range of useOperationalMapData.ts."
    type: nice_to_know
    affects: [websocket]

gaps:
  - area: "Cross-tab session sync"
    description: "No listener for window 'storage' events. Logout/login in one tab is invisible to other tabs until a request fails."
    impact: nice_to_know
    affects: [state-management, auth]

  - area: "No URL-based routing"
    description: "String-based activeView state means no browser back/forward, no deep links, no shareable URLs. Refresh always returns to the home view."
    impact: nice_to_know
    affects: [state-management, UX]

  - area: "No standardized error display component"
    description: "Error display varies per dashboard — some use inline text, some use styled banners. No reusable ErrorAlert/Toast component."
    impact: nice_to_know
    affects: [error-handling, consistency]

  - area: "Single globalError string"
    description: "Only one global error can be shown at a time. Rapid errors overwrite each other. No queuing or stacking."
    impact: nice_to_know
    affects: [error-handling]

  - area: "Token in localStorage (XSS risk)"
    description: "Access token stored in localStorage is accessible to any XSS payload. HttpOnly cookies would be more secure but require backend changes."
    impact: nice_to_know
    affects: [security]
