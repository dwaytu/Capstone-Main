plan_id: acceptance-test
objective: Research 5 critical issues found during SENTINEL acceptance testing
focus_area: backend-routes, frontend-router, websocket, auth-middleware, presence
created_at: "2026-04-09"
created_by: gem-researcher
status: completed

tldr: |
  - Issue 1 (WS 403): The `/api/tracking/ws` route has NO auth middleware layer — it does its own token extraction from subprotocol headers. The CORS layer (outermost) uses `AllowOrigin::list()` which may not include the `Sec-WebSocket-Protocol` in `allow_headers`, potentially stripping it during preflight. The WS route requires a `bearer.<token>` subprotocol OR `?token=` query param. CORS origin mismatch with production frontend domain is the most likely root cause.
  - Issue 2 (Guard ERR_ABORTED): All four guard endpoints exist and use `require_authenticated` (not role-gated). ERR_ABORTED is NOT a backend auth rejection — it's a browser-side abort, likely caused by the guard dashboard's `Promise.allSettled` bulk fetch pattern where one early failure (e.g., network/CORS) cascades.
  - Issue 3 (Analytics timeout): The route exists and maps to a handler that runs ~10 sequential SQL queries. Guard role is explicitly blocked by `require_analytics_view` which checks `view_analytics` permission — guards lack this permission. For elevated roles, the handler's serial query pattern is a timeout risk.
  - Issue 4 (Support redirect): By design. `SupportRouteWrapper` in `router/index.tsx:123-127` explicitly returns `<Navigate to={ROUTES.INBOX} replace />` for non-guard roles (superadmin/admin/supervisor).
  - Issue 5 (Active/Inactive): Status is derived purely from `last_seen_at` timestamp with a 3-minute window. The `touch_last_seen` presence middleware fires on every authenticated API request. If a user hasn't made any API call in 3 minutes, they appear "Inactive". No WebSocket heartbeat updates `last_seen_at`.

