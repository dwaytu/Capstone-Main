issue_findings:

  issue_1_ws_403:
    title: "WebSocket 403 on /api/tracking/ws"
    severity: critical
    root_cause_candidates:
      - rank: 1
        cause: "CORS origin mismatch — production frontend origin may not be in CORS_ORIGINS env var"
        evidence: |
          The CORS layer (main.rs:94-213) uses AllowOrigin::list() which only allows explicitly configured origins.
          In production, CORS_ORIGINS must be set (config.rs:47-49 enforces this).
          The WebSocket upgrade starts as an HTTP GET request subject to CORS.
          If the frontend domain isn't in the allowed list, the browser blocks the upgrade.
        confidence: high
      - rank: 2
        cause: "Sec-WebSocket-Protocol header stripped by CORS allowed_headers config"
        evidence: |
          The CORS allow_headers list (main.rs:115-120) only includes: Authorization, Content-Type, Accept, Origin.
          It does NOT include Sec-WebSocket-Protocol or Upgrade or Connection.
          The frontend sends subprotocols ['sentinel-tracking-v1', 'bearer.<token>'] (useOperationalMapData.ts:362).
          If the CORS layer strips or rejects these headers, the handler's extract_ws_token_from_protocols() gets no token and returns 401.
        confidence: medium
      - rank: 3
        cause: "Token extraction failure — JWT not found in subprotocol header"
        evidence: |
          If the token format is malformed or the header is absent, tracking_ws handler (tracking.rs:1989-1993) returns AppError::Unauthorized.
          Frontend sends bearer.<token> format which matches extract_ws_token_from_protocols parsing (tracking.rs:95-97).
        confidence: low
    key_files:
      - "DasiaAIO-Backend/src/main.rs:1391 (route definition — no middleware)"
      - "DasiaAIO-Backend/src/handlers/tracking.rs:1974-2037 (WS handler with inline auth)"
      - "DasiaAIO-Backend/src/handlers/tracking.rs:87-101 (subprotocol token parser)"
      - "DasiaAIO-Backend/src/main.rs:94-213 (CORS config)"
      - "DasiaAIO-Frontend/src/hooks/useOperationalMapData.ts:355-402 (WS client)"
    notes: |
      The /api/tracking/ws route intentionally has no route_layer middleware because WebSocket
      upgrades cannot use standard Bearer Authorization headers. The handler does its own auth
      by extracting the token from the Sec-WebSocket-Protocol header (bearer.<jwt>) or a 
      ?token= query parameter. The guard role IS allowed (has_tracking_access_role returns true
      for all 4 roles). The 403 is not a role issue.

  issue_2_guard_api_err_aborted:
    title: "Guard-specific API ERR_ABORTED"
    severity: high
    root_cause_candidates:
      - rank: 1
        cause: "net::ERR_ABORTED is a browser-side abort, not a server 403/401"
        evidence: |
          All four routes exist in main.rs and use require_authenticated middleware (not role-gated):
          - /api/attendance/:guard_id → main.rs:697-700 → require_authenticated
          - /api/guard-replacement/guard/:guard_id/shifts → main.rs:647-650 → require_authenticated
          - /api/guard-allocations/:guard_id → main.rs:582-585 → require_authenticated
          - /api/guard-firearm-permits/:guard_id → main.rs:900-903 → require_authenticated
          
          require_authenticated (authz.rs:59-64) only verifies JWT validity and legal consent.
          It does NOT check role — guard tokens should pass fine.
          
          ERR_ABORTED typically means the browser killed the request before getting a response:
          - CORS preflight failure (no Access-Control-Allow-Origin in response)
          - Request cancelled by AbortController
          - Page navigation during request
          - Network connectivity issue
        confidence: high
      - rank: 2
        cause: "CORS preflight failure on production"
        evidence: |
          If the frontend production origin is not in CORS_ORIGINS, ALL API requests will fail
          with ERR_ABORTED — not just WebSocket. This would explain why all 4 guard endpoints
          fail simultaneously.
        confidence: medium
      - rank: 3
        cause: "Legal consent not accepted — enforce_legal_consent returns 403"
        evidence: |
          require_authenticated calls enforce_legal_consent (authz.rs:62).
          If the guard user hasn't accepted ToA, all requests return 403.
          The frontend might abort on first 403 and cancel remaining requests.
        confidence: medium
    key_files:
      - "DasiaAIO-Backend/src/main.rs:582,647,697,900 (route definitions)"
      - "DasiaAIO-Backend/src/middleware/authz.rs:59-64 (require_authenticated)"
      - "DasiaAIO-Frontend/src/components/guards/UserDashboard.tsx:264-285 (bulk fetch)"
    notes: |
      The backend routes all exist and accept guard tokens via require_authenticated.
      The server-side code does NOT reject guards on these endpoints.
      ERR_ABORTED is NOT the same as HTTP 403 — it means the request was cancelled/blocked
      at the browser level. Most likely candidates: CORS origin mismatch in production,
      or legal consent not accepted (enforce_legal_consent returns 403 which the fetch
      wrapper may interpret as abort-worthy).

  issue_3_analytics_timeout:
    title: "Analytics API timeout"
    severity: medium
    root_cause_candidates:
      - rank: 1
        cause: "Guard role explicitly blocked — middleware returns 403"
        evidence: |
          Route (main.rs:1290-1293) uses require_analytics_view middleware.
          require_analytics_view calls authorize_permission(req, next, "view_analytics").
          Guard role permissions (utils.rs:284-288): ["create_support_ticket", "manage_notifications", "view_merit"].
          Guard does NOT have "view_analytics" → returns 403 Forbidden.
          Additionally, handler itself has require_min_role(&headers, "supervisor") check (analytics.rs:78).
        confidence: high
      - rank: 2
        cause: "Slow sequential SQL queries causing timeout for elevated roles"
        evidence: |
          get_analytics handler (analytics.rs:74-250) runs ~10 sequential SQL queries without
          pagination or caching. On a large dataset this could exceed request timeout.
          The global request_timeout middleware (main.rs:1665) applies.
        confidence: medium
    key_files:
      - "DasiaAIO-Backend/src/main.rs:1290-1293 (route + middleware)"
      - "DasiaAIO-Backend/src/middleware/authz.rs:155-157 (require_analytics_view)"
      - "DasiaAIO-Backend/src/utils.rs:284-288 (guard permissions — no view_analytics)"
      - "DasiaAIO-Backend/src/handlers/analytics.rs:74-250 (handler with ~10 sequential queries)"
    notes: |
      If the caller is a guard, the 403 is expected — guards don't have analytics access.
      If the caller is superadmin/admin/supervisor and it still fails, the issue is likely
      the handler's sequential query pattern causing a timeout on production database.

  issue_4_support_redirect:
    title: "Support route redirects to /inbox for elevated roles"
    severity: low_by_design
    root_cause_candidates:
      - rank: 1
        cause: "Intentional design — SupportRouteWrapper redirects non-guard roles to /inbox"
        evidence: |
          SupportRouteWrapper (router/index.tsx:123-128):
            if (user.role === 'guard') return <GuardSectionWrapper section="support" />
            return <Navigate to={ROUTES.INBOX} replace />
          
          For guards: renders their UserDashboard with activeView="support"
          For all other roles: redirects to /inbox
          
          This is a deliberate routing decision — the /support view is guard-specific,
          and elevated roles get their support integration through the inbox.
        confidence: high
    key_files:
      - "DasiaAIO-Frontend/src/router/index.tsx:123-128 (SupportRouteWrapper)"
      - "DasiaAIO-Frontend/src/router/index.tsx:185 (route definition under ALL_ROLES)"
      - "DasiaAIO-Frontend/src/router/routes.ts:19,25 (SUPPORT='/support', INBOX='/inbox')"
    notes: |
      This is working as designed. The /support path is a guard-facing section of UserDashboard.
      For superadmin/admin/supervisor, the inbox serves as the unified support + notifications hub.
      If this behavior is unwanted, the SupportRouteWrapper needs to render a dedicated
      support component for elevated roles instead of redirecting.

  issue_5_active_inactive_status:
    title: "All non-logged-in users show as Inactive with stale signals"
    severity: medium
    root_cause_candidates:
      - rank: 1
        cause: "Status derived solely from last_seen_at with 3-minute window"
        evidence: |
          Both AdminDashboard.tsx:39-46 and SuperadminDashboard.tsx:59-64 define:
            ONLINE_WINDOW_MS = 3 * 60 * 1000 (3 minutes)
            isUserOnline(lastSeenAt) → true if Date.now() - lastSeenAt <= 3 minutes
          
          getUserDerivedStatus (AdminDashboard.tsx:72-76, SuperadminDashboard.tsx:104-108):
            Returns 'active' ONLY if isUserOnline(last_seen_at) is true.
            Otherwise returns 'inactive'.
          
          last_seen_at is updated by:
            1. touch_last_seen middleware (presence.rs:7-27) — on every authenticated API call
            2. Login handler (auth.rs:783) — at login time
          
          There is NO WebSocket heartbeat that updates last_seen_at.
          There is NO dedicated presence/ping endpoint.
          
          If a user is logged in but viewing a static page (no API calls for 3+ minutes),
          they appear "Inactive". Most users won't be making API calls every 3 minutes.
        confidence: high
    key_files:
      - "DasiaAIO-Frontend/src/components/AdminDashboard.tsx:39-46,72-76"
      - "DasiaAIO-Frontend/src/components/admin/SuperadminDashboard.tsx:59-64,104-108"
      - "DasiaAIO-Backend/src/middleware/presence.rs:7-27 (touch_last_seen)"
      - "DasiaAIO-Backend/src/handlers/auth.rs:783 (login updates last_seen_at)"
    notes: |
      The presence system has no active heartbeat mechanism. Users appear "Inactive"
      within 3 minutes of their last API call. The "Signal Xm ago" display 
      (AdminDashboard.tsx:760, SuperadminDashboard.tsx:1225) shows exact time since
      last_seen_at which will always be stale for users not actively triggering API calls.
      
      The WebSocket connection for tracking does NOT update last_seen_at — it runs
      entirely within the tracking handler and never touches the presence middleware.
