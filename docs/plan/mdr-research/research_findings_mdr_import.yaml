# ═══════════════════════════════════════════════════════════════════
# FULL UPLOAD FLOW
# ═══════════════════════════════════════════════════════════════════

upload_flow:
  step_1_file_selection:
    component: MdrUploader.tsx
    description: |
      User drags/drops or selects .xlsx/.xls file.
      Extension validated client-side (only .xlsx/.xls accepted).

  step_2_client_side_parsing:
    component: MdrParseEngine.ts
    description: |
      File is read as ArrayBuffer via FileReader.
      SheetJS (xlsx) parses the workbook with cellDates: true.
      identifySheets() auto-detects sheet roles by name pattern:
        - Main roster: sheet name containing month name, or 'MAIN'/'ROSTER', or first sheet
        - Supplementary: 'Sheet 1' or 'SUPPLEMENT'
        - Pull-out: 'PULL OUT' / 'PULLOUT'
        - Returned: 'FA RETURNED' / 'RETURNED TO GHQ' / 'RETURNED'
      Each sheet is parsed by its specialized parser:
        - parseRosterSheet(): starts row 8, reads client/guard/firearm columns A-P
        - parsePullOutSheet(): starts row 4, includes pulloutStatus
        - parseReturnedFirearmsSheet(): starts row 2, simpler firearm-only columns
      Returns MdrParseResult with filename, reportMonth, branch, sheets{}, warnings[].

  step_3_preview:
    component: MdrUploader.tsx
    description: |
      Preview counts (unique guards/clients/firearms, pullout count, returned count) displayed.
      Parsing warnings shown (max 20 in UI).
      User clicks "Upload & Process" button.

  step_4_upload:
    component: MdrUploader.tsx → backend
    api_call: "POST /api/mdr/import"
    content_type: "application/json"
    description: |
      Sends JSON body: { filename, reportMonth, branch, sheets: { mainRoster[], supplementary[], pullOut[], returnedFirearms[] } }
      NOTE: This is NOT a multipart file upload. The XLSX is parsed entirely on the client, and only the extracted JSON rows are sent.

  step_5_backend_import:
    handler: "handlers/mdr.rs → import_mdr()"
    description: |
      1. Extracts bearer token, verifies JWT claims
      2. Creates mdr_import_batches row with status='staging'
      3. Iterates all rows from all 4 sheet arrays
      4. Inserts each as mdr_staging_rows with match_status='pending'
      5. Calls mdr_import_service::match_staging_rows()
      6. Returns { batchId, totalRows, preview: { matched, new, ambiguous, errors } }

  step_6_matching:
    service: "services/mdr_import_service.rs → match_staging_rows()"
    description: |
      For each staging row:
        Guard matching:
          1. Primary: users.license_number = staging.license_number WHERE role='guard'
          2. Fallback: UPPER(users.full_name) = UPPER(staging.guard_name) WHERE role='guard'
          3. Multiple matches → 'ambiguous'
        Firearm matching: firearms.serial_number = staging.serial_number
        Client matching: UPPER(clients.name) = UPPER(staging.client_name)
        Error check: non-equipment/non-returned rows without guard_name → 'error'
      Updates match_status and matched_*_id on each staging row.
      Updates batch row counts and sets status='reviewing'.

  step_7_redirect_to_review:
    component: MdrImportPage.tsx
    description: |
      On upload success, navigates to /mdr-import/{batchId} which renders MdrBatchReview.

  step_8_review:
    component: MdrBatchReview.tsx
    description: |
      Shows batch stats dashboard (total/matched/new/ambiguous/error).
      Paginated table of staging rows (50 per page).
      Ambiguous rows show resolve controls: select matched/new, pick guard/firearm/client IDs.
      Resolve button PATCHes /api/mdr/staging/:id/resolve.

  step_9_commit_or_reject:
    component: MdrBatchReview.tsx
    description: |
      Commit (superadmin only): POST /api/mdr/batches/:id/commit
        → mdr_import_service::commit_batch() — full transactional upsert
      Reject (superadmin/admin in UI, but superadmin-only in backend route): POST /api/mdr/batches/:id/reject
        → mdr_import_service::reject_batch() — sets status='rejected'

# ═══════════════════════════════════════════════════════════════════
# API ENDPOINTS
# ═══════════════════════════════════════════════════════════════════

api_endpoints:
  - method: POST
    path: "/api/mdr/import"
    handler: "handlers::mdr::import_mdr"
    middleware: "require_mdr_management + audit_write_requests"
    description: "Upload parsed MDR data, create batch + staging rows, run matching"
    request_body: "MdrImportRequest (JSON)"
    response: "{ batchId, totalRows, preview: { matched, new, ambiguous, errors } }"

  - method: GET
    path: "/api/mdr/batches"
    handler: "handlers::mdr::get_batches"
    middleware: "require_mdr_management"
    description: "Paginated list of all MDR import batches"
    query_params: "page, pageSize"
    response: "{ total, page, pageSize, items: MdrImportBatch[] }"

  - method: GET
    path: "/api/mdr/batches/:id"
    handler: "handlers::mdr::get_batch_by_id"
    middleware: "require_mdr_management"
    description: "Single batch details"
    response: "MdrImportBatch"

  - method: GET
    path: "/api/mdr/batches/:id/review"
    handler: "handlers::mdr::get_batch_review"
    middleware: "require_mdr_management"
    description: "Paginated staging rows for review"
    query_params: "page, pageSize"
    response: "{ total, page, pageSize, items: MdrStagingRow[] }"

  - method: PATCH
    path: "/api/mdr/staging/:id/resolve"
    handler: "handlers::mdr::resolve_staging_row"
    middleware: "require_mdr_management + audit_write_requests"
    description: "Resolve ambiguous/error staging row by setting match_status and matched IDs"
    request_body: "ResolveRequest (JSON)"
    response: "{ status: 'resolved' }"

  - method: POST
    path: "/api/mdr/batches/:id/commit"
    handler: "handlers::mdr::commit_batch"
    middleware: "require_superadmin + audit_write_requests"
    description: "Commit batch — transactional upsert of all staging rows into production tables"
    response: "{ status: 'committed', summary: CommitSummary }"

  - method: POST
    path: "/api/mdr/batches/:id/reject"
    handler: "handlers::mdr::reject_batch"
    middleware: "require_superadmin + audit_write_requests"
    description: "Reject batch — sets status to 'rejected'"
    response: "{ status: 'rejected' }"

