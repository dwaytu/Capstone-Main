  new_tables:
    - name: clients
      purpose: "First-class business entity representing security agency clients"
      key_columns: "id, name, address, phone, client_number, branch, is_active"
      indexes: "Unique on UPPER(name)+COALESCE(branch,'')"

    - name: mdr_import_batches
      purpose: "Audit trail for each MDR workbook upload"
      key_columns: "id, filename, report_month, branch, uploaded_by→users, status, row counts, committed_at/by"
      statuses: "staging → reviewing → committed | rejected"

    - name: mdr_staging_rows
      purpose: "Raw parsed Excel rows held for review before commit"
      key_columns: "25 columns — all MDR row data + match_status + matched_*_id + validation_errors"
      indexes: "batch_id, (batch_id, match_status)"
      cascade: "ON DELETE CASCADE from mdr_import_batches"

    - name: guard_assignments
      purpose: "Guard-to-client posting records"
      key_columns: "guard_id→users, client_id→clients, post_label, guard_number, status, mdr traceability"
      indexes: "guard_id, client_id, unique active per (guard_id, client_id, assignment_start)"

    - name: guard_status_transitions
      purpose: "Pull-out and re-assignment history"
      key_columns: "guard_id, transition_type, reason, previous_client_id, mdr traceability"
      indexes: "(guard_id, created_at DESC)"

    - name: equipment
      purpose: "Non-firearm gear tracked from MDR"
      key_columns: "equipment_type, description, serial_number, assigned_to_client/guard, quantity, status"

  altered_tables:
    - name: users
      added_columns: "guard_number (INTEGER), status (VARCHAR), mdr_batch_id (VARCHAR), lic_reg_name (VARCHAR)"

    - name: firearms
      added_columns: "kind, make, validity_date, ammo_issued, lic_reg_name, vault_status, return_remarks, mdr_batch_id"

    - name: firearm_allocations
      added_columns: "mdr_batch_id, mdr_row_ref"

    - name: client_sites
      added_columns: "client_id (VARCHAR) — links sites to business clients"

# ═══════════════════════════════════════════════════════════════════
# ROLES AND ACCESS CONTROL
# ═══════════════════════════════════════════════════════════════════

roles_and_access:
  superadmin:
    - "manage_mdr permission → can access all MDR routes"
    - "Can upload, review, resolve, commit, reject"
    - "Commit requires superadmin (enforced in handler via require_min_role + route middleware)"
  admin:
    - "manage_mdr permission → can access most MDR routes"
    - "Can upload, review, resolve"
    - "Frontend shows reject button (canReject = userRole === 'superadmin' || userRole === 'admin')"
    - "BUT backend reject route uses require_superadmin middleware → admin reject will 403"
  supervisor:
    - "NO manage_mdr permission"
    - "NO nav entry for MDR"
  guard:
    - "NO manage_mdr permission"
    - "NO nav entry for MDR"

# ═══════════════════════════════════════════════════════════════════
# BUGS AND ISSUES
# ═══════════════════════════════════════════════════════════════════

bugs_and_issues:

  - id: BUG-1
    severity: medium
    title: "Admin reject button will 403 at backend"
    description: |
      Frontend MdrBatchReview.tsx:131 sets canReject = userRole === 'superadmin' || userRole === 'admin',
      showing a reject button for admins. But main.rs:1623-1632 registers /api/mdr/batches/:id/reject
      with require_superadmin middleware, so admin users will get a 403 Forbidden response.
    files:
      - "DasiaAIO-Frontend/src/components/mdr/MdrBatchReview.tsx:131"
      - "DasiaAIO-Backend/src/main.rs:1623-1632"
    fix: "Either change backend reject route to require_mdr_management, or change frontend canReject to superadmin-only"

  - id: BUG-2
    severity: low
    title: "N+1 query in match_staging_rows"
    description: |
      match_staging_rows() iterates ALL staging rows and runs 1-3 SQL queries per row
      (guard match, optionally name match, firearm match, client match = up to 4 queries per row).
      For a 500-row MDR workbook, this is ~2000 individual queries.
    files:
      - "DasiaAIO-Backend/src/services/mdr_import_service.rs:40-170"
    fix: "Pre-load all guards/firearms/clients into HashMaps and match in-memory"

  - id: BUG-3
    severity: medium
    title: "Hardcoded temp password for new guards created on commit"
    description: |
      When commit_batch creates a new guard user, it uses hash_password("changeme123!").
      There is no forced password change mechanism, and the password is the same for every
      auto-created guard. This is a security concern.
    files:
      - "DasiaAIO-Backend/src/services/mdr_import_service.rs:~460"
    fix: "Generate random passwords, or create users in a 'pending_activation' state"

  - id: BUG-4
    severity: low
    title: "No duplicate batch detection"
    description: |
      The same filename + report_month + branch can be uploaded multiple times
      with no warning or deduplication. This could lead to duplicate guard/firearm records on commit.
    files:
      - "DasiaAIO-Backend/src/handlers/mdr.rs:73-155"
    fix: "Check for existing batch with same filename+report_month before creating"

  - id: BUG-5
    severity: low
    title: "New guard email generation is naive"
    description: |
      For new guards, email is generated as guardname@sentinel.local and username
      from name.to_lowercase().replace(' ', '.').replace(',', ''). Name collisions
      would cause unique constraint violations.
    files:
      - "DasiaAIO-Backend/src/services/mdr_import_service.rs:~455-465"
    fix: "Add uniqueness suffix or check for existing username/email"

  - id: ISSUE-1
    severity: info
    title: "validation_errors column in mdr_staging_rows is never populated"
    description: |
      The JSONB validation_errors column exists in the schema and model but is never
      written to by any handler or service.
    files:
      - "DasiaAIO-Backend/migrations/add_mdr_integration.sql:75"
      - "DasiaAIO-Backend/src/models.rs:1090"

  - id: ISSUE-2
    severity: info
    title: "notes column on mdr_import_batches is never used"
    description: |
      The batch has a 'notes' TEXT column but no UI or handler writes to it.
    files:
      - "DasiaAIO-Backend/migrations/add_mdr_integration.sql:42"

  - id: ISSUE-3
    severity: info
    title: "Resolve UI uses raw IDs in select dropdowns"
    description: |
      The resolve controls for ambiguous rows show raw UUIDs in dropdowns
      rather than displaying guard names, firearm serial numbers, or client names.
      This makes manual resolution very difficult.
    files:
      - "DasiaAIO-Frontend/src/components/mdr/MdrBatchReview.tsx:~430-480"

# ═══════════════════════════════════════════════════════════════════
# IMPLEMENTATION STATUS
# ═══════════════════════════════════════════════════════════════════

implementation_status:
  overall: "Fully wired end-to-end"
  details: |
    The MDR import feature is complete at all layers:
    - Frontend: file upload, client-side XLSX parsing, preview, upload, batch history, review, resolve, commit/reject
    - Backend: import handler, matching service, commit service (full transactional upsert), reject service
    - Database: migration creates all required tables and extends existing ones
    - Routing: both frontend React Router and backend Axum routes are registered
    - Auth/Authz: middleware guards on all endpoints, permission model defined
    - Audit: commit writes to audit_logs table
    - Navigation: sidebar entries for superadmin and admin roles

  parsing_depth: |
    The MdrParseEngine is sophisticated — handles 4 sheet types, multiple section detection,
    date normalization (numeric Excel dates, slash-delimited, ISO), phone normalization,
    client/guard/firearm extraction. Generates actionable warnings.

  commit_depth: |
    The commit_batch service handles 5 distinct section types (equipment, returned, pullout,
    vault, default roster) with create-or-update logic for clients, guards, firearms,
    allocations, assignments, and status transitions. Uses a database transaction.

  what_works:
    - "File upload with drag-and-drop"
    - "Client-side .xlsx/.xls parsing with 4 sheet types"
    - "Preview counts before upload"
    - "Backend import + auto-matching"
    - "Batch history with pagination"
    - "Staging row review table"
    - "Manual row resolution"
    - "Batch commit with transactional upsert"
    - "Batch reject"
    - "Audit logging on commit"

  what_needs_attention:
    - "Admin reject 403 mismatch (BUG-1)"
    - "N+1 matching query performance (BUG-2)"
    - "Hardcoded temp password (BUG-3)"
    - "No duplicate batch detection (BUG-4)"
    - "Naive email generation for new guards (BUG-5)"
    - "Resolve UI shows raw UUIDs (ISSUE-3)"
    - "Unused validation_errors and notes columns"

