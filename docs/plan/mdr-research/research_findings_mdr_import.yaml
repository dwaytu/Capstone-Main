plan_id: mdr-research
objective: "Comprehensive research of the SENTINEL MDR import/upload feature across frontend and backend"
focus_area: mdr-import
created_at: "2026-04-10"
created_by: gem-researcher
status: completed

tldr: |
  - MDR import is a fully wired end-to-end feature: client-side XLSX parsing → JSON POST → staging rows → matching → review UI → commit/reject
  - Frontend: 5 files under components/mdr/ (MdrImportPage, MdrUploader, MdrParseEngine, MdrBatchReview, MdrBatchList) + router + navigation entries
  - Backend: handler (handlers/mdr.rs, 7 endpoints), service (services/mdr_import_service.rs, 3 functions), 2 models, 1 migration creating 6 new tables + altering 4 existing
  - Roles: superadmin and admin can access MDR features; only superadmin can commit batches; backend route-level commit/reject requires superadmin but frontend allows admin to reject
  - Key issues found: commit/reject route guard mismatch vs frontend logic, N+1 query in matching, no duplicate batch detection, hardcoded temp password for new guards

research_metadata:
  methodology: "hybrid retrieval: grep_search for 'mdr' across frontend/backend/migrations, file_search for mdr*, read_file for all discovered files"
  scope: "Full frontend components, backend handlers, services, models, routes, migrations, navigation config, router config, permissions"
  confidence: high
  coverage: 100  # All MDR files discovered and fully read
  decision_blockers: 0
  research_blockers: 0

