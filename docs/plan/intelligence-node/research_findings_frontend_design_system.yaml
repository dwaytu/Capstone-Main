# ═══════════════════════════════════════════════════════════════════════════════
# 5. BUTTON PATTERNS
# ═══════════════════════════════════════════════════════════════════════════════

button_patterns:

  soc_btn_base:
    defined_in: "DasiaAIO-Frontend/src/index.css L628–L645"
    definition: |
      .soc-btn {
        border-radius: 0.5rem;
        border: 1px solid var(--color-info-border);
        background: color-mix(in srgb, var(--color-info) 16%, var(--color-surface));
        color: var(--color-text-primary);
        padding: 0.55rem 0.9rem;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        transition: transform 160ms ease, box-shadow 160ms ease, background-color 160ms ease;
      }
      .soc-btn:hover {
        transform: translateY(-1px);
        box-shadow: var(--shadow-bento-hover);
        background: color-mix(in srgb, var(--color-info) 24%, var(--color-surface));
      }

  variant_classes:
    - class: ".soc-btn-success"
      location: "L647"
      definition: "border-color: success-border; bg: success-bg; color: success-text"
    - class: ".soc-btn-danger"
      location: "L653"
      definition: "border-color: danger-border; bg: danger-bg; color: danger-text"
    - class: ".soc-btn-neutral"
      location: "L659"
      definition: "border-color: border-elevated; bg: surface-elevated; color: text-secondary"
    - class: ".soc-btn-primary"
      location: "L1150"
      definition: "border: 1px solid color-mix(primary 44%, border); bg: linear-gradient(135deg, primary, primary-hover); color: primary-text"
    - class: ".soc-btn-secondary"
      location: "L1160"
      definition: "border: border-elevated; bg: surface-elevated 96%; color: text-secondary; hover: panel-hover"

  forced_colors_override:
    location: "L1341–L1345"
    definition: "All soc-btn variants get border: 1px solid ButtonBorder; background: ButtonFace; color: ButtonText"

  terminal_login_btn:
    defined_in: "index.css L775"
    description: "Special gradient button for login screen — linear-gradient(#0ea5e9, #2563eb, #0ea5e9) with glow"

  swap_response_buttons:
    defined_in: "index.css L1327–L1340"
    classes:
      - ".swap-response-btn — 0.375rem radius, 0.75rem font"
      - ".swap-response-accept — accepted-bg/text/border"
      - ".swap-response-decline — declined-bg/text/border"

  usage_example_files:
