# ═══════════════════════════════════════════════════════════════════════════════
# OPEN QUESTIONS
# ═══════════════════════════════════════════════════════════════════════════════

open_questions:
  - question: "IncidentSeverityMonitoringPanel uses raw Tailwind colors (red-500, orange-400, etc.) instead of design tokens — should these be normalized?"
    context: "Inconsistency with the rest of the design system which uses CSS variables"
    type: nice_to_know
    affects: ["badge-normalization"]

  - question: "The Tailwind plugin bento-card definition (rounded-2xl p-6) differs from the CSS utility class definition (radius-card = 10px, padding = 16px) — which is canonical?"
    context: "Plugin says rounded-2xl (20px) while CSS utility says var(--radius-card) (10px)"
    type: decision_blocker
    affects: ["card-radius-standardization"]

  - question: "Some tone-surface classes (tone-guard-surface, tone-vehicle-surface) are defined but usage is unclear — are they actively used?"
    context: "Found definitions in index.css L900+ but no grep hits in components"
    type: nice_to_know
    affects: ["cleanup"]

gaps:
  - area: "Glass morphism patterns"
    description: "BentoCard.tsx supports glass prop but the .glass-card and .accent-glow CSS classes were not found in the read range — may be defined elsewhere or unused"
    impact: research_blocker
    affects: ["glass-card-implementation"]

  - area: "Dark mode body gradient"
    description: "Dark mode body uses a multi-stop linear gradient (L382) — design changes to --color-background alone won't affect this gradient"
    impact: nice_to_know
    affects: ["background-theming"]
