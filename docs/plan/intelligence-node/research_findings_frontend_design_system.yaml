  file: DasiaAIO-Frontend/tailwind.config.ts
  dark_mode: "class"
  content: ["./index.html", "./src/**/*.{js,ts,jsx,tsx}"]

  color_extensions:
    note: "All map to CSS variables — no hardcoded colors in Tailwind config"
    mappings:
      - { tw_name: "background", var: "var(--color-background)" }
      - { tw_name: "surface", var: "var(--color-surface)" }
      - { tw_name: "surface-elevated", var: "var(--color-surface-elevated)" }
      - { tw_name: "surface-hover", var: "var(--color-surface-hover)" }
      - { tw_name: "text-primary", var: "var(--color-text-primary)" }
      - { tw_name: "text-secondary", var: "var(--color-text-secondary)" }
      - { tw_name: "text-tertiary", var: "var(--color-text-tertiary)" }
      - { tw_name: "text-disabled", var: "var(--color-text-disabled)" }
      - { tw_name: "border / border-subtle / border-elevated", var: "var(--color-border-*)" }
      - { tw_name: "success / success-bg / success-border / success-text", var: "var(--color-success-*)" }
      - { tw_name: "warning", var: "var(--color-warning-*)" }
      - { tw_name: "danger", var: "var(--color-danger-*)" }
      - { tw_name: "info", var: "var(--color-info-*)" }
      - { tw_name: "primary / primary-hover / primary-active / primary-text", var: "var(--color-primary-*)" }
      - { tw_name: "accent / accent-secondary", var: "var(--color-accent-*)" }

  font_size_scale:
    - { name: "xs", size: "0.75rem", lineHeight: "1.5", weight: 500 }
    - { name: "sm", size: "0.875rem", lineHeight: "1.5", weight: 500 }
    - { name: "base", size: "1rem", lineHeight: "1.6", weight: 500 }
    - { name: "lg", size: "1.125rem", lineHeight: "1.6", weight: 600 }
    - { name: "xl", size: "1.25rem", lineHeight: "1.6", weight: 600 }
    - { name: "2xl", size: "1.5rem", lineHeight: "1.5", weight: 700 }
    - { name: "3xl", size: "1.875rem", lineHeight: "1.4", weight: 700 }

  border_radius_scale:
    - { name: "sm", value: "0.375rem (6px)" }
    - { name: "DEFAULT", value: "0.5rem (8px)" }
    - { name: "md", value: "0.625rem (10px)" }
    - { name: "lg", value: "0.75rem (12px)" }
    - { name: "xl", value: "1rem (16px)" }
    - { name: "2xl", value: "1.25rem (20px)" }

  box_shadow_extensions:
    - { name: "bento", value: "var(--shadow-bento)" }
    - { name: "bento-hover", value: "var(--shadow-bento-hover)" }
    - { name: "elevated", value: "var(--shadow-elevated)" }
    - { name: "modal", value: "var(--shadow-modal)" }

  animations:
    - { name: "fade-in", value: "fade-in 0.3s ease-out" }
    - { name: "slide-in-right", value: "slide-in-right 0.3s ease-out" }
    - { name: "pulse-subtle", value: "pulse-subtle 2s ease-in-out infinite" }

  plugins:
    - name: "Bento Grid utilities"
      utilities:
        - ".bento-grid — auto-fit minmax(280px, 1fr), gap 1rem"
        - ".bento-grid-dense — auto-fit minmax(240px, 1fr), gap 0.75rem"
        - ".bento-card — @apply bg-surface border border-border-subtle rounded-2xl p-6 shadow-bento (NOTE: this Tailwind plugin version differs slightly from the CSS utility class version)"
        - ".text-balance — text-wrap: balance"

