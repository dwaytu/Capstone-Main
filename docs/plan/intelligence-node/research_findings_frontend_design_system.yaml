plan_id: intelligence-node
objective: "Map exact CSS variables, component patterns, and styling conventions for Direction A 'The Intelligence Node' design implementation"
focus_area: frontend-design-system
created_at: "2026-04-07"
created_by: gem-researcher
status: completed

tldr: |
  - Design system is CSS-variable-driven with ~80+ tokens in :root/.dark blocks (index.css L4–L164), consumed via Tailwind config semantic mappings.
  - Primary card pattern is the `.bento-card` utility class (index.css L575–L586) with gradient background, inset highlight, and `--shadow-bento` shadow — used by BentoCard.tsx, BentoGrid.tsx, CommandMetricCard, OpsMetricCard, and dozens of dashboard components.
  - Badge/pill system uses `.soc-chip` base class (index.css L668) with tone/status modifiers, plus dedicated StatusBadge.tsx and SectionBadge.tsx components.
  - Button system uses `.soc-btn` base class (index.css L628) with variant modifiers (-success, -danger, -neutral, -primary, -secondary).
  - Shell architecture: OperationalShell (layout/OperationalShell.tsx) wraps Sidebar (components/Sidebar.tsx) + Header (shared/Header.tsx) with sidebar accent gradient and z-index token system.

research_metadata:
  methodology: "hybrid retrieval: semantic_search + grep_search + read_file for index.css, tailwind.config.ts, and component files"
  scope: "Complete frontend design token system, shell components, card/badge/button patterns"
  confidence: high
  coverage: 95
  decision_blockers: 0
  research_blockers: 0

