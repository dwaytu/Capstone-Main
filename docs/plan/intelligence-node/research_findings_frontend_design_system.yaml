# ═══════════════════════════════════════════════════════════════════════════════
# 3. CARD / SURFACE PATTERNS
# ═══════════════════════════════════════════════════════════════════════════════

card_patterns:

  bento_card_css_class:
    defined_in: "DasiaAIO-Frontend/src/index.css L575–L586"
    definition: |
      .bento-card {
        border-radius: var(--radius-card);           /* 10px */
        border: 1px solid var(--color-border-subtle);
        background: linear-gradient(165deg, color-mix(in srgb, var(--color-surface-elevated) 88%, transparent), var(--color-surface));
        padding: calc(var(--space-unit) * 2);         /* 16px */
        box-shadow: inset 0 1px 0 color-mix(in srgb, var(--color-info) 8%, transparent), var(--shadow-bento);
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      }
      .bento-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-bento-hover);
        border-color: var(--color-border-elevated);
      }
    tailwind_plugin_equivalent: >
      @apply bg-surface border border-border-subtle rounded-2xl p-6 shadow-bento transition-all duration-250
      hover: shadow-bento-hover

  soc_dashboard_card_css_class:
    defined_in: "DasiaAIO-Frontend/src/index.css L553–L564"
    definition: |
      Same as bento-card but with surface-elevated at 90% opacity, explicit hover translateY(-2px), border-color -> border-elevated on hover.
      Nearly identical — includes inset 0 1px 0 info highlight.

  command_panel_css_class:
    defined_in: "DasiaAIO-Frontend/src/index.css L525–L528"
    classes: "border: 1px solid var(--color-border-subtle); border-radius: var(--radius-card); background: linear-gradient(180deg, ...); box-shadow: inset + shadow-bento"

  BentoCard_component:
    file: DasiaAIO-Frontend/src/components/BentoCard.tsx
    lines: ~240
    variants: [default, success, warning, danger, info]
    sizes: [sm (p-4 120px), md (p-5 160px), lg (p-6 200px), xl (p-8 280px)]
    extra_props: [glass, glow, interactive, loading (skeleton), disabled]
    base_classes: "rounded-lg border transition-all duration-250"
    interactive_hover: "cursor-pointer hover:shadow-bento-hover hover:bg-surface-hover"
    non_interactive: "shadow-bento"

  BentoGrid_component:
    file: DasiaAIO-Frontend/src/components/BentoGrid.tsx
    lines: ~97
    grid_classes: "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"
    exports: "BentoGrid (default), BentoCard (named) — BentoCard here uses .bento-card CSS class directly"
    card_span_system: "colSpan (1–4), rowSpan (1–3), isMain (2col+2row hero)"

  top_files_using_card_patterns:
    - file: DasiaAIO-Frontend/src/components/AdminDashboard.tsx
      pattern: "bento-card, shadow-md, bg-surface rounded-lg"
    - file: DasiaAIO-Frontend/src/components/admin/SuperadminDashboard.tsx
      pattern: "bento-card, shadow-lg"
    - file: DasiaAIO-Frontend/src/components/dashboard/CommandMetricCard.tsx
      pattern: "bento-card + status-bar-* tone + inset box-shadow accent"
    - file: DasiaAIO-Frontend/src/components/dashboard/OpsMetricCard.tsx
      pattern: "bento-card + severityStyles border overrides"
    - file: DasiaAIO-Frontend/src/components/MeritScoreDashboard.tsx
      pattern: "bento-card + status-bar-info / status-bar-success"
    - file: DasiaAIO-Frontend/src/components/TripManagement.tsx
      pattern: "bento-card bare invocation"
    - file: DasiaAIO-Frontend/src/components/CalendarDashboard.tsx
      pattern: "shadow-lg on hover, chip-based event cards"

  other_surface_classes:
    - { class: "table-glass", location: "index.css L594", description: "surface 92% transparent + border-subtle + blur backdrop" }
    - { class: "thead-glass", location: "index.css L602", description: "sticky top z-10 surface-elevated 94% + border shadow" }
    - { class: "status-live-card", location: "index.css L724", description: "0.75rem radius, border-subtle, surface 92%, padding 0.9rem" }
    - { class: "soc-surface", location: "index.css L924", description: "1rem radius, border-subtle, surface 92%, shadow-bento" }
    - { class: "soc-kpi", location: "index.css L930", description: "0.8rem radius, gradient bg, 0.85rem padding" }
    - { class: "soc-empty-state", location: "index.css L998", description: "dashed border-elevated, 8px radius, centered" }

  status_bar_indicators:
    note: "Left-accent inset box-shadow — NOT border"
    classes:
      - { class: "status-bar-success", value: "inset 5px 0 0 0 var(--color-success)", line: 588 }
      - { class: "status-bar-warning", value: "inset 5px 0 0 0 var(--color-warning)", line: 592 }
      - { class: "status-bar-critical", value: "inset 5px 0 0 0 var(--color-danger)", line: 596 }
      - { class: "status-bar-info", value: "inset 5px 0 0 0 var(--color-info)", line: 600 }
      - { class: "critical-glow", value: "inset 5px + 0 0 18px danger glow + pulse-critical animation", line: 604 }

