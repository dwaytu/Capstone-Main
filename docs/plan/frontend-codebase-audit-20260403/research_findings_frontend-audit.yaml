    context: The PRD and redesign documentation describe a new guard workspace with its own navigation model, but the implementation still exits that shell for profile.
    type: research
    affects:
      - frontend-codebase-audit-20260403
  - question: Are the console errors observed in support tied to support-ticket requests timing out, or to shift-swap panel requests failing under expired or missing auth refresh?
    context: Both flows exist in the same support screen, but only one uses the shared guarded API helper.
    type: research
    affects:
