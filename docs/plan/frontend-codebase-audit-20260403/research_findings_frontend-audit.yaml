domain_security_considerations:
  sensitive_areas:
    - area: Profile update and photo endpoints
      location: DasiaAIO-Frontend/src/components/ProfileDashboard.tsx
      concern: Uses bearer tokens from localStorage directly in raw fetch calls.
    - area: Support tickets and shift swap requests
      location: DasiaAIO-Frontend/src/components/UserDashboard.tsx and DasiaAIO-Frontend/src/components/dashboard/GuardShiftSwapPanel.tsx
      concern: Protected operational endpoints depend on bearer auth; inconsistent helper usage means inconsistent auth-expiry handling and retry behavior.
  authentication_patterns_in_domain: Authenticated API calls use bearer tokens from getAuthToken or localStorage token values.
  authorization_patterns_in_domain: App.tsx and navigation.ts use normalizeRole plus can(permission) checks for most elevated views; profile route is authenticated but not permission-gated.
  data_validation_in_domain: Support and swap forms perform minimal required-field validation client-side before submitting JSON payloads.

