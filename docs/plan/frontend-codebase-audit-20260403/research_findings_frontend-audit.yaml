plan_id: frontend-codebase-audit-20260403
objective: Analyze the DasiaAIO-Frontend codebase for guard profile routing, support-section API failures, theme implementation, settings/profile architecture, and git remote state.
focus_area: frontend-routing-support-theme-profile-git
created_at: 2026-04-03T00:00:00Z
created_by: GitHub Copilot
status: completed

tldr: |
  - The new guard dashboard profile button in UserDashboard dispatches onViewChange('profile'), and App.tsx globally special-cases that state to render the standalone ProfileDashboard instead of keeping the user inside the new guard dashboard flow.
  - Support tickets in UserDashboard use fetchJsonOrThrow with Promise.allSettled and surfaced status text, but GuardShiftSwapPanel uses raw fetch calls with thinner error handling, no shared timeout/auth-refresh path, and one swallowed PATCH failure path.
  - Theme state is implemented globally through ThemeProvider and CSS custom properties in index.css, but the toggle UI lives in Header; the new guard dashboard uses a custom header and therefore does not expose the toggle control there.
  - There is no dedicated Settings page component. ProfileDashboard is the effective settings surface, with role-aware navigation via getSidebarNav and guard-only availability controls; the profile route itself is not permission-gated beyond authentication.
  - Git remote origin points to dwaytu/Capstone-Main, while the local git user.name is cloudyrowdyyy; the remote is not pointing at a cloudyrowdyyy-owned repository.

research_metadata:
  methodology: Hybrid retrieval using search_subagent, grep_search, file_search, targeted read_file passes, repository memory review, PRD review, and direct git config inspection.
  scope: Focused audit of guard dashboard routing, support-related frontend components, theme system, settings/profile surface, and git remote metadata, with backend route existence checks for support and swap APIs.
  confidence: high
  coverage: 92
  decision_blockers: 0
  research_blockers: 0

