patterns_found:
  - category: architecture
    pattern: State-based top-level routing with special-case branches before generic view dispatch.
    description: App.tsx uses activeView string state rather than a URL router and gives profile its own special-case render branch outside the normal guard section flow.
    examples:
      - file: DasiaAIO-Frontend/src/App.tsx
        location: App.tsx:903
        snippet: activeView === 'profile' renders ProfileDashboard directly.
      - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
        location: UserDashboard.tsx:1229
        snippet: onViewChange?.('profile') from the guard bottom nav.
    prevalence: common
  - category: structure
    pattern: Guard dashboard mixes global view state with local section state.
    description: UserDashboard owns local section state while still accepting activeView from App.tsx, creating a split navigation model.
    examples:
      - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
        location: UserDashboard.tsx:89
        snippet: resolveSectionFromView only maps support, firearms, permits, and map to local sections.
      - file: DasiaAIO-Frontend/src/App.tsx
        location: App.tsx:813
        snippet: renderHome returns UserDashboard for guards while other activeView values may bypass it.
    prevalence: common
  - category: error_handling
    pattern: Shared API helper used in UserDashboard, but raw fetch still appears in secondary panels.
    description: Core guard data loads use fetchJsonOrThrow with retries, timeout handling, and auth refresh, while GuardShiftSwapPanel and parts of ProfileDashboard use raw fetch directly.
    examples:
      - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
        location: UserDashboard.tsx:232
        snippet: refreshData loads five guard datasets via fetchJsonOrThrow.
      - file: DasiaAIO-Frontend/src/components/dashboard/GuardShiftSwapPanel.tsx
        location: GuardShiftSwapPanel.tsx:43
        snippet: fetch(`${API_BASE_URL}/api/shifts/swap-requests`, ...) with manual response.ok handling.
      - file: DasiaAIO-Frontend/src/components/ProfileDashboard.tsx
        location: ProfileDashboard.tsx:47
        snippet: fetch availability and silently ignore failures.
    prevalence: common
  - category: error_handling
    pattern: Partial failure resilience in support ticket loading.
    description: UserDashboard degrades gracefully when support-related API calls fail by collecting failures and surfacing a syncError banner instead of crashing.
    examples:
      - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
        location: UserDashboard.tsx:257
        snippet: Promise.allSettled with failures.push(labels[index]).
      - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
        location: UserDashboard.tsx:275
        snippet: setSyncError(`Some data could not be loaded: ...`).
    prevalence: occasional
  - category: error_handling
    pattern: Silent failure path in shift swap response action.
    description: The shift swap response PATCH handler catches and swallows all errors, leaving console/network issues hard to diagnose from UI behavior.
    examples:
      - file: DasiaAIO-Frontend/src/components/dashboard/GuardShiftSwapPanel.tsx
        location: GuardShiftSwapPanel.tsx:111
        snippet: catch { // swallow — UI will reflect unchanged status on next fetch }
    prevalence: occasional
  - category: architecture
    pattern: Theme state is global, but theme control exposure is shell-specific.
    description: ThemeProvider wraps the whole app, but the actual toggle button is only rendered from the shared Header component.
    examples:
      - file: DasiaAIO-Frontend/src/main.tsx
        location: main.tsx:11
        snippet: <ThemeProvider><App /></ThemeProvider>
      - file: DasiaAIO-Frontend/src/components/Header.tsx
        location: Header.tsx:67
        snippet: <ThemeToggleButton className="flex" />
      - file: DasiaAIO-Frontend/src/components/UserDashboard.tsx
        location: UserDashboard.tsx:783
        snippet: custom header with refresh/logout only and no ThemeToggleButton.
    prevalence: common
  - category: naming
    pattern: Profile surface is labeled as Account Settings.
    description: The routed profile page is implemented as ProfileDashboard but user-facing text and structure treat it as account settings.
    examples:
      - file: DasiaAIO-Frontend/src/components/ProfileDashboard.tsx
        location: ProfileDashboard.tsx:253
        snippet: Header title="Account Settings"
      - file: DasiaAIO-Frontend/src/components/ProfileDashboard.tsx
        location: ProfileDashboard.tsx:275
        snippet: h1 Account Settings
    prevalence: common
  - category: access_control
    pattern: Role-based access control is applied to view registry and sidebar navigation, but not to the profile route itself.
    description: Permissions gate elevated views and navigation items, while profile is available to any authenticated role that can set activeView to profile.
    examples:
      - file: DasiaAIO-Frontend/src/App.tsx
        location: App.tsx:780
        snippet: can(role, route.permission)
      - file: DasiaAIO-Frontend/src/config/navigation.ts
        location: navigation.ts:49
        snippet: ELEVATED_NAV.filter(item => !item.permission || can(role, item.permission))
      - file: DasiaAIO-Frontend/src/App.tsx
        location: App.tsx:903
        snippet: profile branch is outside viewRegistry permission checks.
    prevalence: common

