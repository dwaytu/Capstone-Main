related_conventions:
  naming_patterns_in_domain: Dashboard-level screens use *Dashboard suffixes, while nested support modules use *Panel names. User-facing copy refers to the profile route as Account Settings.
  structure_of_domain: App.tsx performs state-based routing; guard-specific workflows live in UserDashboard; shared chrome components are reused by elevated screens and ProfileDashboard but not by the new guard dashboard shell.
  error_handling_in_domain: Shared fetchJsonOrThrow provides timeout, retry, and auth-expiry normalization, but several components still use raw fetch with ad hoc handling, including silent catches.
  testing_in_domain: Existing plan artifacts and tests reference guard dashboard redesign coverage, including support and profile tab expectations.
  documentation_in_domain: Architecture and system guide documents already describe UserDashboard as the new guard workspace and ProfileDashboard as the account/profile screen.

