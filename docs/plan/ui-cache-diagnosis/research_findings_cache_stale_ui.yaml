  data_flow_involving_domain: |
    Browser navigates to localhost:5173 →
    IF active SW exists: SW fetch handler intercepts request →
      Cache hit? → Returns STALE cached response (index.html, JS modules) →
      Cache miss? → Network fetch → caches response → returns to browser
    IF no active SW: Request goes directly to Vite dev server → fresh response with HMR
    
    On page load: main.tsx runs → disableServiceWorkerInDevelopment() fires async →
      Unregisters all SWs → Deletes all CacheStorage entries →
      BUT: This runs AFTER the SW already served the stale page

