patterns_found:
  - category: architecture
    pattern: "Service Worker with cache-first fetch strategy"
    description: "sw.js implements a cache-first pattern for all non-API GET requests. Once installed, the SW will serve cached responses for /, /index.html, and any dynamically cached assets (JS modules, CSS) before checking the network. This is the textbook cause of stale UI in browsers."
    examples:
      - file: sw.js
        location: "sw.js:76-89"
        snippet: |
          self.addEventListener('fetch', (event) => {
            const { request } = event;
            const url = new URL(request.url);
            if (request.method !== 'GET') return;
            if (url.pathname.startsWith('/api/')) return;
            event.respondWith(
              caches.match(request).then((cached) => {
                if (cached) return cached;
                return fetch(request).then((response) => {
                  if (response.ok && response.type !== 'opaque') {
                    const clone = response.clone();
                    caches.open(CACHE_NAME).then((cache) => cache.put(request, clone));
                  }
                  return response;
                });
              }),
            );
          });
    prevalence: common

  - category: architecture
    pattern: "Race condition in SW cleanup at startup"
    description: "disableServiceWorkerInDevelopment() is called as fire-and-forget (void) in main.tsx. The SW fetch handler can intercept the initial page load and serve cached index.html BEFORE the cleanup function unregisters the SW. The cleanup only takes effect on subsequent navigations."
    examples:
      - file: main.tsx
        location: "main.tsx:11"
        snippet: "void disableServiceWorkerInDevelopment()"
    prevalence: common

  - category: architecture
    pattern: "Stale build artifacts in app-dist/"
    description: "app-dist/ contains a full production build including sw.js. While Vite's dev server serves from src/, the presence of this directory could cause confusion if any tool or browser loads from it."
    examples:
      - file: app-dist/sw.js
        location: "app-dist/sw.js:1"
        snippet: "// Service worker: push notifications + offline caching + action queue"
    prevalence: occasional

  - category: structure
    pattern: "Dev-mode SW guard is compile-time only"
    description: "registerServiceWorker() checks import.meta.env.DEV and returns null in dev. This prevents NEW registrations but does NOT handle a previously-registered SW that is already active."
    examples:
      - file: pushNotifications.ts
        location: "pushNotifications.ts:49-53"
        snippet: |
          export async function registerServiceWorker(): Promise<ServiceWorkerRegistration | null> {
            if (!('serviceWorker' in navigator)) return null
            if (isDevelopmentRuntime()) return null
          }
    prevalence: common

