plan_id: ui-cache-diagnosis
objective: "Identify all caching layers that could cause VSCode Simple Browser to show stale UI content during development"
focus_area: "Service Worker / PWA Cache / Vite HMR / Build Artifacts / CSS Build Cache"
created_at: "2026-04-04"
created_by: "gem-researcher"
status: completed

tldr: |
  - ROOT CAUSE (HIGH confidence): A fully functional service worker at `public/sw.js` implements cache-first fetch strategy for ALL GET requests (except /api/). It caches `/`, `/index.html`, and then dynamically caches every subsequent GET response. Even though `disableServiceWorkerInDevelopment()` is called in `main.tsx`, it can only run AFTER the SW has already intercepted the page load. Once the SW is installed in a browser context, it serves stale `/index.html` and stale JS modules from CacheStorage before the cleanup code ever executes.
  - SECONDARY CAUSE (MEDIUM confidence): `app-dist/` contains stale production build artifacts including an old `sw.js` copy. If the Vite dev server ever fell back to serving from this directory, or if the browser previously loaded from a production build at the same origin, the old SW could still be active.
  - NO ISSUES FOUND: Vite config has clean HMR setup, no PWA plugin, no custom cache headers. Tailwind v4 PostCSS has no build cache. `index.html` has no cache-control meta tags.
  - VSCode Simple Browser does not expose DevTools, making it impossible for users to manually clear CacheStorage/unregister SWs — the cleanup must be fully automated and race-free.

