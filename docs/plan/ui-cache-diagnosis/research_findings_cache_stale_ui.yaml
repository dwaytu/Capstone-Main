# FINDINGS — Structured Diagnosis Report
# ============================================================================

findings:
  - id: F1
    title: "Service Worker with cache-first strategy is the primary cause"
    severity: critical
    confidence: high
    could_cause_stale_ui: true
    location: "DasiaAIO-Frontend/public/sw.js:76-89"
    description: |
      The sw.js file implements a cache-first fetch strategy for ALL non-API GET requests.
      On install, it pre-caches '/', '/index.html', and logo assets.
      On every subsequent fetch, it dynamically caches the response (JS modules, CSS, etc).
      
      Once this SW is installed in a browser context (including VSCode Simple Browser),
      it will serve the CACHED version of index.html and all JS/CSS modules, completely
      bypassing the Vite dev server's HMR-enabled responses.
      
      The cache name is 'sentinel-v1' which NEVER changes, so the cache is never
      automatically invalidated — it will serve stale content indefinitely.
    evidence:
      - "sw.js line 4: const CACHE_NAME = 'sentinel-v1' (static, no content hash)"
      - "sw.js line 78-79: cache-first pattern — returns cached response immediately if found"
      - "sw.js line 82-86: dynamically caches ALL successful GET responses"
      - "sw.js line 61-63: install event pre-caches index.html"
      - "sw.js line 71: activate calls clients.claim() — takes control immediately"
    recommended_fix: |
      Option A (Recommended): Add network-first strategy for dev assets:
        In sw.js, skip caching for requests to localhost or for module URLs (*.tsx, *.ts, *.jsx, @vite/*, etc.)
      
      Option B: Change CACHE_NAME to include a hash or version that changes with each build.
      
      Option C (Already partially implemented): The disableServiceWorkerInDevelopment() function
        already exists but has a race condition (see F2). Fix the race condition.

  - id: F2
    title: "Race condition: SW cleanup runs AFTER SW serves stale page"
    severity: high
    confidence: high
    could_cause_stale_ui: true
    location: "DasiaAIO-Frontend/src/main.tsx:11"
    description: |
      main.tsx calls `void disableServiceWorkerInDevelopment()` — fire-and-forget.
      The problem is temporal ordering:
      
      1. Browser requests localhost:5173/ 
      2. Active SW intercepts → serves cached index.html (STALE)
      3. Cached index.html loads cached main.tsx bundle (STALE)
      4. main.tsx finally executes → calls disableServiceWorkerInDevelopment()
      5. SW is unregistered, caches are cleared
      6. But the page is ALREADY rendered with stale content
      7. User must manually refresh to see updated content
      
      In VSCode Simple Browser, there's no easy way to force-refresh or clear
      the SW cache, so the stale content persists until the SW cleanup completes
      AND the page is reloaded.
    evidence:
      - "main.tsx line 11: void disableServiceWorkerInDevelopment() — not awaited"
      - "pushNotifications.ts line 21-37: the cleanup is async, unregisters all SWs and deletes all caches"
      - "But SW fetch handler at sw.js:76-89 runs BEFORE any application JS executes"
    recommended_fix: |
      The core issue is that the SW fetch handler intercepts the initial navigation
      request before any application code can run. Solutions:
      
      1. Add a self-destruct mechanism in sw.js itself: In the fetch handler, check
         if the request is for localhost (or check a flag), and if so, skip caching
         and pass through to network.
      
      2. In sw.js, add a message listener that the app can use to force-skip cache:
         self.addEventListener('message', (event) => {
           if (event.data === 'skipCache') { /* unregister self */ }
         })
      
      3. Add dev-detection to sw.js itself:
         if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
           // Don't cache anything, just pass through
         }

  - id: F3
    title: "Stale sw.js copy in app-dist/ build output"
    severity: low
    confidence: medium
    could_cause_stale_ui: true
    location: "DasiaAIO-Frontend/app-dist/sw.js"
    description: |
      The app-dist/ directory contains a full production build including sw.js.
      While Vite's dev server does NOT serve from app-dist/, there are scenarios
      where this could cause issues:
      
      1. If the user previously ran `npm run preview` (which serves from app-dist/),
         the SW would have been installed from that build.
      2. That SW would then persist in the browser and intercept subsequent dev
         server requests at the same origin+port.
      3. The stale hashed assets in app-dist/ (e.g., index-DUOYvQvS.js) would
         NOT match the Vite dev server's module URLs, potentially causing errors.
    evidence:
      - "app-dist/sw.js exists with identical caching logic"
      - "app-dist/index.html references hashed assets: /assets/index-DUOYvQvS.js"
      - "Dev server uses unhashed module paths: /src/main.tsx"
    recommended_fix: |
      Clean app-dist/ before running dev server, or ensure preview and dev
      servers run on different ports (they already do: 4173 vs 5173).
      Consider adding `rm -rf app-dist` to the dev script.

  - id: F4
    title: "No cache-control meta tags in index.html (NOT a problem)"
    severity: none
    confidence: high
    could_cause_stale_ui: false
    location: "DasiaAIO-Frontend/index.html"
    description: |
      index.html has no <meta> cache-control directives and no manifest.json link.
      This is correct for development — Vite's dev server sets appropriate no-cache
      headers. The ABSENCE of cache-control metas is NOT contributing to the problem.
    evidence:
      - "index.html contains only charset, viewport, title, favicon, and root div"
    recommended_fix: null

  - id: F5
    title: "Vite config has clean HMR setup (NOT a problem)"
    severity: none
    confidence: high
    could_cause_stale_ui: false
    location: "DasiaAIO-Frontend/vite.config.ts"
    description: |
      Vite config has standard HMR configuration with ws protocol, localhost host,
      and matching clientPort. No PWA plugin, no cache plugin, no custom response
      headers. The HMR setup is correct and not contributing to stale UI.
    evidence:
      - "vite.config.ts:28-33: standard HMR config"
      - "plugins: [react()] — only React plugin, no PWA/cache plugins"
    recommended_fix: null

  - id: F6
    title: "Tailwind CSS v4 / PostCSS has no build cache issue"
    severity: none
    confidence: high
    could_cause_stale_ui: false
    location: "DasiaAIO-Frontend/postcss.config.js"
    description: |
      PostCSS config uses only @tailwindcss/postcss plugin with no caching
      configuration. Tailwind v4 processes CSS on each request through Vite's
      transform pipeline, which does not persist cache across dev server restarts.
    evidence:
      - "postcss.config.js has only @tailwindcss/postcss plugin"
      - "No caching plugins or cache directory configuration"
    recommended_fix: null

  - id: F7
    title: "VSCode Simple Browser lacks SW management capabilities"
    severity: medium
    confidence: high
    could_cause_stale_ui: true
    location: "N/A — VSCode Simple Browser limitation"
    description: |
      VSCode's Simple Browser is an embedded Chromium webview that does NOT expose:
      - DevTools (no Application → Service Workers panel)
      - Cache clearing UI
      - Hard refresh (Ctrl+Shift+R)
      - 'Update on reload' SW debugging option
      
      This means that once a SW is installed in the Simple Browser context, the
      user has NO manual way to clear it. The application's automated cleanup
      (disableServiceWorkerInDevelopment) is the ONLY mechanism, and it has the
      race condition described in F2.
      
      The Simple Browser may also share its cache/SW registrations across sessions,
      meaning a SW installed in a previous session persists.
    evidence:
      - "VSCode Simple Browser is a basic webview2 wrapper without DevTools"
      - "No equivalent of Chrome's 'Application → Clear Storage' in Simple Browser"
    recommended_fix: |
      1. Fix the SW race condition (F2) so cleanup is reliable without manual intervention.
      2. Consider opening dev URLs in an external browser instead of Simple Browser.
      3. Add a dev-mode bypass directly in sw.js (see F2 recommended fix option 3).

# ============================================================================
# Root Cause Summary
# ============================================================================

root_cause_summary: |
  The stale UI in VSCode Simple Browser is caused by a **service worker race condition**.
  
  The sw.js file at `public/sw.js` implements a cache-first fetch strategy that:
  1. Pre-caches `/` and `/index.html` on install
  2. Dynamically caches ALL non-API GET responses
  3. Serves cached responses before checking the network
  
  The dev-mode cleanup function `disableServiceWorkerInDevelopment()` exists and works
  correctly, but it runs TOO LATE — the SW has already intercepted the initial navigation
  and served stale cached content before any application JavaScript executes.
  
  VSCode Simple Browser compounds this because it lacks DevTools and manual cache/SW
  management, making the automated cleanup the only available remedy.

