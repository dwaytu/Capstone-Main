plan_id: guard-ux-overhaul
objective: >
  Fix all 7 blocking and 5 high-severity UX issues in the Guard Dashboard without adding features.
  Restructure the sticky bottom region, eliminate competing navigation, fix header misuse,
  and improve empty states — all while maintaining zero build errors.
created_at: "2026-04-04T00:00:00Z"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 4
  total_dependencies: 14
  risk_score: medium

tldr: |
  12 UX issues across App.tsx, UserDashboard.tsx, index.css, GuardMapTab.tsx, and HeaderGlobalActions.tsx.
  Wave 1 tackles 4 independent App.tsx / CSS fixes (competing nav, update button, location banner, grid columns).
  Wave 2 restructures the sticky region and fixes cross-tab header bleed and header button clutter (3 tasks).
  Wave 3 improves map empty state and documents z-index contract (2 tasks).
  Wave 4 validates build integrity and visual correctness (2 tasks).
  Total: 11 tasks across 4 waves. No new features — fixes only.

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "Moving check-in button from sticky region to Mission content breaks check-in flow for guards already trained on current layout"
      likelihood: medium
      impact: high
      mitigation: "Keep identical button styling and prominent top-of-Mission placement. Check-in CTA remains the first thing guards see on Mission tab."
    - scenario: "Removing App.tsx mobile nav for guards could hide navigation needed for non-guard views (profile, settings, inbox)"
      likelihood: medium
      impact: medium
      mitigation: "Condition is scoped to isGuardWorkspaceView which already excludes inbox, settings, and profile views. Guard's own sticky nav handles guard-specific navigation."
    - scenario: "Reducing sticky region height miscalculates padding-bottom causing content occlusion"
      likelihood: medium
      impact: high
      mitigation: "CSS variable --guard-sticky-region-height is the single source of truth used by both guard-sticky-main padding and other bottom-offset calculations. Updating the variable once propagates correctly."
    - scenario: "z-index changes in location banner dismissal cause visual stacking regressions"
      likelihood: low
      impact: medium
      mitigation: "Fix #1 removes the competing z-64 nav for guards, and fix #4 adds dismiss rather than changing z-index values. Existing z-index hierarchy preserved."
  assumptions:
    - "Guard workspace custom layout (UserDashboard.tsx) is the ONLY layout guards use — they never see OperationalShell"
    - "isGuardWorkspaceView in App.tsx already correctly identifies guard workspace vs guard-in-settings/profile"
    - "The --guard-sticky-region-height CSS variable is the single source of truth for bottom spacing"
    - "Build currently has 0 TypeScript errors and 0 Vite build errors"
    - "Four nav items exist in guard sticky nav: Mission, Resources, Support, Map"

implementation_specification:
  code_structure: >
    All changes are edits to existing files. No new files or components are created.
    App.tsx gets 3 surgical condition changes. UserDashboard.tsx gets sticky region extraction
    and SectionHeader fix. index.css gets variable and grid updates. GuardMapTab.tsx gets
    an improved empty state. HeaderGlobalActions.tsx gets a guard-mode prop to hide non-essential buttons.
  affected_areas:
    - "DasiaAIO-Frontend/src/App.tsx — mobile nav suppression, update button guard condition, location banner dismiss"
    - "DasiaAIO-Frontend/src/components/guards/UserDashboard.tsx — sticky region restructure, SectionHeader removal, check-in/action buttons moved to Mission content"
    - "DasiaAIO-Frontend/src/index.css — --guard-sticky-region-height reduction, grid column fix, z-index documentation"
    - "DasiaAIO-Frontend/src/components/dashboard/GuardMapTab.tsx — empty state improvement"
    - "DasiaAIO-Frontend/src/components/shared/HeaderGlobalActions.tsx — guard-mode button reduction"
  component_details:
    - component: "App.tsx mobile nav gate"
      responsibility: "Suppress mobile quick-nav rendering when isGuardWorkspaceView is true"
      interfaces:
        - "Uses existing isGuardWorkspaceView boolean — no new props"
    - component: "App.tsx location banner dismiss"
      responsibility: "Add dismiss button with localStorage 24-hour snooze to location permission banner"
      interfaces:
        - "New state: locationBannerDismissed (boolean)"
        - "localStorage key for snooze timestamp"
    - component: "UserDashboard sticky region"
      responsibility: "Reduce sticky region to nav-only; relocate check-in button and action row into Mission tab content"
      interfaces:
        - "Same handlePrimaryCheckAction callback, same incidentModalOpen/setIncidentModalOpen state"
    - component: "HeaderGlobalActions guard mode"
      responsibility: "Accept optional guardMode prop to render only notifications + profile avatar"
      interfaces:
        - "New optional prop: guardMode?: boolean"
    - component: "GuardMapTab empty state"
      responsibility: "Replace minimal empty state with actionable guidance and tab-switch button"
      interfaces:
        - "New optional prop: onSwitchToMission?: () => void"
  dependencies:
    - component: "App.tsx mobile nav gate"
      relationship: "Reads isGuardWorkspaceView which depends on normalizedRole and activeView"
    - component: "UserDashboard sticky restructure"
      relationship: "Depends on CSS variable update in index.css for correct spacing"
    - component: "GuardMapTab empty state"
      relationship: "Receives onSwitchToMission callback from UserDashboard parent"
  integration_points:
    - "App.tsx showMobileQuickNav rendering block (lines ~1208-1236)"
    - "App.tsx Check for Updates button (lines ~945-954)"
    - "App.tsx location banner (lines ~983-1004)"
