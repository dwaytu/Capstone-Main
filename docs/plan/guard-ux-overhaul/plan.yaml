      nav at z-42 with [Mission, Resources, Support, Map]. On mobile, BOTH are visible and "Support"
      appears twice.

      Fix: Gate the showMobileQuickNav rendering block (~line 1208) with `!isGuardWorkspaceView`.
      When the guard is in their workspace, their own sticky-region nav is authoritative.
      The isGuardWorkspaceView variable already exists and correctly excludes inbox/settings/profile.
