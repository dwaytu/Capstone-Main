      4. Add Report Incident and View Instructions as inline buttons below the check-in button in Mission content.
      5. When no active shift (issue #5): do NOT render the check-in button at all — the duty status
         banner already shows "OFF DUTY" state.
      6. Remove the .guard-sticky-action-row CSS class usage (it will be unused).
      7. The sticky region now contains ONLY the <nav> element with guard-sticky-nav.
      8. Reduce --guard-sticky-region-height from 13rem to 4.5rem in index.css (~line 146).
         Height breakdown: nav row (2.75rem) + vertical padding (1rem) + border/gap (~0.75rem) = ~4.5rem.
      9. Update the CSS comment above the variable to reflect nav-only composition.
      10. Add a SectionHeader with title='Mission' inside the mission tab conditional block.
