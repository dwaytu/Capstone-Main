pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: Enabling mobile nav breaks guard workspace sticky bar layout
      likelihood: medium
      impact: high
      mitigation: |
        Guard workspace has its own sticky bottom bar (guardStickySafeBottomOffset). The mobile quick nav
        uses a separate fixed bottom element. Test with isGuardWorkspaceView=true to ensure both coexist.
        The existing code already accounts for showMobileQuickNav in bottom offset calculations.
    - scenario: Semantic token replacements change visual appearance in dark SOC theme
      likelihood: low
      impact: medium
      mitigation: |
        The SOC theme uses specific color mappings. Color replacements should map to closest semantic equivalents.
        Run visual comparison before/after. Prefer conservative mappings (e.g., emerald → success, red → danger, indigo → info/primary).
    - scenario: Hiding unavailable features breaks existing admin workflows
      likelihood: low
      impact: medium
      mitigation: |
        Don't remove buttons entirely — add visual "Coming Soon" badges and disable click handlers.
        This preserves the UI layout while preventing confusing error toasts.
  assumptions:
    - index.css semantic tokens (success, danger, warning, info, primary) are the authoritative color system
    - The guard workspace sticky bar (--guard-sticky-region-height) must be preserved when mobile nav is enabled
    - "Check for Updates" button serves no purpose on mobile (Capacitor handles updates differently)
    - SuperadminDashboard refreshing state is genuinely unused (grep confirms setRefreshing is called but refreshing is never read in JSX)

