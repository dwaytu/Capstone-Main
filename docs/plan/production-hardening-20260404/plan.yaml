  - id: PROD-05
    title: Fix SuperadminDashboard unused state and loading state presentation
    description: |
      Two targeted fixes in SuperadminDashboard.tsx:

      1. Remove unused `refreshing` state variable (line 230):
         - `const [refreshing, setRefreshing] = useState<boolean>(false)` is declared
         - `setRefreshing(true)` is called at line 784 and `setRefreshing(false)` at line 791
         - But `refreshing` is never read in JSX or any conditional
         - Remove the state declaration and both setter calls to eliminate the TS warning
         - If the refresh logic needs the state later, it can be re-added; for now it's dead code

      2. Fix loading indicator color (line 881):
         - Current: `<div className="text-indigo-600 text-lg font-medium">Loading system data...</div>`
         - Replace: `<div className="text-info text-lg font-medium">Loading system data...</div>`
         - This is a direct color reference that should use the semantic token

      3. Optional improvement: Replace "Loading system data..." text with a skeleton pulse animation
         for a more professional appearance. Use Tailwind's `animate-pulse` with semantic bg colors:
         ```
         <div className="space-y-4 animate-pulse">
           <div className="h-6 w-48 rounded bg-surface-elevated"></div>
