  - id: PROD-02
    title: Replace direct Tailwind color classes with semantic design tokens
    description: |
      Replace hard-coded color classes with semantic token equivalents across admin-facing components.
      This enforces the design token system and ensures theme consistency.

      Color mapping reference:
      - emerald-* → success tokens (bg-success-bg, text-success-text, border-success-border, etc.)
      - red-* → danger tokens (bg-danger-bg, text-danger-text, border-danger-border, etc.)
      - blue-* → info tokens (bg-info-bg, text-info-text, border-info-border, etc.)
      - indigo-* → primary tokens (bg-primary, text-primary, hover:bg-primary-hover, etc.)
      - purple-* → info tokens or a new superadmin-accent if needed (closest semantic match is info)
      - yellow-/amber-* → warning tokens

      Files to modify (in order):
      1. AdminDashboard.tsx — Status pills (lines 80, 95, 113-134), action buttons (lines 775-878), shift status pills (lines 1059-1069), form buttons (lines 1105, 1163, 1169)
      2. SuperadminDashboard.tsx — Same role badge patterns (lines 98, 113, 131-134), action buttons
      3. ArmoredCarDashboard.tsx — Submit buttons (lines 497, 601, 715) using bg-indigo-600
      4. AuditDashboard.tsx — Status pill (line 11)
      5. AuditLogViewer.tsx — Status pill (line 30)
      6. ReplacementSuggestionPanel.tsx — Unavailable status (line 14)

      Specific replacements for SOC dark theme status pills:
      - 'bg-emerald-500/15 text-emerald-300 ring-1 ring-emerald-500/30' → 'bg-success-bg text-success-text ring-1 ring-success-border'
      - 'bg-red-500/15 text-red-300 ring-1 ring-red-500/30' → 'bg-danger-bg text-danger-text ring-1 ring-danger-border'
      - 'bg-blue-500/15 text-blue-300 ring-1 ring-blue-500/30' → 'bg-info-bg text-info-text ring-1 ring-info-border'
      - 'bg-purple-500/20 text-purple-300' → 'bg-info-bg text-info-text'
      - 'bg-indigo-600 hover:bg-indigo-700' → 'bg-primary hover:bg-primary-hover'
      - 'bg-emerald-600 hover:bg-emerald-700' → 'bg-success hover:bg-success/90'
      - 'bg-red-600 hover:bg-red-700' → 'bg-danger hover:bg-danger/90'

      For hover states on icon buttons:
      - 'hover:bg-emerald-500/10 hover:text-emerald-300' → 'hover:bg-success-bg hover:text-success-text'
      - 'hover:bg-indigo-500/10 hover:text-indigo-400' → 'hover:bg-info-bg hover:text-info-text'
      - 'hover:bg-red-500/10 hover:text-red-400' → 'hover:bg-danger-bg hover:text-danger-text'
