    title: Add skeleton loading states to AdminDashboard
    description: |
      Replace plain "Loading..." text in AdminDashboard.tsx with skeleton pulse animations
      matching the same pattern used in PROD-05 for SuperadminDashboard.

      The AdminDashboard has multiple loading states:
      - Main loading (when initial data is fetching)
      - shiftsLoading (when shifts tab loads)
