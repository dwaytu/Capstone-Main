objective: |
  Transform SENTINEL frontend into production-ready quality by fixing the disabled mobile navigation
  (guard top priority), replacing direct color references with semantic design tokens, adding professional
  polish (loading states, unavailable feature handling, banner stacking), fixing admin dashboard issues,
  and validating the build passes cleanly.
