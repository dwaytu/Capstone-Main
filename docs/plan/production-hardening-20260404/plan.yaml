tldr: |
  5-wave production hardening plan focused on frontend-only changes:
  - Wave 1: Enable mobile nav for guards, add missing nav items (Support, Map), hide "Check for Updates" on mobile
  - Wave 2: Replace direct Tailwind color references with semantic tokens across AdminDashboard, SuperadminDashboard, ArmoredCarDashboard, AuditDashboard
  - Wave 3: Add skeleton loading states, disable/label unavailable features (Reset Password, Suspend, Bulk Suspend), fix banner z-index stacking
  - Wave 4: Fix SuperadminDashboard unused state variable and loading text color, LoginPage email restriction note
  - Wave 5: Full build validation (tsc + vite build), code review for regressions

