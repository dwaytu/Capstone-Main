  - id: PROD-04
    title: Handle unavailable admin features gracefully
    description: |
      Three admin actions show error toasts saying "not configured" when clicked:
      - Reset Password (AdminDashboard line 453, SuperadminDashboard line 706)
      - Suspend User (AdminDashboard line 457, SuperadminDashboard line 714)
      - Bulk Suspend (AdminDashboard line 513, SuperadminDashboard line 777)

      Instead of showing as normal clickable buttons that produce error messages, these should:
      1. Add a visual "Coming Soon" indicator (small badge or tooltip)
      2. Style the buttons as disabled (opacity-50 cursor-not-allowed)
      3. Remove the error toast — replace with a brief inline tooltip or no-op
      4. Optionally add `aria-disabled="true"` and remove the click handler

      This prevents users from thinking the system is broken when they click these buttons.

      In AdminDashboard.tsx:
      - handleResetPassword function (line ~451): Disable the button, add "Coming Soon" label
      - handleSuspendUser function (line ~455): Same treatment
      - handleBulkSuspend function (line ~511): Same treatment

      In SuperadminDashboard.tsx:
      - handleResetPassword (line ~704): same
      - handleSuspendUser (line ~712): same
