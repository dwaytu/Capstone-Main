# ─────────────────────────────────────────────────────────────────────
# 10. RISKS AND BLOCKERS
# ─────────────────────────────────────────────────────────────────────

risks:
  - id: R1
    title: "SheetJS bundle size"
    severity: medium
    mitigation: "Use xlsx/dist/xlsx.mini.js (~200KB). Lazy-load only on MDR page via dynamic import."

  - id: R2
    title: "Date parsing ambiguity"
    severity: high
    mitigation: |
      Store raw date strings in staging. Parse with multiple format attempts
      (MM/DD/YYYY, M/D/YYYY, Excel serial number). Flag unparseable as validation error.
      Admin resolves before commit.

  - id: R3
    title: "Guard dedup false positives"
    severity: high
    mitigation: |
      Never auto-merge AMBIGUOUS. Always surface to admin.
      Show side-by-side comparison (MDR row vs existing SENTINEL record).
      License number is the strongest signal — prefer it.

  - id: R4
    title: "Large batch transaction timeout"
    severity: medium
    mitigation: |
      ~200 guards + ~200 firearms + ~50 clients = ~500 upserts.
      Well within Postgres transaction limits. Monitor commit latency.
      If needed, split into sub-transactions per section.

  - id: R5
    title: "Backward compatibility with shifts.client_site string"
    severity: low
    mitigation: |
      Do NOT drop or rename the string field. New guard_assignments table
      is additive. Existing shift flows continue working unchanged.
      Future wave can migrate shifts to use client FK.

  - id: R6
    title: "Multi-row client block parsing complexity"
    severity: medium
    mitigation: |
      Parse engine carries forward last-seen client name + address.
      Unit test with real MDR sample data to verify edge cases.
      Manual section detection by row range and pattern matching.

# ─────────────────────────────────────────────────────────────────────
# 11. OUT OF SCOPE (FIRST DELIVERY)
# ─────────────────────────────────────────────────────────────────────

out_of_scope:
  - "Server-side Excel parsing (stays browser-side)"
  - "Auto-scheduling shifts from MDR data"
  - "Client CRUD (create/update/delete) — only import + list for now"
  - "Migrating existing shifts.client_site strings to FK"
  - "MDR export/generation from SENTINEL data"
  - "Multi-branch support (first delivery = single branch per file)"
  - "Historical import of old MDR workbooks (can be done, but not validated)"

# ─────────────────────────────────────────────────────────────────────
# 12. OPEN QUESTIONS
# ─────────────────────────────────────────────────────────────────────

open_questions:
  - id: Q1
    question: "Should commiteed MDR data be editable after commit, or is the next month's import the correction mechanism?"
    default_assumption: "Immutable after commit. Corrections come in next month's MDR."

  - id: Q2
    question: "Should the LIC.REG.NAME abbreviations (D.INC, D.SEC, D.FORCE) be normalized to full company names?"
    default_assumption: "Store as-is in lic_reg_name. Admin can update clients.name later."

  - id: Q3
    question: "Should Armored Car Crews from MDR update existing armored_cars + driver_assignments tables?"
    default_assumption: "Yes — match by license plate or driver name, upsert driver_assignments."
