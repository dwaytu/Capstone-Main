guard_tab_inventory:
  tabs_in_sticky_nav:
    - key: mission
      label: Mission
      quality: good
      description: |
        Status Hero banner (duty status color-coded), location tracking toggle,
        check-in/check-out buttons, incident report modal, field instructions modal,
        today's shifts list with per-shift check-in/out.
      off_duty_content: "Shows 'OFF DUTY' banner + 'No shifts scheduled for today' empty state + 'Check the Support tab for schedule requests'"
      issues:
        - "Off-duty state is mostly empty — no upcoming schedule, training, or useful content"

    - key: resources
      label: Resources
      quality: good
      description: |
        3 stat cards (Allocated Firearms, Active Permits, Expiring/All Clear) +
