permission_error_ux:
  mechanism: "RoleGuard wrapper component renders AccessDenied inline"
  redirect_behavior: "No redirect — guard stays on the URL, sees AccessDenied component within AppShell"
  access_denied_component:
    location: DasiaAIO-Frontend/src/router/guards.tsx
    elements:
      - "h1: 'Access Denied'"
      - "p: 'You do not have permission to open this section. If this looks incorrect, contact a superadmin.'"
    styling: "rounded-2xl border border-danger-border bg-surface p-6 shadow-xl"
    accessibility: "Uses <main> with id='maincontent', tabIndex=-1"
  issues:
    - "No navigation hint or button to go back to /overview"
    - "Guard could get stuck on AccessDenied if they mistype a URL"
    - "Catch-all sends guards to /dashboard (which shows AccessDenied) instead of /overview"

# ============================================================
# OFF-DUTY STATE ANALYSIS
# ============================================================
off_duty_state:
  trigger: "No shifts in scheduleItems for today (activeShifts.length === 0)"
  what_shows:
    status_hero: "'OFF DUTY' banner with gray styling (bg-surface border-border text-text-tertiary)"
    shifts_area: "'No shifts scheduled for today' empty state card with 'Check the Support tab for schedule requests'"
    tracking: "Location tracking section hidden when dutyStatus is 'Off Duty' (missionReadinessNote suppressed)"
    tabs: "All 4 tabs still visible and navigable"
  what_is_missing:
    - "No upcoming shift schedule (tomorrow, this week)"
    - "No training or certification reminders"
    - "No equipment checklist or readiness self-check"
    - "No shift swap or availability management"
    - "No recent activity summary / attendance history"
    - "No way to mark availability or request additional shifts"
  current_off_duty_usability: |
    Guard sees a nearly empty Mission tab with just the OFF DUTY banner and empty shifts card.
    They can switch to Resources (read-only), Support (submit tickets/schedule requests), or Map (empty if not tracking).
    The experience is hollow — no proactive content for off-duty guards.

# ============================================================
# GUARD NAVIGATION INVENTORY
# ============================================================
guard_navigation:
  appshell_mobile_bottom_nav:
    visible_when: "Guard is on non-workspace routes (inbox, settings, profile)"
    items:
      - key: overview
        label: Overview
        route: /overview
      - key: calendar
        label: Calendar
        route: /calendar
      - key: support
        label: Support
        route: /support
        issue: "Navigates to /support ROUTE which is a stub <div>. Should navigate to /overview with support tab active."
      - key: profile
        label: Profile
        route: /profile

  guard_sticky_nav:
    visible_when: "Guard is on /overview (workspace view)"
    location: "guard-sticky-region at bottom of UserDashboard"
    items:
      - key: mission
        label: Mission
      - key: resources
        label: Resources
      - key: support
        label: Support
        notes: "This one works — activates GuardSupportTab within UserDashboard"
      - key: map
        label: Map

  header_actions:
    - action: "Navigate to Inbox"
      triggered_by: "Header bell icon"
      result: "Sets activeSection to 'inbox' within UserDashboard"
    - action: "Navigate to Settings"
      triggered_by: "Header gear icon"
      result: "Routes to /settings (AppShell route, exits guard workspace)"
    - action: "Profile modal"
      triggered_by: "Header avatar"
      result: "Opens inline profile modal within guard workspace"
    - action: "Refresh"
      triggered_by: "Header refresh button"
      result: "Calls refreshData(false)"

  navigation_leakage_issues:
    - issue: "/inbox route renders SuperadminDashboard for guards"
      severity: critical
      details: "Guard clicking any link that navigates to /inbox route (not the header inbox action) gets SuperadminDashboard component with their user object. The SuperadminDashboard likely renders admin-level content."
    - issue: "/armored-cars accessible to guards"
      severity: medium
      details: "Guards can view the full ArmoredCarDashboard. May expose vehicle fleet management data they don't need."
    - issue: "AppShell bottom nav 'Support' button navigates to stub route"
      severity: medium
      details: "When guard is on calendar/settings/profile, the mobile bottom nav 'Support' goes to /support (stub div) instead of /overview?tab=support"
    - issue: "Catch-all route sends guards to /dashboard (AccessDenied)"
      severity: low
      details: "Should send guards to /overview. Currently guard hitting /* gets /dashboard → AccessDenied."

# ============================================================
# ROUTE PERMISSION HARDENING RECOMMENDATIONS
# (factual gaps only — not implementation suggestions)
# ============================================================

open_questions:
  - question: "Does the support_tickets table use 'user_id' or 'guard_id' as the column name?"
    context: "Migration defines 'user_id', but the Rust model uses 'guard_id'. The SQL in the handler references 'guard_id'. If the actual deployed column is 'user_id', the handler would fail at runtime."
    type: decision_blocker
    affects: ["support-ticket-api"]
  - question: "Should guards have access to /armored-cars?"
    context: "Currently in ALL_ROLES. Guards can view the full vehicle dashboard. Need product decision on whether this is intentional."
    type: research
    affects: ["route-hardening"]
  - question: "Is the /inbox route for guards intentionally rendering SuperadminDashboard?"
    context: "This appears to be a bug. The guard inbox (GuardInboxPanel) exists inside UserDashboard but the /inbox route renders SuperadminDashboard for all roles."
    type: research
    affects: ["route-hardening"]

gaps:
  - area: "Support ticket lifecycle management"
    description: "Backend has only create + list endpoints. DB schema supports full lifecycle (assigned_to, resolution_notes, resolved_at, status transitions) but no endpoints expose this. Frontend has no admin-side ticket management."
    impact: decision_blocker
    affects: ["support-feature-completeness"]
  - area: "Guard off-duty experience"
    description: "Off-duty guards see nearly empty screens. No upcoming schedule, training, availability management, or proactive content."
    impact: research_blocker
    affects: ["guard-dashboard-redesign"]
  - area: "Route/navigation consistency for guards"
    description: "Three separate 'Support' entry points with different behaviors: (1) sticky nav tab works, (2) mobile bottom nav goes to stub route, (3) /support route is a div stub."
    impact: research_blocker
    affects: ["guard-navigation-redesign"]
  - area: "Admin support ticket dashboard"
    description: "No UI for supervisors/admins to view, triage, assign, or resolve guard support tickets. Backend has view_support_tickets permission but no admin-facing endpoint or component."
    impact: nice_to_know
    affects: ["support-feature-completeness"]
