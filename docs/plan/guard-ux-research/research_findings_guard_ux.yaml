plan_id: guard-ux-research
objective: Deep research into guard-specific UX, route permissions, and guard support experience
focus_area: guard-ux-routes-support
created_at: "2026-04-05"
created_by: gem-researcher
status: completed

tldr: |
  - Guards access 10 routes via ALL_ROLES + 1 guard-only route (/overview). Three ALL_ROLES routes render placeholder <div> stubs (/shift-swaps, /notifications, /support). The /inbox route renders SuperadminDashboard for guards — a significant role leakage.
  - Guard workspace has 5 sections (inbox, mission, resources, support, map) managed via internal state tabs, not routes. Support tab is fully functional (schedule requests, support tickets with backend CRUD, shift swaps). Not a stub.
  - Backend support tickets API is minimal: create + list-by-guard only. No update/resolve/close/delete endpoints. No admin dashboard for ticket management. DB schema supports richer workflows (category, priority, assigned_to, resolution_notes) that the API ignores.
  - Access denied UX is clean: RoleGuard renders an inline AccessDenied component (no redirect). Catch-all route redirects to /dashboard (not /overview for guards).
  - Off-duty state shows "OFF DUTY" banner + "No shifts scheduled for today" empty state. No useful off-duty content (no upcoming schedule, training, equipment checklist). Guard is left with a mostly empty screen.

research_metadata:
  methodology: "hybrid retrieval: semantic_search + grep_search, sequential file reads of router, guards, UserDashboard, GuardSupportTab, GuardResourcesTab, GuardMapTab, AppShell, navigation config, backend handlers, models, migrations, permissions"
  scope: "Full guard route access path, all guard workspace tabs, support feature backend+frontend, permission error handling, off-duty experience, mobile + sticky navigation"
  confidence: high
  coverage: 95
  decision_blockers: 1
  research_blockers: 0

