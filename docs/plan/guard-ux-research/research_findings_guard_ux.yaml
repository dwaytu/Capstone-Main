# ============================================================
# SUPPORT FEATURE STATUS
# ============================================================
support_feature_status:
  frontend:
    guard_support_tab:
      status: fully_functional
      location: DasiaAIO-Frontend/src/components/dashboard/GuardSupportTab.tsx
      features:
        - "Schedule Change Request form (client site, date, start/end time)"
        - "Support Ticket creation form (subject, message)"
        - "Support Ticket history list with status badges"
        - "GuardShiftSwapPanel with shift swap management"
      submits_to:
        - "POST /api/guard-replacement/shifts (schedule requests)"
        - "POST /api/support-tickets (support tickets)"

    standalone_support_route:
      status: stub
      location: "DasiaAIO-Frontend/src/router/index.tsx:148"
      renders: "<div>Support</div>"
      notes: "Guard can navigate to /support but gets empty div. The real support UI lives inside UserDashboard's support tab, not at this route."

  backend:
    api_endpoints:
      - method: POST
        path: "/api/support-tickets"
        handler: "handlers::support_tickets::create_ticket"
        auth: "require_authenticated (any logged-in user)"
        audit: "audit_write_requests middleware applied"
        status: functional
      - method: GET
        path: "/api/support-tickets/:guard_id"
        handler: "handlers::support_tickets::get_guard_tickets"
        auth: "require_authenticated + require_self_or_min_role(supervisor)"
        status: functional

    missing_endpoints:
      - "PUT /api/support-tickets/:id — update ticket status (resolve, close, assign)"
      - "DELETE /api/support-tickets/:id — delete ticket"
      - "GET /api/support-tickets — list all tickets (admin view)"
      - "GET /api/support-tickets/:id — single ticket detail"

    db_schema_vs_api_gap:
      db_columns_unused_by_api:
        - "category (default 'bug') — API doesn't send/receive this"
        - "priority (default 'medium') — API doesn't send/receive this"
        - "assigned_to — no assignment endpoint"
        - "resolution_notes — no resolve endpoint"
        - "resolved_at — no resolve endpoint"
        - "title/description — API uses subject/message instead (naming mismatch)"
      db_column_name_vs_api:
        - db: "user_id"
          api: "guard_id"
          notes: "FK references users(id) as user_id, but handler writes to guard_id column. Possible runtime error if columns don't match."

    backend_permissions:
      guard: ["create_support_ticket", "manage_notifications", "view_merit"]
      supervisor: ["view_support_tickets", "create_support_ticket"]
      admin: ["view_support_tickets", "create_support_ticket"]
      superadmin: ["view_support_tickets", "create_support_ticket"]
      notes: "Guard can create but NOT view_support_tickets permission. However, the API endpoint uses require_self_or_min_role which allows guards to view their own tickets."

