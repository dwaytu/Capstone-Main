patterns_found:
  - category: architecture
    pattern: "Role-based route nesting with RoleGuard wrapper"
    description: "Routes are grouped into tiers (ELEVATED_ROLES, GUARD_ONLY, ALL_ROLES, SUPERADMIN_ONLY). Each tier wraps children in a <RoleGuard roles={...}> layout route. Role check is inline (no redirect) — renders AccessDenied component."
    examples:
      - file: DasiaAIO-Frontend/src/router/index.tsx
        location: "index.tsx:118-131"
        snippet: |
          { element: <RoleGuard roles={ELEVATED_ROLES} />, children: [...] }
          { element: <RoleGuard roles={GUARD_ONLY} />, children: [...] }
          { element: <RoleGuard roles={ALL_ROLES} />, children: [...] }
    prevalence: common

  - category: architecture
    pattern: "Guard workspace uses internal tab state, not sub-routes"
    description: "UserDashboard manages its own tabs (GuardSection type) via useState. Tab switches don't change the URL — guard stays on /overview for all tabs. Only inbox/support/map can be activated via activeView prop from router."
    examples:
      - file: DasiaAIO-Frontend/src/components/guards/UserDashboard.tsx
        location: "UserDashboard.tsx:72"
        snippet: "type GuardSection = 'inbox' | 'mission' | 'resources' | 'support' | 'map'"
    prevalence: common

  - category: architecture
    pattern: "Dual navigation systems for guards"
    description: "Guards have TWO navigation mechanisms: (1) AppShell mobile bottom nav (Overview, Calendar, Support, Profile) and (2) guard sticky nav at bottom of UserDashboard (Mission, Resources, Support, Map). The AppShell bottom nav is hidden when isGuardWorkspaceView=true."
    examples:
      - file: DasiaAIO-Frontend/src/components/layout/AppShell.tsx
        location: "AppShell.tsx:92-100"
        snippet: "const isGuardWorkspaceView = normalizedRole === 'guard' && !['inbox', 'settings', 'profile'].includes(activeView)"
    prevalence: common

  - category: error_handling
    pattern: "Inline AccessDenied rendering (no redirect)"
    description: "When a guard navigates to an unauthorized route (e.g., /dashboard, /analytics), RoleGuard renders AccessDenied in-place. No redirect occurs. The page shell (AppShell) is still rendered around it."
    examples:
      - file: DasiaAIO-Frontend/src/router/guards.tsx
        location: "guards.tsx:35-37"
        snippet: "if (!user || !roles.includes(user.role)) { return <AccessDenied /> }"
    prevalence: common

  - category: naming
    pattern: "Schema/API field name mismatch"
    description: "DB migration uses 'user_id' and 'title'+'description' for support tickets. Backend handler uses 'guard_id' and 'subject'+'message'. The Rust model has guard_id/subject/message. Misalignment between migration columns and API model."
    examples:
      - file: DasiaAIO-Backend/migrations/add_support_tickets.sql
        location: "add_support_tickets.sql:4"
        snippet: "user_id VARCHAR(255) REFERENCES users(id)"
      - file: DasiaAIO-Backend/src/models.rs
        location: "models.rs:578-587"
        snippet: "pub guard_id: String, pub subject: String, pub message: String"
    prevalence: common

