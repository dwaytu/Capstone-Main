# ============================================================
# GUARD ROUTE ACCESS MATRIX
# ============================================================
guard_route_access_matrix:
  guard_only_routes:
    - path: /overview
      component: UserDashboard
      role_guard: "GUARD_ONLY ['guard']"
      status: functional
      notes: "Guard home — full tabbed workspace"

  all_roles_routes_guard_can_access:
    - path: /calendar
      component: CalendarDashboard
      role_guard: "ALL_ROLES"
      status: functional
      notes: "Shared calendar view. Uses getSidebarNav which gives guard GUARD_NAV (no admin items)."
    - path: /permits
      component: GuardFirearmPermits
      role_guard: "ALL_ROLES"
      status: functional
      notes: "Guard can view own permits — appropriate for guard role"
    - path: /armored-cars
      component: ArmoredCarDashboard
      role_guard: "ALL_ROLES"
      status: concern
      notes: "Guard can access armored car dashboard. May expose management-level vehicle data."
    - path: /profile
      component: ProfileDashboard
      role_guard: "ALL_ROLES"
      status: functional
      notes: "User profile — appropriate"
    - path: /settings
      component: SettingsView
      role_guard: "ALL_ROLES"
      status: functional
      notes: "App settings — appropriate"
    - path: /shift-swaps
      component: "<div>Shift Swaps</div>"
      role_guard: "ALL_ROLES"
      status: stub
      notes: "Renders a plain <div> with text 'Shift Swaps'. No real component."
    - path: /notifications
      component: "<div>Notifications</div>"
      role_guard: "ALL_ROLES"
      status: stub
      notes: "Renders a plain <div> with text 'Notifications'. No real component."
    - path: /support
      component: "<div>Support</div>"
      role_guard: "ALL_ROLES"
      status: stub
      notes: "Renders a plain <div> with text 'Support'. No real component. Ironic since GuardSupportTab exists inside UserDashboard."
    - path: /inbox
      component: SuperadminDashboard
      role_guard: "ALL_ROLES"
      status: critical_bug
      notes: "Guard accessing /inbox gets SuperadminDashboard rendered with their user object. Role leakage — admin component rendered for guard."

  elevated_only_routes_guard_blocked:
    - path: /dashboard
      role_guard: "ELEVATED_ROLES"
      guard_result: "AccessDenied component"
    - path: /approvals
      role_guard: "ELEVATED_ROLES"
      guard_result: "AccessDenied component"
    - path: /schedule
      role_guard: "ELEVATED_ROLES"
      guard_result: "AccessDenied component"
    - path: /missions
      role_guard: "ELEVATED_ROLES"
      guard_result: "AccessDenied component"
    - path: /trips
      role_guard: "ELEVATED_ROLES"
      guard_result: "AccessDenied component"
    - path: /performance
      role_guard: "ELEVATED_ROLES"
      guard_result: "AccessDenied component"
    - path: /merit
      role_guard: "ELEVATED_ROLES"
      guard_result: "AccessDenied component"
    - path: /firearms
      role_guard: "ELEVATED_ROLES"
      guard_result: "AccessDenied component"
    - path: /allocation
      role_guard: "ELEVATED_ROLES"
      guard_result: "AccessDenied component"
    - path: /maintenance
      role_guard: "ELEVATED_ROLES"
      guard_result: "AccessDenied component"
    - path: /analytics
      role_guard: "ELEVATED_ROLES"
      guard_result: "AccessDenied component"

  superadmin_only_routes_guard_blocked:
    - path: /audit
      role_guard: "SUPERADMIN_ONLY"
      guard_result: "AccessDenied component"

  catch_all:
    path: "*"
    behavior: "Navigate to /dashboard replace"
    guard_impact: "Guard hitting unknown URL goes to /dashboard → sees AccessDenied. Should redirect to /overview instead."

