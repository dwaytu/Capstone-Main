  - id: T2-1
    title: "Create PanicButton floating emergency component"
    description: |
      Build DasiaAIO-Frontend/src/components/guards/PanicButton.tsx:
      
      BEHAVIOR:
      - Always-visible floating button (position: fixed, bottom-right, above tab nav)
      - One tap — NO confirmation dialog, NO delay
      - On tap:
        1. navigator.vibrate([200, 100, 200]) if available (ignore if not)
        2. Capture GPS via navigator.geolocation.getCurrentPosition (1s timeout)
        3. POST to /api/incidents with: { title: "SOS EMERGENCY", description: "Emergency panic alert triggered by guard", 
           location: GPS coords or "Location unavailable", priority: "critical", type: "PANIC" }
        4. If network fails: enqueueOfflineAction with same payload
        5. Visual feedback: button flashes green briefly on success, shows small "SOS Sent" text
      
      VISUAL:
      - Large circle (min 64x64px), pulsing red glow animation (CSS keyframes)
      - White "SOS" text or alert-triangle icon centered
      - z-index above tab content, below modals (z-40)
      - Touch target at least 48x48px (already covered by 64px size)
      
      ACCESSIBILITY:
      - role="button", aria-label="Emergency SOS — tap to send distress signal"
      - High contrast: white on red, meets 4.5:1 ratio
      - Keyboard accessible: Enter/Space triggers
      - aria-live="assertive" region for status feedback
      
      MOUNT POINT:
      - Rendered inside UserDashboard component wrapper, OUTSIDE the tab content area
      - Visible regardless of which tab (Mission/Resources/Support/Map) is active
    wave: 2
    agent: gem-implementer
    prototype: false
    covers: ["Priority 1: PANIC BUTTON"]
    priority: high
