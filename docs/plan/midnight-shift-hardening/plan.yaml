plan_id: midnight-shift-hardening
objective: |
  Harden the SENTINEL guard-facing experience so a tired, underpaid security guard
  at 2 AM under pressure can trust the system, report emergencies in one tap,
  reach help instantly, and never lose data to network failures. Remove all
  fake telemetry and self-registration flows that erode trust. Add a real panic
  button, simplify incident reporting, surface emergency contacts, and improve
  offline resilience. Extend the command center with an urgency-sorted priority
  queue for supervisors/admins.
created_at: "2026-04-04T00:00:00Z"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 5
  total_dependencies: 18
  risk_score: medium

tldr: |
  4-wave plan with 18 tasks across guard UX, login, offline, and command center.
  Wave 1 removes trust-breaking theater (fake telemetry, self-registration) — pure deletions, lowest risk.
  Wave 2 builds the big three: PanicButton, simplified incident form, always-visible emergency contacts.
  Wave 3 hardens offline resilience (incident queue, pending badge, jargon cleanup, sync feedback).
  Wave 4 adds command center priority queue + business-reality registration alignment.
  Each wave ends with an integration check. Total estimated effort: ~14 implementation tasks + 4 review gates.

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "PanicButton GPS capture fails silently on Android WebView (Capacitor)"
      likelihood: medium
      impact: critical
      mitigation: "Fallback to last-known location from tracking heartbeat; log GPS failure; still send SOS without coordinates rather than blocking"
    - scenario: "Removing self-registration breaks existing guard onboarding flow if admins relied on it"
      likelihood: low
      impact: high
      mitigation: "Backend /api/register endpoint stays intact — only the public-facing form is removed; admins still create accounts via admin dashboard"
    - scenario: "Offline incident queue deduplication creates false negatives — real duplicate incidents suppressed"
      likelihood: medium
      impact: medium
      mitigation: "Use incident-specific dedup key (description hash + timestamp window) rather than URL-only matching from existing offlineQueue"
    - scenario: "Floating PanicButton z-index conflicts with modals or bottom navigation"
      likelihood: medium
      impact: medium
      mitigation: "Use z-50 (Tailwind) and test against all modal states; PanicButton sits in layout wrapper above tab content but below modal overlay"
    - scenario: "Emergency contacts constants file not referenced correctly after extraction from JSX"
      likelihood: low
      impact: low
      mitigation: "Grep all hardcoded phone number strings across codebase to ensure zero remain after extraction"
  assumptions:
    - "Backend /api/incidents already accepts type field or can be extended trivially for PANIC/SOS"
    - "navigator.vibrate() is available in Capacitor Android WebView (it is per Chromium spec)"
    - "The existing offlineQueue.ts enqueueOfflineAction works for any POST endpoint, not just attendance"
    - "CommandCenterDashboard's IncidentAlertFeed already receives alerts with severity field"
    - "Backend /api/health endpoint exists for real system status check"

implementation_specification:
  code_structure: |
    New components created alongside existing dashboard components.
    PanicButton is a standalone component mounted in the guard layout (AppShell or UserDashboard wrapper).
    Emergency contacts extracted to a constants file, rendered via a shared EmergencyContactsBar component.
    Incident form simplified in-place within UserDashboard.tsx (no new component — reduce, don't add).
    LoginPage changes are surgical deletions and text replacements.
    Command center priority queue is an enhancement to existing IncidentAlertFeed.
  affected_areas:
    - DasiaAIO-Frontend/src/components/guards/  (PanicButton, UserDashboard incident form)
    - DasiaAIO-Frontend/src/components/dashboard/  (GuardSupportTab, CommandCenterDashboard, IncidentAlertFeed)
    - DasiaAIO-Frontend/src/components/LoginPage.tsx  (fake telemetry, registration removal)
    - DasiaAIO-Frontend/src/components/layout/AppShell.tsx  (PanicButton mount point for guard role)
    - DasiaAIO-Frontend/src/utils/offlineQueue.ts  (no changes — already supports generic actions)
    - DasiaAIO-Frontend/src/constants/  (new emergencyContacts.ts)
  component_details:
    - component: PanicButton
      responsibility: "Floating emergency button — one tap sends SOS with GPS to /api/incidents, vibrates, queues offline"
      interfaces:
        - "Props: userId (string), authHeaders (Record<string,string>)"
        - "Emits POST to /api/incidents with type='PANIC', priority='critical'"
        - "Uses enqueueOfflineAction for offline resilience"
    - component: EmergencyContactsBar
      responsibility: "Persistent mini-bar or expandable footer showing clickable tel: links for emergency contacts"
      interfaces:
        - "Props: none (reads from constants/emergencyContacts.ts)"
        - "Renders tel: links for each contact"
    - component: IncidentAlertFeed (enhanced)
      responsibility: "Priority-sorted incident feed with PANIC-first ordering and overdue visual emphasis"
      interfaces:
        - "Props: alerts (OpsAlert[]), nowLabel (string) — same as current"
        - "Internal sort: critical > warning > info, then by timestamp desc"
  dependencies:
    - component: PanicButton
      relationship: "Imports enqueueOfflineAction from offlineQueue.ts, getAuthHeaders from utils"
    - component: EmergencyContactsBar
      relationship: "Imports EMERGENCY_CONTACTS from constants/emergencyContacts.ts"
    - component: UserDashboard
      relationship: "Mounts PanicButton and EmergencyContactsBar; simplified incident form uses enqueueOfflineAction"
  integration_points:
    - "PanicButton mounted in guard layout — visible across all tabs"
    - "EmergencyContactsBar replaces hardcoded contacts in GuardSupportTab and UserDashboard instructions modal"
    - "Offline incident queue uses same IndexedDB store as check-in/check-out"
    - "Command center IncidentAlertFeed gets urgency sort without API changes"

contracts:
  - from_task: T1-1
    to_task: T2-3
    interface: "LoginPage fake telemetry removed — no sidebar status cards exist"
    format: "LoginPage.tsx no longer imports/uses monitoringNodes state"
  - from_task: T1-2
    to_task: T2-3
    interface: "LoginPage registration form removed — only login form remains"
    format: "LoginPage.tsx isRegistering flow deleted; register link replaced with admin message"
  - from_task: T2-1
    to_task: T3-1
    interface: "PanicButton component exists and accepts userId + auth context"
    format: "PanicButton.tsx exported as default FC"
  - from_task: T2-2
    to_task: T3-1
    interface: "Incident form has offline queue support via enqueueOfflineAction"
    format: "handleIncidentSubmit catch block calls enqueueOfflineAction on network failure"
  - from_task: T2-3
    to_task: T3-2
    interface: "Emergency contacts extracted to constants file"
    format: "constants/emergencyContacts.ts exports EMERGENCY_CONTACTS array"

