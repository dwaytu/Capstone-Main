patterns_found:
  - category: testing
    pattern: FontFaceSet.check invoked with implicit 400 weight for Rajdhani.
    description: The gate checks Rajdhani using a descriptor that defaults to normal/400, while imported Rajdhani weights are 600 and 700.
    examples:
      - file: DasiaAIO-Frontend/output/playwright/20260406-110438/run-live-focused-qa.mjs
        location: DasiaAIO-Frontend/output/playwright/20260406-110438/run-live-focused-qa.mjs:684
        snippet: const rajdhaniLoaded = supportsFontsApi ? document.fonts.check('16px "Rajdhani"') : false;
      - file: DasiaAIO-Frontend/src/index.css
        location: DasiaAIO-Frontend/src/index.css:2
        snippet: family=Rajdhani:wght@600;700
    prevalence: common

  - category: structure
    pattern: CSP meta allowlist includes Google Fonts domains in frontend entrypoint.
    description: Current frontend policy explicitly permits fonts.googleapis.com for styles and fonts.gstatic.com for font files.
    examples:
      - file: DasiaAIO-Frontend/index.html
        location: DasiaAIO-Frontend/index.html:8
        snippet: style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;
    prevalence: common

  - category: architecture
    pattern: QA gate conflates font availability check with CSP-blocking check.
    description: passOverall depends on both font descriptor checks and noCspErrors, so a descriptor mismatch alone flips the checklist fail state.
    examples:
      - file: DasiaAIO-Frontend/output/playwright/20260406-110438/run-live-focused-qa.mjs
        location: DasiaAIO-Frontend/output/playwright/20260406-110438/run-live-focused-qa.mjs:709
        snippet: result.passFontsLoaded = Boolean(result.fontInfo?.rajdhaniLoaded && result.fontInfo?.spaceGroteskLoaded);
      - file: DasiaAIO-Frontend/output/playwright/20260406-110438/run-live-focused-qa.mjs
        location: DasiaAIO-Frontend/output/playwright/20260406-110438/run-live-focused-qa.mjs:711
        snippet: result.passOverall = result.passFontsLoaded && result.passNoCspErrors;
    prevalence: common

