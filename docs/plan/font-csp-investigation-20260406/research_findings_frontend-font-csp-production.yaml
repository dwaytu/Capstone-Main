plan_id: font-csp-investigation-20260406
objective: Investigate production Rajdhani font loading signal for SENTINEL frontend and determine defect vs measurement artifact.
focus_area: DasiaAIO-Frontend font and CSP production gating
created_at: 2026-04-06T03:26:00Z
created_by: gem-researcher
status: completed

tldr: |
  - Frontend source allows Google Fonts in CSP and imports both Rajdhani and Space Grotesk from one Google Fonts stylesheet.
  - Rajdhani is imported only at weights 600 and 700, while the failing QA check uses FontFaceSet.check with an implicit 400-weight descriptor.
  - Playwright evidence for 20260406-110438 shows no CSP font errors or request failures; only rajdhaniLoaded is false in the current assertion logic.
  - Live browser probe confirms Rajdhani 700 check is true while Rajdhani 400 check is false on the login page.

research_metadata:
  methodology: Hybrid retrieval via semantic_search and grep_search, targeted read_file on source and evidence files, relationship discovery via vscode_listCodeUsages, external API semantics via fetch_webpage (MDN), and live runtime verification via run_in_terminal Playwright probes.
  scope: Frontend CSS, frontend HTML CSP meta, Playwright artifact evidence under output/playwright/20260406-110438/fonts-csp, QA script logic in run-live-focused-qa.mjs, and backend CSP header middleware context for potential override paths.
  confidence: high
  coverage: 96
  decision_blockers: 0
  research_blockers: 0

