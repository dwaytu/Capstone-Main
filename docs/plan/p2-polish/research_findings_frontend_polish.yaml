# ============================================================
# FINDING 2: ORPHANED 5TH STAT CARD IN ANALYTICS GRID
# ============================================================
analytics_grid_orphan:
  summary: |
    The Performance Metrics section in AnalyticsDashboard renders 5 StatCards
    in a grid that is `md:grid-cols-2 xl:grid-cols-5`. At the md breakpoint
    (2 columns), 5 cards means rows of [2, 2, 1] — the 5th card orphans.
    At xl (5 columns) all 5 fit in one row, but that's rarely the viewport.

  file: DasiaAIO-Frontend/src/components/AnalyticsDashboard.tsx
  container_line: 255
  grid_classes: "grid grid-cols-1 gap-3 md:grid-cols-2 xl:grid-cols-5"
  parent_card:
    component: DashboardCard
    title: "Performance Metrics"
    classes: "xl:col-span-2"
    line: 253

  cards:
    - line: 256
      label: "Mission Completion"
      tone: mission
    - line: 262
      label: "Guard Attendance"
      tone: guard
    - line: 268
      label: "Firearm Availability"
      tone: maintenance
    - line: 274
      label: "Vehicle Utilization"
      tone: vehicle
    - line: 278
      label: "Avg Mission Duration"
      tone: analytics
      note: "This is the orphaned card — alone on the last row at md breakpoint"

  fix_options: |
    Option A: Change grid to `md:grid-cols-3 xl:grid-cols-5` so rows are [3, 2].
    Option B: Make the 5th card span 2 columns at md (`md:col-span-2`).
    Option C: Add a 6th metric to make rows [2, 2, 2] at md or [3, 3] at md:grid-cols-3.

# ============================================================
# FINDING 3: TACTICAL VIEW MAP HEIGHT
# ============================================================
tactical_map_height:
  summary: |
    The map's height is hardcoded on the container div inside OperationalMapPanel.tsx.
    At mobile it's `h-80` (320px), at md+ it's `h-96` (384px).
    The parent layout in CommandCenterDashboard splits the "Tactical View" section
    into a 2-column grid at xl, so the map gets 50% width. Below xl it's full-width
    and the 384px height can dominate viewport.

  map_container:
    file: DasiaAIO-Frontend/src/components/dashboard/OperationalMapPanel.tsx
    line: 420
    classes: "relative isolate h-80 overflow-hidden rounded-xl border border-border-elevated bg-surface md:h-96"
    height_mobile: "h-80 (320px)"
    height_md: "md:h-96 (384px)"

  parent_layout:
    file: DasiaAIO-Frontend/src/components/dashboard/CommandCenterDashboard.tsx
    line: 323
    grid_classes: "grid grid-cols-1 gap-6 xl:grid-cols-2"
    children:
      - component: OperationalMap
        line: 324
        note: "thin wrapper → OperationalMapPanel"
      - component: GuardDeploymentOverview
        line: 325

  wrapper:
    file: DasiaAIO-Frontend/src/components/dashboard/OperationalMap.tsx
    lines: "1-13"
    note: "passthrough wrapper to OperationalMapPanel"

  section_panel:
    title: "Tactical View"
    subtitle: "Live geospatial operations map and guard deployment grid"
    line: 319

# ============================================================
# FINDING 4: STAT CARD BORDER COLORS (COMMAND CENTER)
# ============================================================
stat_card_borders:
  summary: |
    The colored left "borders" on StatCards are NOT CSS borders — they are
    `box-shadow: inset 4px 0 0 0 <color>` defined in index.css as utility classes.
    The StatCard component applies tone-specific classes that map to these shadows.
    On dark backgrounds, `inset 4px box-shadow` can appear very subtle.

  stat_card_component:
    file: DasiaAIO-Frontend/src/components/dashboard/ui/StatCard.tsx
    lines: "1-37"
    tone_class_map:
      default: "status-bar-info"
      guard: "status-bar-info tone-guard-surface"
      vehicle: "status-bar-warning tone-vehicle-surface"
      mission: "status-bar-info tone-mission-surface"
      maintenance: "status-bar-critical tone-maintenance-surface"
      analytics: "status-bar-info tone-analytics-surface"

  css_definitions:
    file: DasiaAIO-Frontend/src/index.css
    classes:
      - name: status-bar-info
        line: 597
        css: "box-shadow: inset 4px 0 0 0 var(--color-info)"
      - name: status-bar-warning
        line: 589
        css: "box-shadow: inset 4px 0 0 0 var(--color-warning)"
      - name: status-bar-critical
        line: 593
        css: "box-shadow: inset 4px 0 0 0 var(--color-danger)"
      - name: status-bar-success
        line: 587
        css: "box-shadow: inset 4px 0 0 0 var(--color-success)"
    note: |
      The shadow width is only 4px and uses CSS variables.
      On dark surfaces the `inset box-shadow` blends with the gradient background
      from tone-*-surface classes, making the accent very subtle.

  command_center_cards:
    file: DasiaAIO-Frontend/src/components/dashboard/CommandCenterDashboard.tsx
    grid_line: 239
    grid_classes: "grid grid-cols-1 gap-3 sm:grid-cols-2 xl:grid-cols-4"
    cards:
      - line: 240
        label: System
        tone: analytics
        applied_classes: "status-bar-info tone-analytics-surface"
        shadow_color: "var(--color-info) — cyan/blue"
      - line: 241
        label: Threat
        tone: "dynamic (maintenance | vehicle | guard)"
        shadow_color: "danger/warning/info depending on threat level"
      - line: 242
        label: Incidents
        tone: mission
        applied_classes: "status-bar-info tone-mission-surface"
        shadow_color: "var(--color-info) — blue/purple surface blend"
      - line: 243
        label: Clock
        tone: default
        applied_classes: "status-bar-info"
        shadow_color: "var(--color-info)"

  fix_options: |
    Option A: Increase inset shadow width from 4px to 6px.
    Option B: Switch from box-shadow to `border-left: 4px solid <color>` for true border rendering.
    Option C: Increase opacity/saturation of shadow color variables.
    Option D: Combine — use border-left AND a subtle glow shadow for depth.

