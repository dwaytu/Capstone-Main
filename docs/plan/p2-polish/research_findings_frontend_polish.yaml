plan_id: p2-polish
objective: "Identify and document P2 UI polish issues: empty states, orphaned grid card, map height, stat card borders"
focus_area: frontend-polish
created_at: "2026-04-05"
created_by: gem-researcher
status: completed

tldr: |
  - 20+ plain-text empty states found across admin, superadmin, guard, calendar, audit, analytics, and dashboard panels — none use the reusable `soc-empty-state` CSS class consistently.
  - AnalyticsDashboard Performance Metrics grid uses `xl:grid-cols-5` with 5 cards, causing the 5th card ("Avg Mission Duration") to orphan on its own row below xl breakpoint.
  - Tactical View map height is set by `OperationalMapPanel.tsx` at `h-80 md:h-96` (320px / 384px). Parent grid in CommandCenterDashboard is `xl:grid-cols-2` so the map takes 50% width at xl, but its fixed height dominates smaller viewports.
  - Command center StatCards use `box-shadow: inset 4px 0 0 0` via CSS classes (`status-bar-info`, `status-bar-warning`, `status-bar-critical`) — not border properties. The `inset box-shadow` approach yields subtle left accents especially on dark backgrounds.

research_metadata:
  methodology: "hybrid retrieval: grep_search (exact patterns) + semantic_search + read_file for detailed examination"
  scope: "DasiaAIO-Frontend/src/ — components, dashboard, admin, guards, shared UI, index.css"
  confidence: high
  coverage: 92
  decision_blockers: 0
  research_blockers: 0

