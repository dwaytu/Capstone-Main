prd_id: PRD-OPERATIONAL-HARDENING-WAVE-1-20260403
version: 1.0.0

user_stories:
  - as_a: Release Manager
    i_want: Release and rollout documentation to match the live GitHub Actions release workflow exactly
    so_that: production distribution decisions rely on the real governed path rather than stale fallback guidance
  - as_a: Operations Lead
    i_want: SENTINEL documentation to describe the platform as a mission and decision-support system
    so_that: stakeholders understand the system by its operational purpose instead of by a running implementation log
  - as_a: Maintainer
    i_want: the active PRD to reflect the bounded first operational hardening wave
    so_that: current documentation scope is clear and stale guard-redesign work is not treated as pending
  - as_a: Capstone Reviewer
    i_want: the technical guide and capstone paper to stay synchronized with verified system behavior
    so_that: academic and operational documents describe the same system truth

scope:
  in_scope:
    - Documentation alignment to `.github/workflows/release.yml` for web, desktop, and Android release governance
    - Accurate Android signing documentation covering required GitHub Actions secrets and signed-only governed release behavior
    - Replacement of stale `docs/PRD.yaml` guard-redesign scope with the bounded first operational hardening wave
    - Narrative refresh of `CHATGPT_SYSTEM_GUIDE.md` and `SENTINEL - Group 8.md` toward mission, decision-support, and governance framing
    - Synchronization of rollout and architecture documentation touched by release-governance facts
  out_of_scope:
    - New frontend or backend feature implementation
    - Changes to `.github/workflows/release.yml`, application code, or runtime contracts
    - Android store submission, desktop code signing procurement, or external distribution-channel setup
    - Reopening deferred guard-dashboard redesign or unrelated UX planning work

acceptance_criteria:
  - criterion: AC-001 Release workflow documentation matches the verified governed path
    verification: Updated docs name `.github/workflows/release.yml`, the `prepare -> quality-gate -> web/desktop/android` flow, tag-only publish behavior, and signed Android APK/AAB outputs
  - criterion: AC-002 Android signing guidance reflects the live secret contract
    verification: Updated docs list `SENTINEL_ANDROID_KEYSTORE_BASE64`, `SENTINEL_UPLOAD_STORE_PASSWORD`, `SENTINEL_UPLOAD_KEY_ALIAS`, and `SENTINEL_UPLOAD_KEY_PASSWORD`, and do not describe unsigned fallback in the governed release path
  - criterion: AC-003 Active PRD scope is bounded to hardening-wave documentation work
    verification: `docs/PRD.yaml` no longer describes pending guard-dashboard redesign and instead defines the current operational hardening wave
  - criterion: AC-004 System narratives are product and mission oriented
    verification: `CHATGPT_SYSTEM_GUIDE.md` and `SENTINEL - Group 8.md` describe SENTINEL as a mission and decision-support system with governance, signal interpretation, and controlled distribution rather than as a running change log
  - criterion: AC-005 Documentation stays synchronized and factual
    verification: Updated rollout, architecture, and system-flow documents do not invent features, preserve capstone structure where required, and remain consistent with current implementation and verified release behavior

needs_clarification: []

features:
  - name: Release Governance Documentation Alignment
    overview: Bring release, rollout, and architecture docs into line with the verified GitHub Actions workflow contract and observed manual release run.
    status: active
  - name: Android Signing Contract Clarification
    overview: Document the required signing secret set and the signed-only governed Android release path.
    status: active
  - name: Mission and Decision-System Narrative Refresh
    overview: Reframe core technical and capstone documents around SENTINEL as an operational command, governance, and decision-support system.
    status: active
  - name: Documentation Synchronization
    overview: Keep PRD, rollout, architecture, and system guides aligned to the same bounded hardening-wave scope.
    status: active

state_machines:
  - name: GovernedReleaseDocumentationState
    states:
      - stale
      - aligned_to_workflow
      - verified
    transitions:
      - from: stale
        to: aligned_to_workflow
        trigger: Documentation is updated to match `.github/workflows/release.yml`
      - from: aligned_to_workflow
        to: verified
        trigger: Workflow facts are checked against the live successful release run
  - name: SystemNarrativeRefresh
    states:
      - implementation_log_bias
      - mission_and_decision_framed
    transitions:
      - from: implementation_log_bias
        to: mission_and_decision_framed
        trigger: Technical and capstone documents are rewritten around system purpose, governance, and decision support

errors:
  - code: ERR_DOC_REL_001
    message: Release documentation references deprecated workflow names or unsigned Android fallback behavior.
  - code: ERR_DOC_REL_002
    message: Android signing documentation does not match the enforced GitHub Actions secret contract.
  - code: ERR_DOC_SCOPE_001
    message: Active PRD still describes superseded guard redesign planning instead of the bounded hardening wave.
  - code: ERR_DOC_NARRATIVE_001
    message: System documentation reads as an implementation log instead of a mission and decision-support system description.

decisions:
  - decision: The live release workflow is the source of truth for release documentation.
    rationale: Hardening work must follow enforced behavior, not superseded notes or local fallback assumptions.
  - decision: Governed Android release guidance is signed-only.
    rationale: `.github/workflows/release.yml` fails the Android job when signing secrets are missing and does not publish unsigned mobile artifacts.
  - decision: The first operational hardening wave is documentation-bounded.
    rationale: This tranche aligns product, rollout, and capstone narratives without reopening unrelated implementation work.
  - decision: System guides should emphasize mission operations, governance, and decision support.
    rationale: Stakeholders need system meaning and operating model more than chronological implementation notes.

changes:
  - version: 1.0.0
    change: Replaced the stale guard-dashboard redesign PRD with the bounded first operational hardening wave covering release-governance documentation, narrative refresh, and system-document synchronization.
