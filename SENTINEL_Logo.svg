<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer Shield -->
  <path d="M 100 20 L 160 50 L 160 110 Q 160 160 100 210 Q 40 160 40 110 L 40 50 Z" 
        fill="url(#shieldGradient)" stroke="#001F3F" stroke-width="2"/>
  
  <!-- Inner Shield Border -->
  <path d="M 100 30 L 150 55 L 150 110 Q 150 155 100 200 Q 50 155 50 110 L 50 55 Z" 
        fill="none" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Monitoring/Radar Rings (representing surveillance) -->
  <circle cx="100" cy="100" r="8" fill="none" stroke="#00D9FF" stroke-width="1.5" opacity="0.7"/>
  <circle cx="100" cy="100" r="18" fill="none" stroke="#00D9FF" stroke-width="1.5" opacity="0.5"/>
  <circle cx="100" cy="100" r="28" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.3"/>
  
  <!-- Central Sentinel Eye (watchful/monitoring concept) -->
  <circle cx="100" cy="100" r="6" fill="#00D9FF"/>
  <circle cx="100" cy="100" r="3" fill="#001F3F"/>
  
  <!-- Horizontal scan line (left) -->
  <line x1="65" y1="100" x2="88" y2="100" stroke="#00D9FF" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Horizontal scan line (right) -->
  <line x1="112" y1="100" x2="135" y2="100" stroke="#00D9FF" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Upward scan line -->
  <line x1="100" y1="65" x2="100" y2="88" stroke="#00D9FF" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Downward scan line -->
  <line x1="100" y1="112" x2="100" y2="135" stroke="#00D9FF" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Diagonal accent lines (security reinforcement) -->
  <line x1="75" y1="75" x2="85" y2="85" stroke="#00D9FF" stroke-width="1" opacity="0.5"/>
  <line x1="115" y1="75" x2="125" y2="85" stroke="#00D9FF" stroke-width="1" opacity="0.5"/>
  
  <!-- Shield corner accents -->
  <polygon points="60,55 65,50 70,55" fill="#00D9FF" opacity="0.6"/>
  <polygon points="140,55 135,50 130,55" fill="#00D9FF" opacity="0.6"/>
</svg>
