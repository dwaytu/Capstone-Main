port: 3000
defaults:
  runtime: process
  agent: codex
  workspace: worktree
  orchestrator:
    agent: codex
  worker:
    agent: codex
  notifiers: []
projects:
  capstone-main:
    name: capstone-main
    sessionPrefix: cm
    storageKey: bbbf62a2757b-capstone-main
    repo: dwaytu/Capstone-Main
    path: D:\Dwight\Capstone Main
    defaultBranch: main
    agentConfig:
      model: gpt-5.3-codex
      permissions: auto-edit
    agentRules: |-
      Always run tests before pushing.
      Use conventional commits (feat:, fix:, chore:, docs:, refactor:, test:).
      Link issue numbers in commit messages.
      Write clear commit messages that explain WHY, not just WHAT.

      Respect SENTINEL governance:
      - Read AGENTS.md and PROJECT_MEMORY.md before large changes.
      - Do not add product features unless explicitly requested.
      - Keep changes file-scoped and avoid overlap with other active sessions.
      - Keep capstone documentation updates panel-friendly, not internal dev logs.

      Validate before completion:
      - Frontend: npm run build (and tests when relevant)
      - Backend: cargo check (and tests when relevant)
      - Run smoke checks for user-facing workflow changes.
