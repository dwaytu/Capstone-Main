name: Release Artifacts

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: Production backend URL used by web/desktop/mobile builds
        required: true
        default: https://backend-production-0c47.up.railway.app
  push:
    tags:
      - v*

jobs:
  desktop-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository (manual)
        shell: pwsh
        run: |
          git init .
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD

      - name: Clone frontend repository
        shell: pwsh
        run: |
          git clone --depth 1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Cloudyrowdyyy/DasiaAIO-Frontend.git" DasiaAIO-Frontend

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            DasiaAIO-Frontend/package-lock.json
            apps/desktop-tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        working-directory: DasiaAIO-Frontend
        run: npm ci

      - name: Install desktop wrapper deps
        working-directory: apps/desktop-tauri
        run: npm ci

      - name: Build desktop release artifact
        shell: pwsh
        run: |
          $env:VITE_API_BASE_URL = "${{ github.event.inputs.api_base_url || 'https://backend-production-0c47.up.railway.app' }}"
          $env:VITE_APP_VERSION = "${{ github.ref_name || 'dev' }}"
          $env:VITE_LATEST_RELEASE_API_URL = "https://api.github.com/repos/Cloudyrowdyyy/Capstone-Main/releases/latest"
          $env:VITE_RELEASE_DOWNLOAD_URL = "https://github.com/Cloudyrowdyyy/Capstone-Main/releases/latest"
          npm run release:desktop --prefix DasiaAIO-Frontend

      - name: Upload desktop installers
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-desktop-installers
          path: |
            apps/desktop-tauri/src-tauri/target-release/release/bundle/msi/*.msi
            apps/desktop-tauri/src-tauri/target-release/release/bundle/nsis/*.exe

      - name: Publish desktop installers to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            apps/desktop-tauri/src-tauri/target-release/release/bundle/msi/*.msi
            apps/desktop-tauri/src-tauri/target-release/release/bundle/nsis/*.exe
          fail_on_unmatched_files: false

  android-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (manual)
        run: |
          git init .
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD

      - name: Clone frontend repository
        run: |
          git clone --depth 1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Cloudyrowdyyy/DasiaAIO-Frontend.git" DasiaAIO-Frontend

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            DasiaAIO-Frontend/package-lock.json
            apps/android-capacitor/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend deps
        working-directory: DasiaAIO-Frontend
        run: npm ci

      - name: Install android wrapper deps
        working-directory: apps/android-capacitor
        run: npm ci

      - name: Build android release artifact
        env:
          VITE_API_BASE_URL: ${{ github.event.inputs.api_base_url || 'https://backend-production-0c47.up.railway.app' }}
          VITE_APP_VERSION: ${{ github.ref_name || 'dev' }}
          VITE_LATEST_RELEASE_API_URL: https://api.github.com/repos/Cloudyrowdyyy/Capstone-Main/releases/latest
          VITE_RELEASE_DOWNLOAD_URL: https://github.com/Cloudyrowdyyy/Capstone-Main/releases/latest
        run: |
          npm run build --prefix DasiaAIO-Frontend -- --mode mobile
          npm run sync --prefix apps/android-capacitor
          cd apps/android-capacitor/android
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      - name: Prepare installable APK
        run: |
          APK_DIR="apps/android-capacitor/android/app/build/outputs/apk/release"
          SIGNED_APK="$APK_DIR/app-release.apk"
          UNSIGNED_APK="$APK_DIR/app-release-unsigned.apk"
          INSTALLABLE_APK="$APK_DIR/app-release-installable.apk"

          if [ -f "$SIGNED_APK" ]; then
            cp "$SIGNED_APK" "$INSTALLABLE_APK"
            echo "Using existing signed release APK"
          else
            echo "No signed release key found, signing fallback APK for sideload install"
            keytool -genkeypair -v \
              -keystore "$RUNNER_TEMP/fallback-release.keystore" \
              -storepass android \
              -keypass android \
              -alias fallback \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Sentinel, OU=Dev, O=Sentinel, L=City, S=State, C=US" \
              -noprompt

            BUILD_TOOLS_VERSION=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)
            APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner"
            "$APKSIGNER" sign \
              --ks "$RUNNER_TEMP/fallback-release.keystore" \
              --ks-pass pass:android \
              --key-pass pass:android \
              --ks-key-alias fallback \
              --out "$INSTALLABLE_APK" \
              "$UNSIGNED_APK"
          fi

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-android-release-installable
          path: apps/android-capacitor/android/app/build/outputs/apk/release/app-release-installable.apk

      - name: Publish Android APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: apps/android-capacitor/android/app/build/outputs/apk/release/app-release-installable.apk
          fail_on_unmatched_files: false
