name: Release Artifacts

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: Production backend URL used by web/desktop/mobile builds
        required: true
        default: https://backend-production-0c47.up.railway.app
  push:
    tags:
      - v*

jobs:
  desktop-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository (manual)
        shell: pwsh
        run: |
          git init .
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD

      - name: Clone frontend repository
        shell: pwsh
        run: |
          git clone --depth 1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Cloudyrowdyyy/DasiaAIO-Frontend.git" DasiaAIO-Frontend

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            DasiaAIO-Frontend/package-lock.json
            apps/desktop-tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        working-directory: DasiaAIO-Frontend
        run: npm ci

      - name: Install desktop wrapper deps
        working-directory: apps/desktop-tauri
        run: npm ci

      - name: Build desktop release artifact
        shell: pwsh
        run: |
          $env:VITE_API_BASE_URL = "${{ github.event.inputs.api_base_url || 'https://backend-production-0c47.up.railway.app' }}"
          npm run release:desktop --prefix DasiaAIO-Frontend

      - name: Upload desktop installers
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-desktop-installers
          path: |
            apps/desktop-tauri/src-tauri/target-release/release/bundle/msi/*.msi
            apps/desktop-tauri/src-tauri/target-release/release/bundle/nsis/*.exe

      - name: Publish desktop installers to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            apps/desktop-tauri/src-tauri/target-release/release/bundle/msi/*.msi
            apps/desktop-tauri/src-tauri/target-release/release/bundle/nsis/*.exe
          fail_on_unmatched_files: false

  android-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (manual)
        run: |
          git init .
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD

      - name: Clone frontend repository
        run: |
          git clone --depth 1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Cloudyrowdyyy/DasiaAIO-Frontend.git" DasiaAIO-Frontend

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            DasiaAIO-Frontend/package-lock.json
            apps/android-capacitor/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend deps
        working-directory: DasiaAIO-Frontend
        run: npm ci

      - name: Install android wrapper deps
        working-directory: apps/android-capacitor
        run: npm ci

      - name: Build android release artifact
        env:
          VITE_API_BASE_URL: ${{ github.event.inputs.api_base_url || 'https://backend-production-0c47.up.railway.app' }}
        run: |
          npm run build --prefix DasiaAIO-Frontend -- --mode mobile
          npm run sync --prefix apps/android-capacitor
          cd apps/android-capacitor/android
          ./gradlew :app:assembleRelease

      - name: Upload signed APK
        if: ${{ hashFiles('apps/android-capacitor/android/app/build/outputs/apk/release/app-release.apk') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-android-release-signed
          path: apps/android-capacitor/android/app/build/outputs/apk/release/app-release.apk

      - name: Upload unsigned APK
        if: ${{ hashFiles('apps/android-capacitor/android/app/build/outputs/apk/release/app-release.apk') == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-android-release-unsigned
          path: apps/android-capacitor/android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Publish Android APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            apps/android-capacitor/android/app/build/outputs/apk/release/app-release.apk
            apps/android-capacitor/android/app/build/outputs/apk/release/app-release-unsigned.apk
          fail_on_unmatched_files: false
