name: Release Artifacts

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: Production backend URL used by web/desktop/mobile builds
        required: true
        default: https://backend-production-0c47.up.railway.app
  push:
    tags:
      - v*

jobs:
  desktop-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            DasiaAIO-Frontend/package-lock.json
            apps/desktop-tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        working-directory: DasiaAIO-Frontend
        run: npm ci

      - name: Install desktop wrapper deps
        working-directory: apps/desktop-tauri
        run: npm ci

      - name: Build desktop release artifact
        shell: pwsh
        run: |
          $env:VITE_API_BASE_URL = "${{ github.event.inputs.api_base_url || 'https://backend-production-0c47.up.railway.app' }}"
          npm run release:desktop --prefix DasiaAIO-Frontend

      - name: Upload desktop MSI
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-desktop-msi
          path: apps/desktop-tauri/src-tauri/target-release/release/bundle/msi/*.msi

  android-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            DasiaAIO-Frontend/package-lock.json
            apps/android-capacitor/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend deps
        working-directory: DasiaAIO-Frontend
        run: npm ci

      - name: Install android wrapper deps
        working-directory: apps/android-capacitor
        run: npm ci

      - name: Build android release artifact
        env:
          VITE_API_BASE_URL: ${{ github.event.inputs.api_base_url || 'https://backend-production-0c47.up.railway.app' }}
        run: |
          npm run build --prefix DasiaAIO-Frontend -- --mode mobile
          npm run sync --prefix apps/android-capacitor
          cd apps/android-capacitor/android
          ./gradlew :app:assembleRelease

      - name: Upload signed APK
        if: ${{ hashFiles('apps/android-capacitor/android/app/build/outputs/apk/release/app-release.apk') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-android-release-signed
          path: apps/android-capacitor/android/app/build/outputs/apk/release/app-release.apk

      - name: Upload unsigned APK
        if: ${{ hashFiles('apps/android-capacitor/android/app/build/outputs/apk/release/app-release.apk') == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-android-release-unsigned
          path: apps/android-capacitor/android/app/build/outputs/apk/release/app-release-unsigned.apk

  publish-github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - desktop-windows
      - android-release
    steps:
      - name: Download desktop artifact
        uses: actions/download-artifact@v4
        with:
          name: sentinel-desktop-msi
          path: dist/desktop

      - name: Download android artifact
        uses: actions/download-artifact@v4
        with:
          pattern: sentinel-android-release-*
          merge-multiple: true
          path: dist/android

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/desktop/*.msi
            dist/android/*.apk
